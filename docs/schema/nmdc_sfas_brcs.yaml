        inlined: true
    class_uri: nmdc_sfas_brcs:Dataset
  Variable:
    name: Variable
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Variable
    description: A variable, factor, measurement, or metadata field observed, manipulated,
      derived, or otherwise used in a study or dataset. Variables act as a lightweight
      data dictionary and can be tagged with analytical roles, time-series behavior,
      units, methods, and ontology mappings such as BERVO. Ontology references are
      modeled as id/label objects so linkml-term-validator can check both the identifier
      and the canonical label.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    mappings:
    - schema:PropertyValue
    slots:
    - Variable_name
    - description
    - variable__roles
    - variable__value_type
    - variable__units
    - variable__unit_term
    - variable__bervo_term
    - variable__mixs_terms
    - variable__ontology_mappings
    - variable__measured_entity
    - variable__material_or_matrix
    - variable__method
    - variable__time_series
    - variable__temporal_resolution
    - variable__spatial_resolution
    - variable__levels
    - variable__source_field_names
    - variable__notes
    slot_usage:
      name:
        name: name
        description: Human-readable variable name or label used in the study or dataset
        required: true
    attributes:
      roles:
        name: roles
        description: Roles this variable plays in the study design or analysis. Multiple
          roles are allowed; for example, drought treatment may be both EXPERIMENTAL_FACTOR
          and STUDY_DESIGN_INDEPENDENT_VARIABLE.
        range: VariableRole
        multivalued: true
      value_type:
        name: value_type
        description: Basic type or shape of values recorded for this variable
        range: VariableValueType
      units:
        name: units
        description: Human-readable units for quantitative variables
        range: string
      unit_term:
        name: unit_term
        description: Unit ontology term, if available
        range: OntologyTerm
        inlined: true
      bervo_term:
        name: bervo_term
        description: Primary BERVO class mapping for this variable, when available
        range: BERVOTerm
        inlined: true
      mixs_terms:
        name: mixs_terms
        description: MIxS metadata terms corresponding to this variable, when the
          variable represents a MIxS sample, environmental, host, or sequencing metadata
          field.
        range: MIXSTerm
        bindings:
        - range: MIXSVariableTerm
          obligation_level:
            text: RECOMMENDED
            description: The metadata element is recommended to be present in the
              model
          binds_value_of: id
        multivalued: true
        inlined_as_list: true
      ontology_mappings:
        name: ontology_mappings
        description: Additional ontology mappings for this variable, including ENVO,
          PATO, UO, OBI, or other relevant controlled vocabularies. Statistical or
          study-design roles should generally be represented in the roles slot rather
          than repeated here.
        range: OntologyTerm
        multivalued: true
        inlined_as_list: true
      measured_entity:
        name: measured_entity
        description: Entity, organism, environmental feature, process, or system being
          measured or manipulated by this variable.
        range: string
      material_or_matrix:
        name: material_or_matrix
        description: Material, sample matrix, compartment, or context for the variable
          (e.g., soil, rhizosphere, leaf tissue, porewater, bioreactor culture).
        range: string
      method:
        name: method
        description: Measurement, manipulation, or derivation method
        range: string
      time_series:
        name: time_series
        description: True when values for this variable are captured repeatedly through
          time
        range: boolean
      temporal_resolution:
        name: temporal_resolution
        description: Temporal grain or sampling interval for time-series variables
        range: string
      spatial_resolution:
        name: spatial_resolution
        description: Spatial grain, support, or resolution for spatial variables
        range: string
      levels:
        name: levels
        description: Known categorical levels, treatment levels, bins, or allowed
          values for this variable.
        range: string
        multivalued: true
      source_field_names:
        name: source_field_names
        description: Column names, file field names, or source labels that map to
          this variable
        range: string
        multivalued: true
      notes:
        name: notes
        description: Additional notes about the variable definition or usage
        range: string
    class_uri: schema:PropertyValue
  OntologyTerm:
    name: OntologyTerm
    definition_uri: https://w3id.org/nmdc/sfas-brcs/OntologyTerm
    description: A reference to an ontology term, represented as an identifier plus
      the term label expected from the source ontology. The label field is marked
      as rdfs:label for linkml-term-validator label checks.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - ontologyTerm__id
    - ontologyTerm__label
    - ontologyTerm__mapping_relation
    - ontologyTerm__mapping_note
    attributes:
      id:
        name: id
        description: CURIE or URI for the ontology term
        identifier: true
        range: uriorcurie
        required: true
      label:
        name: label
        implements:
        - rdfs:label
        description: Human-readable ontology term label
        range: string
        required: true
      mapping_relation:
        name: mapping_relation
        description: SSSOM/SKOS mapping predicate describing how the local variable
          or field maps to this ontology term. The local variable is the subject and
          the ontology term is the object; for example, NARROW_MATCH means the ontology
          term is narrower than the local variable.
        range: OntologyMappingRelation
      mapping_note:
        name: mapping_note
        description: Curator note explaining the scope or uncertainty of this ontology
          mapping
        range: string
    class_uri: nmdc_sfas_brcs:OntologyTerm
  BERVOTerm:
    name: BERVOTerm
    definition_uri: https://w3id.org/nmdc/sfas-brcs/BERVOTerm
    description: A BERVO ontology term represented with an identifier and label
    from_schema: https://w3id.org/nmdc/sfas-brcs
    is_a: OntologyTerm
    slots:
    - ontologyTerm__label
    - ontologyTerm__mapping_relation
    - ontologyTerm__mapping_note
    - BERVOTerm_id
    slot_usage:
      id:
        name: id
        description: BERVO CURIE for the ontology term
        is_a: ontologyTerm__id
        pattern: ^BERVO:\d+$
    class_uri: nmdc_sfas_brcs:BERVOTerm
  MIXSTerm:
    name: MIXSTerm
    definition_uri: https://w3id.org/nmdc/sfas-brcs/MIXSTerm
    description: A MIxS metadata term represented with an identifier and label
    from_schema: https://w3id.org/nmdc/sfas-brcs
    is_a: OntologyTerm
    slots:
    - ontologyTerm__label
    - ontologyTerm__mapping_relation
    - ontologyTerm__mapping_note
    - MIXSTerm_id
    slot_usage:
      id:
        name: id
        description: MIxS CURIE for the metadata term
        is_a: ontologyTerm__id
        pattern: ^MIXS:\d{7}$
    class_uri: nmdc_sfas_brcs:MIXSTerm
  Reference:
    name: Reference
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Reference
    description: A publication reference with key findings. Minimal metadata is stored
      here; full bibliographic data can be fetched/cached via linkml-reference-validator.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - Reference_id
    - title
    - findings
    slot_usage:
      id:
        name: id
        implements:
        - linkml:authoritative_reference
        description: DOI of the publication (e.g., doi:10.1038/s41586-020-03127-1)
    class_uri: nmdc_sfas_brcs:Reference
  Finding:
    name: Finding
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Finding
    description: A key finding or claim extracted from a publication
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - statement
    - supporting_text
    - finding__reference
    attributes:
      reference:
        name: reference
        implements:
        - linkml:authoritative_reference
        description: DOI of the publication this finding is from (for validation)
        range: uriorcurie
    class_uri: nmdc_sfas_brcs:Finding
  PrimaryReferenceInfo:
    name: PrimaryReferenceInfo
    definition_uri: https://w3id.org/nmdc/sfas-brcs/PrimaryReferenceInfo
    description: Container for a primary reference with its metadata. Provides a structured
      way to associate a publication reference with an entity (e.g., IsolateCollection,
      Dataset) while allowing future annotations about the relationship.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - primaryReferenceInfo__reference
    - primaryReferenceInfo__relationship_note
    attributes:
      reference:
        name: reference
        description: The primary publication reference
        range: Reference
        required: true
        inlined: true
      relationship_note:
        name: relationship_note
        description: Optional note describing the relationship between the reference
          and the entity it's attached to (e.g., "Describes the isolation methods",
          "First report of these isolates")
        range: string
    class_uri: nmdc_sfas_brcs:PrimaryReferenceInfo
  ProgramOutputs:
    name: ProgramOutputs
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ProgramOutputs
    description: Summary of research outputs from a program
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - programOutputs__publication_count
    - programOutputs__patent_applications
    - programOutputs__invention_disclosures
    - programOutputs__licenses_options
    - programOutputs__patents
    - programOutputs__startups
    attributes:
      publication_count:
        name: publication_count
        description: Number or description of publications
        range: string
      patent_applications:
        name: patent_applications
        description: Number of patent applications
        range: integer
      invention_disclosures:
        name: invention_disclosures
        description: Number of invention disclosures
        range: integer
      licenses_options:
        name: licenses_options
        description: Number of licenses or options
        range: integer
      patents:
        name: patents
        description: Number of patents granted
        range: integer
      startups:
        name: startups
        description: Number of startup companies formed
        range: integer
    class_uri: nmdc_sfas_brcs:ProgramOutputs
  IsolateCollection:
    name: IsolateCollection
    definition_uri: https://w3id.org/nmdc/sfas-brcs/IsolateCollection
    description: A collection of cultured microbial isolates maintained by a research
      program. Provides catalog-level metadata about the collection; detailed isolate
      records are maintained in external systems (KBase, JGI, culture collections).
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - name
    - description
    - isolateCollection__organism_types
    - isolateCollection__isolate_count
    - isolateCollection__genome_count
    - isolateCollection__source_environments
    - isolateCollection__isolation_methods
    - isolateCollection__host_organisms
    - isolateCollection__culture_collection_url
    - isolateCollection__genome_catalog_url
    - isolateCollection__kbase_narrative_id
    - isolateCollection__primary_reference
    - isolateCollection__primary_reference_info
    attributes:
      organism_types:
        name: organism_types
        description: Types of organisms in this collection
        range: OrganismType
        multivalued: true
      isolate_count:
        name: isolate_count
        description: Approximate number of isolates in the collection
        range: integer
      genome_count:
        name: genome_count
        description: Number of isolates with sequenced genomes
        range: integer
      source_environments:
        name: source_environments
        description: Environments from which isolates were obtained (e.g., rhizosphere,
          subsurface, contaminated groundwater, phyllosphere)
        range: string
        multivalued: true
      isolation_methods:
        name: isolation_methods
        description: Brief description of isolation methods used (e.g., aerobic plating,
          anaerobic enrichment, single-cell sorting)
        range: string
        multivalued: true
      host_organisms:
        name: host_organisms
        description: Host organisms if isolates are host-associated (e.g., Populus,
          Panicum virgatum)
        range: string
        multivalued: true
      culture_collection_url:
        name: culture_collection_url
        description: URL to browse or request live cultures
        range: uri
      genome_catalog_url:
        name: genome_catalog_url
        description: URL to genome data (KBase narrative, JGI, NCBI BioProject)
        range: uri
      kbase_narrative_id:
        name: kbase_narrative_id
        description: KBase narrative ID containing isolate genomes if applicable
        range: string
      primary_reference:
        name: primary_reference
        implements:
        - linkml:authoritative_reference
        description: 'DOI of primary publication describing the collection. DEPRECATED:
          Use primary_reference_info for new entries to enable title validation.'
        range: uriorcurie
      primary_reference_info:
        name: primary_reference_info
        description: Primary publication reference with structured metadata for validation.
          Preferred over primary_reference - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true
    class_uri: nmdc_sfas_brcs:IsolateCollection
  FieldSite:
    name: FieldSite
    definition_uri: https://w3id.org/nmdc/sfas-brcs/FieldSite
    description: A field research site associated with a research program
    from_schema: https://w3id.org/nmdc/sfas-brcs
    mappings:
    - schema:Place
    is_a: NamedThing
    slots:
    - description
    - fieldSite__location
    - fieldSite__site_type
    - fieldSite__pi
    - fieldSite__institution
    - fieldSite__relevance
    - fieldSite__contaminants
    - fieldSite__contamination_source
    - fieldSite__elevation_m
    - fieldSite__mean_annual_temp_c
    - fieldSite__mean_annual_precip_cm
    - FieldSite_id
    - FieldSite_name
    slot_usage:
      id:
        name: id
        description: A unique identifier for the field site
        required: true
      name:
        name: name
        description: The canonical name of the field site
        required: true
    attributes:
      location:
        name: location
        description: Geographic location of the field site
        range: string
      site_type:
        name: site_type
        description: Type of field site (e.g., NEON, LTER, RESEARCH_STATION, NATIONAL_FOREST,
          NATIONAL_PARK, AGRICULTURAL, URBAN, COASTAL_WETLAND)
        range: string
      pi:
        name: pi
        description: Principal investigator leading research at this site
        range: string
      institution:
        name: institution
        description: Institution of the principal investigator
        range: string
      relevance:
        name: relevance
        description: Research relevance categories for the site (e.g., BIOTECH, BIOENERGY,
          HAZARD_PREDICTION, WILDFIRE, CLIMATE_CHANGE, AGRICULTURE)
        range: string
        multivalued: true
      contaminants:
        name: contaminants
        description: Contaminants present at the site (if applicable)
        range: string
        multivalued: true
      contamination_source:
        name: contamination_source
        description: Source of contamination at the site
        range: string
      elevation_m:
        name: elevation_m
        description: Elevation of the field site in meters above sea level
        range: integer
      mean_annual_temp_c:
        name: mean_annual_temp_c
        description: Mean annual temperature at the site in degrees Celsius
        range: float
      mean_annual_precip_cm:
        name: mean_annual_precip_cm
        description: Mean annual precipitation at the site in centimeters
        range: float
    class_uri: schema:Place
  Technology:
    name: Technology
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Technology
    description: A technology or tool developed by a research program
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - name
    - description
    class_uri: nmdc_sfas_brcs:Technology
  WebReference:
    name: WebReference
    definition_uri: https://w3id.org/nmdc/sfas-brcs/WebReference
    description: A reference to a web resource such as a project page, news article,
      or documentation. Used for citing non-DOI sources that document research activities.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - webReference__url
    - webReference__title
    - webReference__summary
    attributes:
      url:
        name: url
        description: URL of the web resource
        range: uri
        required: true
      title:
        name: title
        description: Title of the web page or resource
        range: string
        required: true
      summary:
        name: summary
        description: Brief description of what content can be found at this URL. Serves
          as an annotation to help users understand what information the source provides
          before clicking.
        range: string
    class_uri: nmdc_sfas_brcs:WebReference
  StudyDesign:
    name: StudyDesign
    definition_uri: https://w3id.org/nmdc/sfas-brcs/StudyDesign
    description: Study-level design metadata that applies across variables and datasets.
      This captures the design pattern, experimental or observational units, replication,
      blocking, randomization, and related notes separately from the data dictionary
      entries for individual variables.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - description
    - studyDesign__design_types
    - studyDesign__experimental_units
    - studyDesign__observational_units
    - studyDesign__sampling_strategy
    - studyDesign__replication
    - studyDesign__randomization
    - studyDesign__blocking
    - studyDesign__controls
    - studyDesign__notes
    attributes:
      design_types:
        name: design_types
        description: OBI or related ontology terms describing the study design
        range: OntologyTerm
        bindings:
        - range: StudyDesignTerm
          obligation_level:
            text: RECOMMENDED
            description: The metadata element is recommended to be present in the
              model
          binds_value_of: id
        multivalued: true
        inlined_as_list: true
      experimental_units:
        name: experimental_units
        description: Units assigned to treatments or interventions
        range: string
        multivalued: true
      observational_units:
        name: observational_units
        description: Units on which measurements are made
        range: string
        multivalued: true
      sampling_strategy:
        name: sampling_strategy
        description: Sampling strategy or sampling design used by the study
        range: string
      replication:
        name: replication
        description: Description of biological, technical, field, or model replication
        range: string
      randomization:
        name: randomization
        description: Description of randomization, if used
        range: string
      blocking:
        name: blocking
        description: Description of blocking or stratification, if used
        range: string
      controls:
        name: controls
        description: Description of control groups, baselines, or reference conditions
        range: string
      notes:
        name: notes
        description: Additional notes about the study design
        range: string
    class_uri: nmdc_sfas_brcs:StudyDesign
  NMDCStudyReference:
    name: NMDCStudyReference
    definition_uri: https://w3id.org/nmdc/sfas-brcs/NMDCStudyReference
    description: A reference to an NMDC study associated with a research program.
      Links BRC/SFA research to specific studies in the National Microbiome Data Collaborative.
      Can also represent studies that are candidates for NMDC ingest (nmdc_ingest_target=true).
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - nmdc_study_id
    - name
    - description
    - primary_reference
    - keywords
    - field_site_ids
    - study_design
    - variables
    - nMDCStudyReference__pi
    - nMDCStudyReference__bioproject_ids
    - nMDCStudyReference__gold_study_id
    - nMDCStudyReference__jgi_proposal_id
    - nMDCStudyReference__brc_dataset_ids
    - nMDCStudyReference__nmdc_ingest_target
    - nMDCStudyReference__nmdc_ingest_priority
    - nMDCStudyReference__data_modalities
    - nMDCStudyReference__sample_count
    - nMDCStudyReference__organism
    - nMDCStudyReference__preprocessed_data_available
    - nMDCStudyReference__preprocessed_data_counts
    - nMDCStudyReference__ncbi_data_quality_notes
    - nMDCStudyReference__primary_reference_info
    - nMDCStudyReference__source_reference
    - nMDCStudyReference__synthetic_communities
    attributes:
      pi:
        name: pi
        description: Principal investigator name for this study
        range: string
      bioproject_ids:
        name: bioproject_ids
        description: NCBI BioProject identifiers associated with this study
        range: string
        multivalued: true
      gold_study_id:
        name: gold_study_id
        description: GOLD study identifier (e.g., gold:Gs0128851)
        range: string
      jgi_proposal_id:
        name: jgi_proposal_id
        description: JGI proposal identifier
        range: string
      brc_dataset_ids:
        name: brc_dataset_ids
        description: Dataset identifiers from the BRC API (api.bioenergy.org) associated
          with this study. These are the native identifiers which may be DOIs, BioProject
          IDs, or repository-specific IDs.
        range: string
        multivalued: true
      nmdc_ingest_target:
        name: nmdc_ingest_target
        description: If true, indicates this study has data that should be targeted
          for ingest into NMDC but is not yet registered there.
        range: boolean
      nmdc_ingest_priority:
        name: nmdc_ingest_priority
        description: Priority level for NMDC ingest consideration. HIGH for datasets
          with rich microbiome data ready for processing, MEDIUM for datasets that
          need some preparation, LOW for marginal candidates.
        range: NMDCIngestPriority
      data_modalities:
        name: data_modalities
        description: Types of data generated in this study (e.g., 16S_AMPLICON, METAGENOMICS)
        range: DataType
        multivalued: true
      sample_count:
        name: sample_count
        description: Number of samples in the study
        range: integer
      organism:
        name: organism
        description: Primary organism studied
        range: string
      preprocessed_data_available:
        name: preprocessed_data_available
        description: Types of preprocessed/derived data products available in public
          repositories (e.g., NCBI) for this study. Examples include MAGs (metagenome-assembled
          genomes), genome assemblies, gene annotations, etc. Used to identify studies
          with analysis-ready data that may meet NMDC quality standards.
        range: PreprocessedDataType
        multivalued: true
      preprocessed_data_counts:
        name: preprocessed_data_counts
        description: Counts of preprocessed data products available (e.g., "28 MAGs",
          "135 Gbases"). Free text to capture quantity and type.
        range: string
      ncbi_data_quality_notes:
        name: ncbi_data_quality_notes
        description: Notes about the quality or completeness of preprocessed data
          in NCBI. Used to track whether external data meets NMDC standards.
        range: string
      primary_reference_info:
        name: primary_reference_info
        description: Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true
      source_reference:
        name: source_reference
        description: Web reference documenting this study (project page, news article,
          etc.) for studies without a primary DOI publication.
        range: WebReference
        inlined: true
      synthetic_communities:
        name: synthetic_communities
        description: CURIEs referencing synthetic community (SynCom) entries in the
          CommunityMech knowledge base that are associated with this study.
        range: uriorcurie
        multivalued: true
    class_uri: nmdc_sfas_brcs:NMDCStudyReference
  Analysis:
    name: Analysis
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Analysis
    description: A computational analysis performed on research data. This is an abstract
      base class for different types of analyses including KBase narratives, pipeline
      runs, and other computational workflows.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    is_a: NamedThing
    abstract: true
    slots:
    - id
    - name
    - description
    - primary_reference
    - additional_references
    - analysis__analysis_type
    - analysis__input_data_description
    - analysis__output_data_types
    - analysis__primary_reference_info
    attributes:
      analysis_type:
        name: analysis_type
        description: Type of analysis performed
        range: AnalysisType
      input_data_description:
        name: input_data_description
        description: Description of input data used
        range: string
      output_data_types:
        name: output_data_types
        description: Types of data objects produced
        range: DataType
        multivalued: true
      primary_reference_info:
        name: primary_reference_info
        description: Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true
    class_uri: nmdc_sfas_brcs:Analysis
  KBaseNarrative:
    name: KBaseNarrative
    definition_uri: https://w3id.org/nmdc/sfas-brcs/KBaseNarrative
    description: A KBase Narrative - a reproducible, shareable analysis workflow in
      the DOE Systems Biology Knowledgebase. Narratives combine data, analysis steps,
      and documentation in an executable Jupyter-like notebook format. Can be made
      public, shared, and assigned DOIs for citation.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    is_a: Analysis
    slots:
    - id
    - name
    - description
    - primary_reference
    - additional_references
    - analysis__analysis_type
    - analysis__input_data_description
    - analysis__output_data_types
    - analysis__primary_reference_info
    - kBaseNarrative__kbase_narrative_id
    - kBaseNarrative__kbase_narrative_url
    - kBaseNarrative__kbase_workspace_id
    - kBaseNarrative__osti_doi
    - kBaseNarrative__is_static
    - kBaseNarrative__genome_count
    - kBaseNarrative__sample_count
    - kBaseNarrative__related_narratives
    attributes:
      kbase_narrative_id:
        name: kbase_narrative_id
        description: KBase narrative numeric ID (e.g., "109073"). This is the number
          that appears in URLs like kbase.us/n/109073/63/
        range: string
      kbase_narrative_url:
        name: kbase_narrative_url
        description: Full URL to the public narrative
        range: uri
      kbase_workspace_id:
        name: kbase_workspace_id
        description: Workspace ID for programmatic access via KBase Workspace API
        range: string
      osti_doi:
        name: osti_doi
        description: 'DOI assigned by OSTI if narrative has been registered as a citable
          dataset (format: 10.25982/...)'
        range: string
      is_static:
        name: is_static
        description: Whether this is a static (snapshot) narrative suitable for citation
        range: boolean
      genome_count:
        name: genome_count
        description: Number of genomes/MAGs in this narrative
        range: integer
      sample_count:
        name: sample_count
        description: Number of samples in this narrative
        range: integer
      related_narratives:
        name: related_narratives
        description: IDs of related KBase narratives
        range: string
        multivalued: true
    class_uri: nmdc_sfas_brcs:KBaseNarrative
  FlagshipGenome:
    name: FlagshipGenome
    definition_uri: https://w3id.org/nmdc/sfas-brcs/FlagshipGenome
    description: A flagship genome sequenced and maintained by a facility
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - name
    - description
    - flagshipGenome__common_name
    - flagshipGenome__year
    attributes:
      common_name:
        name: common_name
        description: Common name of the organism
        range: string
      year:
        name: year
        description: Year the genome was sequenced
        range: integer
    class_uri: nmdc_sfas_brcs:FlagshipGenome
  ReferenceData:
    name: ReferenceData
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ReferenceData
    description: Reference data maintained by a facility
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - referenceData__microbial_genomes
    - referenceData__plant_genomes
    - referenceData__biolog_media
    - referenceData__reactions_compounds
    attributes:
      microbial_genomes:
        name: microbial_genomes
        description: Number/source of microbial genomes
        range: string
      plant_genomes:
        name: plant_genomes
        description: Number/source of plant genomes
        range: string
      biolog_media:
        name: biolog_media
        description: Number of Biolog media formulations
        range: string
      reactions_compounds:
        name: reactions_compounds
        description: Number/source of reactions and compounds
        range: string
    class_uri: nmdc_sfas_brcs:ReferenceData
  Capability:
    name: Capability
    definition_uri: https://w3id.org/nmdc/sfas-brcs/Capability
    description: A scientific capability or resource provided by a user facility,
      including instrumentation, platforms, and analytical services.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - name
    - description
    - capability__capability_type
    - capability__instruments
    - capability__access_mode
    - capability__throughput
    - capability__year_established
    - capability__url
    - capability__applications
    - capability__data_products
    - capability__status
    - capability__commissioned_date
    - capability__leader
    - capability__future_expansion
    attributes:
      capability_type:
        name: capability_type
        description: The type/category of capability
        range: CapabilityType
      instruments:
        name: instruments
        description: Specific instruments or equipment supporting this capability
        range: Instrument
        multivalued: true
        inlined_as_list: true
      access_mode:
        name: access_mode
        description: How users can access this capability
        range: string
      throughput:
        name: throughput
        description: Throughput or capacity metrics
        range: string
      year_established:
        name: year_established
        description: Year this capability was established
        range: integer
      url:
        name: url
        description: URL for more information about this capability
        range: uri
      applications:
        name: applications
        description: Key applications or use cases for this capability
        range: string
        multivalued: true
      data_products:
        name: data_products
