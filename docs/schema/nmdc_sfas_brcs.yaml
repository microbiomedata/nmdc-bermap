          amplicon sequences) with good metadata, ready for NMDC processing. Should
          be prioritized for ingest.
      MEDIUM:
        text: MEDIUM
        description: Medium priority - dataset has relevant microbiome data but may
          need metadata enrichment or format conversion before ingest.
      LOW:
        text: LOW
        description: Low priority - dataset has some microbiome relevance but is either
          small, has limited metadata, or is a marginal candidate.
