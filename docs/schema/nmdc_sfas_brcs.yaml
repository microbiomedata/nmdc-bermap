name: nmdc-sfas-brcs
description: 'A LinkML schema for representing DOE BER (Biological and Environmental
  Research)

  funded Scientific Focus Areas (SFAs) and Bioenergy Research Centers (BRCs),

  including their metadata, datasets, publications, and organizational structure.'
title: NMDC SFAs and BRCs Schema
see_also:
- https://www.genomicscience.energy.gov
- https://ess.science.energy.gov
- https://science.osti.gov/ber
id: https://w3id.org/nmdc/sfas-brcs
imports:
- linkml:types
license: MIT
prefixes:
  nmdc_sfas_brcs:
    prefix_prefix: nmdc_sfas_brcs
    prefix_reference: https://w3id.org/nmdc/sfas-brcs/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  orcid:
    prefix_prefix: orcid
    prefix_reference: https://orcid.org/
  ror:
    prefix_prefix: ror
    prefix_reference: https://ror.org/
  doi:
    prefix_prefix: doi
    prefix_reference: https://doi.org/
  pmid:
    prefix_prefix: pmid
    prefix_reference: https://www.ncbi.nlm.nih.gov/pubmed/
  obo:
    prefix_prefix: obo
    prefix_reference: http://purl.obolibrary.org/obo/
  IAO:
    prefix_prefix: IAO
    prefix_reference: http://purl.obolibrary.org/obo/IAO_
  OBI:
    prefix_prefix: OBI
    prefix_reference: http://purl.obolibrary.org/obo/OBI_
  STATO:
    prefix_prefix: STATO
    prefix_reference: http://purl.obolibrary.org/obo/STATO_
  EFO:
    prefix_prefix: EFO
    prefix_reference: http://www.ebi.ac.uk/efo/EFO_
  NCBITaxon:
    prefix_prefix: NCBITaxon
    prefix_reference: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO:
    prefix_prefix: BERVO
    prefix_reference: https://w3id.org/bervo/BERVO_
  MIXS:
    prefix_prefix: MIXS
    prefix_reference: https://w3id.org/mixs/
  communitymech:
    prefix_prefix: communitymech
    prefix_reference: https://w3id.org/communitymech/
default_prefix: nmdc_sfas_brcs
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  ProgramType:
    name: ProgramType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ProgramType
    description: Types of DOE BER research programs
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      BIOENERGY_RESEARCH_CENTER:
        text: BIOENERGY_RESEARCH_CENTER
        description: A Bioenergy Research Center (BRC) - large-scale, multi-institutional
          center focused on biofuels and bioproducts from plant biomass
      SCIENTIFIC_FOCUS_AREA:
        text: SCIENTIFIC_FOCUS_AREA
        description: A Scientific Focus Area (SFA) - integrated research program at
          DOE national laboratories
      USER_FACILITY:
        text: USER_FACILITY
        description: A DOE BER User Facility providing resources to the scientific
          community
      DATA_REPOSITORY:
        text: DATA_REPOSITORY
        description: A data repository or archive
      DATA_COLLABORATIVE:
        text: DATA_COLLABORATIVE
        description: A collaborative data initiative
      BIOPREPAREDNESS_INITIATIVE:
        text: BIOPREPAREDNESS_INITIATIVE
        description: A biopreparedness research initiative such as BRaVE (Biopreparedness
          Research Virtual Environment) - typically cross-cutting, time-limited projects
          spanning multiple DOE offices
      AI_PILOT_PROJECT:
        text: AI_PILOT_PROJECT
        description: Artificial intelligence pilot project or AI-enabled science initiative,
          typically cross-cutting and often involving BER and ASCR.
      FIELD_CAMPAIGN:
        text: FIELD_CAMPAIGN
        description: Time-limited coordinated field campaign, often associated with
          an SFA or other BER program, producing campaign-specific observations and
          datasets.
      OTHER_INITIATIVE:
        text: OTHER_INITIATIVE
        description: Other research initiatives that don't fit traditional categories
  SFAType:
    name: SFAType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/SFAType
    description: Types of Scientific Focus Areas by program area
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      GENOMIC_SCIENCE_SFA:
        text: GENOMIC_SCIENCE_SFA
        description: SFA within the Genomic Science Program focusing on plant and
          microbial systems biology
      ENVIRONMENTAL_SYSTEM_SCIENCE_SFA:
        text: ENVIRONMENTAL_SYSTEM_SCIENCE_SFA
        description: SFA within the Environmental System Science program focusing
          on watershed and ecosystem processes
      ENVIRONMENTAL_MICROBIOME_SCIENCE:
        text: ENVIRONMENTAL_MICROBIOME_SCIENCE
        description: SFA focused on environmental microbiome research
      SECURE_BIOSYSTEMS_DESIGN:
        text: SECURE_BIOSYSTEMS_DESIGN
        description: SFA focused on secure biosystems design and biocontainment
  InstitutionType:
    name: InstitutionType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/InstitutionType
    description: Types of research institutions
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      NATIONAL_LABORATORY:
        text: NATIONAL_LABORATORY
        description: A DOE National Laboratory
      UNIVERSITY:
        text: UNIVERSITY
        description: A university or academic institution
      RESEARCH_INSTITUTE:
        text: RESEARCH_INSTITUTE
        description: A research institute
      FEDERAL_AGENCY:
        text: FEDERAL_AGENCY
        description: A federal government agency
      PRIVATE_SECTOR:
        text: PRIVATE_SECTOR
        description: A private sector organization
  PreprocessedDataType:
    name: PreprocessedDataType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/PreprocessedDataType
    description: Types of preprocessed or derived data products available in public
      repositories. Used to identify studies with analysis-ready data for NMDC consideration.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      MAGS:
        text: MAGS
        description: Metagenome-assembled genomes - draft genomes reconstructed from
          metagenomic data through binning and assembly
      GENOME_ASSEMBLIES:
        text: GENOME_ASSEMBLIES
        description: Assembled genome sequences (contigs, scaffolds, or complete)
      GENE_ANNOTATIONS:
        text: GENE_ANNOTATIONS
        description: Predicted gene calls and functional annotations
      FUNCTIONAL_ANNOTATIONS:
        text: FUNCTIONAL_ANNOTATIONS
        description: Functional annotations (COG, KEGG, Pfam, etc.)
      TAXONOMIC_CLASSIFICATIONS:
        text: TAXONOMIC_CLASSIFICATIONS
        description: Taxonomic assignments for sequences or bins
      READ_QC:
        text: READ_QC
        description: Quality-controlled sequencing reads
      ASSEMBLY_QC:
        text: ASSEMBLY_QC
        description: Assembly quality metrics (CheckM, QUAST, etc.)
      METABOLIC_MODELS:
        text: METABOLIC_MODELS
        description: Genome-scale metabolic reconstructions
      PHYLOGENETIC_TREES:
        text: PHYLOGENETIC_TREES
        description: Phylogenetic trees or placements
  DataType:
    name: DataType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/DataType
    description: Types of scientific data
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      GENOMICS:
        text: GENOMICS
        description: Genomic sequence data
        meaning: OBI:0000626
        title: DNA sequencing assay
      METAGENOMICS:
        text: METAGENOMICS
        description: Metagenomic sequence data
        meaning: OBI:0002623
        title: whole metagenome sequencing assay
      TRANSCRIPTOMICS:
        text: TRANSCRIPTOMICS
        description: Transcriptomic expression data
        meaning: OBI:0000424
        title: transcription profiling assay
      METATRANSCRIPTOMICS:
        text: METATRANSCRIPTOMICS
        description: Metatranscriptomic data
      AMPLICON_16S:
        text: AMPLICON_16S
        description: 16S rRNA gene amplicon sequencing for bacterial/archaeal profiling
        meaning: OBI:0002763
        title: 16s ribosomal gene sequencing assay
      AMPLICON_ITS:
        text: AMPLICON_ITS
        description: ITS amplicon sequencing for fungal profiling
