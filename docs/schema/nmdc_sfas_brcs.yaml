classes:
  ResearchProgramCollection:
    name: ResearchProgramCollection
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ResearchProgramCollection
    description: A container for DOE BER funded research programs including Bioenergy
      Research Centers (BRCs), Scientific Focus Areas (SFAs), and User Facilities.
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - researchProgramCollection__bioenergy_research_centers
    - researchProgramCollection__genomic_science_sfas
    - researchProgramCollection__environmental_system_science_sfas
    - researchProgramCollection__user_facilities
    - researchProgramCollection__other_programs
    - researchProgramCollection__ai_projects
    - researchProgramCollection__sites
    - researchProgramCollection__metadata
    attributes:
      bioenergy_research_centers:
        name: bioenergy_research_centers
        description: Collection of DOE Bioenergy Research Centers
        range: BioenergyResearchCenter
        multivalued: true
        inlined_as_list: true
      genomic_science_sfas:
        name: genomic_science_sfas
        description: Collection of Genomic Science Program Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      environmental_system_science_sfas:
        name: environmental_system_science_sfas
        description: Collection of Environmental System Science Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      user_facilities:
        name: user_facilities
        description: Collection of DOE BER User Facilities
        range: UserFacility
        multivalued: true
        inlined_as_list: true
      other_programs:
        name: other_programs
        description: Other DOE research programs and initiatives that don't fit the
          traditional SFA/BRC/Facility categories (e.g., BRaVE, cross-cutting initiatives,
          time-limited projects)
        range: OtherProgram
        multivalued: true
        inlined_as_list: true
      ai_projects:
        name: ai_projects
        description: DOE artificial intelligence pilot projects and related AI-enabled
          science initiatives, including BER/ASCR-supported projects.
        range: ArtificialIntelligenceProject
        multivalued: true
        inlined_as_list: true
      sites:
        name: sites
        description: Canonical collection of field sites referenced by programs and
          studies. Sites are modeled once here and linked by identifier.
        range: FieldSite
        multivalued: true
        inlined_as_list: true
      metadata:
        name: metadata
        description: Metadata about this collection
        range: CollectionMetadata
    class_uri: nmdc_sfas_brcs:ResearchProgramCollection
    tree_root: true
  CollectionMetadata:
    name: CollectionMetadata
    definition_uri: https://w3id.org/nmdc/sfas-brcs/CollectionMetadata
    description: Metadata about the research program collection
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slots:
    - collectionMetadata__compiled_date
    - collectionMetadata__sources
    - collectionMetadata__notes
    attributes:
      compiled_date:
        name: compiled_date
        description: Date this collection was compiled (ISO 8601 format)
        range: string
      sources:
        name: sources
        description: Sources used to compile this collection
        range: string
        multivalued: true
      notes:
        name: notes
        description: Additional notes about the collection
        range: string
    class_uri: nmdc_sfas_brcs:CollectionMetadata
  NamedThing:
    name: NamedThing
    definition_uri: https://w3id.org/nmdc/sfas-brcs/NamedThing
