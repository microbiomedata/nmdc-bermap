    name: ResearchProgram
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ResearchProgram
    description: A DOE BER funded research program. This is the common parent class
      for Bioenergy Research Centers (BRCs) and Scientific Focus Areas (SFAs). Both
      program types share common attributes including funding, institutions, personnel,
      research focus, and outputs.
