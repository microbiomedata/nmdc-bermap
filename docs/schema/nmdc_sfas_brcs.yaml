  InteractionType:
    name: InteractionType
    definition_uri: https://w3id.org/nmdc/sfas-brcs/InteractionType
    description: Types of bacterial-fungal interactions based on ecological outcome
    from_schema: https://w3id.org/nmdc/sfas-brcs
    permissible_values:
      MUTUALISM:
        text: MUTUALISM
        description: Win-win interaction where bacteria and fungi achieve functional
          complementarity through resource sharing (e.g., mycorrhizal symbiosis, lichen
          symbiosis)
      ANTAGONISM:
        text: ANTAGONISM
        description: Reciprocal inhibition including pathogen infection, antibiotic
          production, and biological control mechanisms
      COMPETITION:
        text: COMPETITION
        description: Resource and spatial rivalry maintaining community stability
          through niche differentiation (e.g., iron, biotin, adhesion sites)
      COMMENSALISM:
        text: COMMENSALISM
        description: Interaction where one partner benefits while the other is unaffected
      PARASITISM:
        text: PARASITISM
        description: Interaction where one partner benefits at the expense of the
          other
      ENDOSYMBIOSIS:
        text: ENDOSYMBIOSIS
        description: Obligate or facultative intracellular association where bacteria
          live within fungal cells (endohyphal bacteria)
  InteractionMode:
    name: InteractionMode
