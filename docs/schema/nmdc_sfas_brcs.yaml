      NUTRIENT_EXCHANGE:
        text: NUTRIENT_EXCHANGE
        description: Metabolite exchange including carbon, nitrogen, vitamins
      CHEMOTAXIS:
        text: CHEMOTAXIS
        description: Directed movement in response to chemical gradients
slots:
  id:
    name: id
    definition_uri: https://w3id.org/nmdc/sfas-brcs/id
    description: A unique identifier for an entity
    from_schema: https://w3id.org/nmdc/sfas-brcs
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: Reference
    domain_of:
    - NamedThing
    - Reference
    range: uriorcurie
    required: true
  acronym:
    name: acronym
    definition_uri: https://w3id.org/nmdc/sfas-brcs/acronym
    description: Short acronym or abbreviation for the program (e.g., GLBRC, ENIGMA)
    from_schema: https://w3id.org/nmdc/sfas-brcs
    mappings:
    - schema:alternateName
    slot_uri: schema:alternateName
    owner: UserFacility
    domain_of:
    - ResearchProgram
    - UserFacility
    range: string
  ror_id:
    name: ror_id
    definition_uri: https://w3id.org/nmdc/sfas-brcs/ror_id
    description: Research Organization Registry identifier
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slot_uri: nmdc_sfas_brcs:ror_id
    owner: Institution
    domain_of:
    - Institution
    range: uriorcurie
    pattern: ^ror:\d{9}$
  orcid:
    name: orcid
    definition_uri: https://w3id.org/nmdc/sfas-brcs/orcid
    description: ORCID identifier for a person
    from_schema: https://w3id.org/nmdc/sfas-brcs
    slot_uri: nmdc_sfas_brcs:orcid
    owner: Person
    domain_of:
    - Person
    range: uriorcurie
    pattern: ^orcid:\d{4}-\d{4}-\d{4}-\d{3}[0-9X]$
