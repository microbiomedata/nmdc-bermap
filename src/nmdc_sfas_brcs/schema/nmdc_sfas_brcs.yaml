---
id: https://w3id.org/nmdc/sfas-brcs
name: nmdc-sfas-brcs
title: NMDC SFAs and BRCs Schema
description: |-
  A LinkML schema for representing DOE BER (Biological and Environmental Research)
  funded Scientific Focus Areas (SFAs) and Bioenergy Research Centers (BRCs),
  including their metadata, datasets, publications, and organizational structure.
license: MIT
see_also:
  - https://www.genomicscience.energy.gov
  - https://ess.science.energy.gov
  - https://science.osti.gov/ber

prefixes:
  nmdc_sfas_brcs: https://w3id.org/nmdc/sfas-brcs/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  skos: http://www.w3.org/2004/02/skos/core#
  orcid: https://orcid.org/
  ror: https://ror.org/
  doi: https://doi.org/
  pmid: https://www.ncbi.nlm.nih.gov/pubmed/
  obo: http://purl.obolibrary.org/obo/
  IAO: http://purl.obolibrary.org/obo/IAO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  STATO: http://purl.obolibrary.org/obo/STATO_
  EFO: http://www.ebi.ac.uk/efo/EFO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: https://w3id.org/bervo/BERVO_
  MIXS: https://w3id.org/mixs/
  communitymech: https://w3id.org/communitymech/

default_prefix: nmdc_sfas_brcs
default_range: string

imports:
  - linkml:types

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Container / Root Classes
  # ---------------------------------------------------------------------------

  ResearchProgramCollection:
    description: >-
      A container for DOE BER funded research programs including Bioenergy
      Research Centers (BRCs), Scientific Focus Areas (SFAs), and User Facilities.
    tree_root: true
    attributes:
      bioenergy_research_centers:
        description: Collection of DOE Bioenergy Research Centers
        range: BioenergyResearchCenter
        multivalued: true
        inlined_as_list: true
      genomic_science_sfas:
        description: Collection of Genomic Science Program Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      environmental_system_science_sfas:
        description: Collection of Environmental System Science Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      user_facilities:
        description: Collection of DOE BER User Facilities
        range: UserFacility
        multivalued: true
        inlined_as_list: true
      other_programs:
        description: >-
          Other DOE research programs and initiatives that don't fit the
          traditional SFA/BRC/Facility categories (e.g., BRaVE, cross-cutting
          initiatives, time-limited projects)
        range: OtherProgram
        multivalued: true
        inlined_as_list: true
      ai_projects:
        description: >-
          DOE artificial intelligence pilot projects and related AI-enabled
          science initiatives, including BER/ASCR-supported projects.
        range: ArtificialIntelligenceProject
        multivalued: true
        inlined_as_list: true
      sites:
        description: >-
          Canonical collection of field sites referenced by programs and
          studies. Sites are modeled once here and linked by identifier.
        range: FieldSite
        multivalued: true
        inlined_as_list: true
      metadata:
        description: Metadata about this collection
        range: CollectionMetadata

  CollectionMetadata:
    description: Metadata about the research program collection
    attributes:
      compiled_date:
        description: Date this collection was compiled (ISO 8601 format)
        range: string
      sources:
        description: Sources used to compile this collection
        range: string
        multivalued: true
      notes:
        description: Additional notes about the collection
        range: string

  # ---------------------------------------------------------------------------
  # Base Classes
  # ---------------------------------------------------------------------------

  NamedThing:
    description: >-
      A generic grouping for any identifiable entity
    abstract: true
    slots:
      - id
      - name
      - description
    class_uri: schema:Thing

  # ---------------------------------------------------------------------------
  # Research Programs (Common Parent for BRCs and SFAs)
  # ---------------------------------------------------------------------------

  ResearchProgram:
    description: >-
      A DOE BER funded research program. This is the common parent class for
      Bioenergy Research Centers (BRCs) and Scientific Focus Areas (SFAs).
      Both program types share common attributes including funding, institutions,
      personnel, research focus, and outputs.
    is_a: NamedThing
    abstract: true
    slots:
      - acronym
      - program_type
      - start_date
      - end_date
      - lead_institution
      - partner_institutions
      - principal_investigators
      - funding
      - location
      - websites
      - scientific_questions
      - keywords
      - data_types
      - data_collection_modalities
      - interaction_types
      - interaction_modes
      - nmdc_umbrella_study
      - studies
      - analyses
      - kbase_genome_collection
      - datasets
      - field_site_ids
      - key_publications
      - established
      - collaborators
      - isolate_collections
      - research_resources
      - phenotype_assays
    slot_usage:
      id:
        description: A unique identifier for the research program (e.g., nmdc_sfas_brcs:glbrc)
        pattern: "^([a-z][a-z0-9_]*:)?[a-z][a-z0-9_]*$"
      name:
        description: The full official name of the research program
        required: true

  BioenergyResearchCenter:
    description: >-
      A DOE Bioenergy Research Center (BRC). BRCs are large-scale, multi-institutional
      research centers focused on developing sustainable biofuels and bioproducts
      from plant biomass. The BRC program is part of the Genomic Science portfolio
      within DOE's Office of Science Office of Biological and Environmental Research.
    is_a: ResearchProgram
    class_uri: OBI:0000835
    slots:
      - outputs
      - predecessor
    slot_usage:
      program_type:
        ifabsent: "string(BIOENERGY_RESEARCH_CENTER)"

  ScientificFocusArea:
    description: >-
      A DOE Scientific Focus Area (SFA). SFAs are integrated research programs
      at DOE national laboratories focused on specific scientific areas within
      BER's portfolio. SFAs conduct coordinated, team-oriented research taking
      advantage of national laboratory strengths.
    is_a: ResearchProgram
    slots:
      - sfa_type
      - technologies_developed
      - co_investigators
    slot_usage:
      program_type:
        ifabsent: "string(SCIENTIFIC_FOCUS_AREA)"

  OtherProgram:
    description: >-
      Other DOE research programs and initiatives that don't fit the traditional
      SFA/BRC/Facility categories. Examples include BRaVE (Biopreparedness Research
      Virtual Environment) projects, cross-cutting initiatives, and time-limited
      collaborative projects spanning multiple DOE offices.
    is_a: ResearchProgram
    slots:
      - initiative_name
      - funding_period
      - participating_offices
    slot_usage:
      program_type:
        ifabsent: "string(OTHER_INITIATIVE)"

  ArtificialIntelligenceProject:
    description: >-
      A DOE artificial intelligence project or pilot initiative using AI/ML,
      agentic systems, data lakehouses, autonomous laboratories, or related
      computational methods to advance BER-relevant biological and environmental
      science.
    is_a: OtherProgram
    slot_usage:
      program_type:
        ifabsent: "string(AI_PILOT_PROJECT)"

  UserFacility:
    description: >-
      A DOE BER User Facility providing resources and capabilities to the
      broader scientific community. Examples include JGI, EMSL, and KBase.
    is_a: NamedThing
    slots:
      - acronym
      - program_type
      - start_date
      - end_date
      - lead_institution
      - lead_institutions
      - funding
      - websites
      - services
      - capabilities
      - flagship_genomes
      - reference_data
      - supported_data_types
      - research_resources

  # ---------------------------------------------------------------------------
  # Supporting Classes - Organizations and People
  # ---------------------------------------------------------------------------

  Institution:
    description: >-
      A research institution such as a national laboratory, university,
      or research institute.
    slots:
      - name
      - description
      - ror_id
      - institution_type
    class_uri: schema:Organization

  Person:
    description: >-
      A person involved in a research program, such as a principal investigator,
      co-investigator, or other key personnel.
    slots:
      - name
      - role
      - affiliation
      - email
      - orcid
      - expertise
    class_uri: schema:Person

  # ---------------------------------------------------------------------------
  # Supporting Classes - Funding and Location
  # ---------------------------------------------------------------------------

  FundingInfo:
    description: >-
      Information about funding for a research program including agency,
      program, and award details.
    attributes:
      agency:
        description: The funding agency (e.g., DOE BER)
        range: string
      program:
        description: The specific funding program (e.g., Genomic Science Program)
        range: string
      division:
        description: The division within the agency
        range: string
      subprogram:
        description: Subprogram or area within the program
        range: string
      area:
        description: Research area designation
        range: string
      contract:
        description: Contract number
        range: string
      grant:
        description: Grant number or identifier
        range: string
      total_funding:
        description: Total funding amount (may include period)
        range: string
      amount:
        description: Specific funding amount
        range: string
      award_2017:
        description: Award amount for 2017 funding cycle
        range: string
      current_period:
        description: Current funding period (e.g., 2023-2028)
        range: string

  Location:
    description: Geographic location information for a research program
    attributes:
      address:
        description: Street address or building name
        range: string
      city:
        description: City name
        range: string
      state:
        description: State or province
        range: string
      country:
        description: Country name
        range: string
        ifabsent: "string(USA)"

  # ---------------------------------------------------------------------------
  # Supporting Classes - Web Resources
  # ---------------------------------------------------------------------------

  WebResources:
    description: Collection of web resources associated with a research program
    attributes:
      main:
        description: Main website URL
        range: uri
      doe_page:
        description: DOE program page URL
        range: uri
      award_list:
        description: DOE award list, funding announcement, or award summary URL
        range: uri
      ornl_page:
        description: ORNL project page URL
        range: uri
      llnl_page:
        description: LLNL project page URL
        range: uri
      data_portal:
        description: Data portal URL
        range: uri
      data_hub:
        description: Data hub URL
        range: uri
      data_page:
        description: Data page URL
        range: uri
      atlas:
        description: Atlas or mapping portal URL
        range: uri
      github:
        description: GitHub organization or repository URL
        range: uri
      kbase:
        description: KBase collaboration page URL
        range: uri
      ess_dive:
        description: ESS-DIVE data portal URL
        range: uri
      ideas_watersheds:
        description: IDEAS-Watersheds page URL
        range: uri
      czen:
        description: Critical Zone Exploration Network page URL
        range: uri
      publications:
        description: Publications page URL
        range: uri
      highlights:
        description: Research highlights page URL
        range: uri
      documentation:
        description: Documentation URL
        range: uri
      bacterial_strains:
        description: Bacterial strains collection URL
        range: uri
      bfi_portal:
        description: BFI research portal URL
        range: uri
      ssrl_page:
        description: SSRL page URL
        range: uri
      anl_page:
        description: ANL page URL
        range: uri
      team:
        description: Team page URL
        range: uri
      phytozome:
        description: Phytozome plant genome portal URL
        range: uri

  # ---------------------------------------------------------------------------
  # Supporting Classes - Research Outputs
  # ---------------------------------------------------------------------------

  Dataset:
    description: >-
      A dataset produced by or associated with a research program.
    slots:
      - name
      - description
      - doi
      - url
      - repository
      - data_type
      - size
      - version
      - years
      - reference
      - count
      - osti_id
      - doi_examples
      - nmdc_study_id
      - jgi_project_id
      - ameriflux_site_id
      - lter_dataset_id
      - pride_id
      - massive_id
      - primary_reference
      - additional_references
      - interaction_types
      - interaction_modes
      - variables
    attributes:
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  Variable:
    description: >-
      A variable, factor, measurement, or metadata field observed, manipulated,
      derived, or otherwise used in a study or dataset. Variables act as a
      lightweight data dictionary and can be tagged with analytical roles,
      time-series behavior, units, methods, and ontology mappings such as BERVO.
      Ontology references are modeled as id/label objects so linkml-term-validator
      can check both the identifier and the canonical label.
    class_uri: schema:PropertyValue
    slots:
      - name
      - description
    slot_usage:
      name:
        description: Human-readable variable name or label used in the study or dataset
        required: true
    attributes:
      roles:
        description: >-
          Roles this variable plays in the study design or analysis. Multiple
          roles are allowed; for example, drought treatment may be both
          EXPERIMENTAL_FACTOR and STUDY_DESIGN_INDEPENDENT_VARIABLE.
        range: VariableRole
        multivalued: true
      value_type:
        description: Basic type or shape of values recorded for this variable
        range: VariableValueType
      units:
        description: Human-readable units for quantitative variables
        range: string
      unit_term:
        description: Unit ontology term, if available
        range: OntologyTerm
        inlined: true
      bervo_term:
        description: Primary BERVO class mapping for this variable, when available
        range: BERVOTerm
        inlined: true
      mixs_terms:
        description: >-
          MIxS metadata terms corresponding to this variable, when the variable
          represents a MIxS sample, environmental, host, or sequencing metadata field.
        range: MIXSTerm
        multivalued: true
        inlined_as_list: true
        bindings:
          - binds_value_of: id
            range: MIXSVariableTerm
            obligation_level: RECOMMENDED
      ontology_mappings:
        description: >-
          Additional ontology mappings for this variable, including ENVO, PATO,
          UO, OBI, or other relevant controlled vocabularies. Statistical or
          study-design roles should generally be represented in the roles slot
          rather than repeated here.
        range: OntologyTerm
        multivalued: true
        inlined_as_list: true
      measured_entity:
        description: >-
          Entity, organism, environmental feature, process, or system being
          measured or manipulated by this variable.
        range: string
      material_or_matrix:
        description: >-
          Material, sample matrix, compartment, or context for the variable
          (e.g., soil, rhizosphere, leaf tissue, porewater, bioreactor culture).
        range: string
      method:
        description: Measurement, manipulation, or derivation method
        range: string
      time_series:
        description: True when values for this variable are captured repeatedly through time
        range: boolean
      temporal_resolution:
        description: Temporal grain or sampling interval for time-series variables
        range: string
      spatial_resolution:
        description: Spatial grain, support, or resolution for spatial variables
        range: string
      levels:
        description: >-
          Known categorical levels, treatment levels, bins, or allowed values
          for this variable.
        range: string
        multivalued: true
      source_field_names:
        description: Column names, file field names, or source labels that map to this variable
        range: string
        multivalued: true
      notes:
        description: Additional notes about the variable definition or usage
        range: string

  OntologyTerm:
    description: >-
      A reference to an ontology term, represented as an identifier plus the
      term label expected from the source ontology. The label field is marked
      as rdfs:label for linkml-term-validator label checks.
    attributes:
      id:
        description: CURIE or URI for the ontology term
        range: uriorcurie
        identifier: true
        required: true
      label:
        description: Human-readable ontology term label
        range: string
        required: true
        implements:
          - rdfs:label
      mapping_relation:
        description: >-
          SSSOM/SKOS mapping predicate describing how the local variable or
          field maps to this ontology term. The local variable is the subject
          and the ontology term is the object; for example, NARROW_MATCH means
          the ontology term is narrower than the local variable.
        range: OntologyMappingRelation
      mapping_note:
        description: Curator note explaining the scope or uncertainty of this ontology mapping
        range: string

  BERVOTerm:
    description: A BERVO ontology term represented with an identifier and label
    is_a: OntologyTerm
    slot_usage:
      id:
        description: BERVO CURIE for the ontology term
        pattern: "^BERVO:\\d+$"

  MIXSTerm:
    description: A MIxS metadata term represented with an identifier and label
    is_a: OntologyTerm
    slot_usage:
      id:
        description: MIxS CURIE for the metadata term
        pattern: "^MIXS:\\d{7}$"

  Reference:
    description: >-
      A publication reference with key findings. Minimal metadata is stored here;
      full bibliographic data can be fetched/cached via linkml-reference-validator.
    slots:
      - id
      - title
      - findings
    slot_usage:
      id:
        description: DOI of the publication (e.g., doi:10.1038/s41586-020-03127-1)
        implements:
          - linkml:authoritative_reference

  Finding:
    description: A key finding or claim extracted from a publication
    slots:
      - statement
      - supporting_text
    attributes:
      reference:
        description: DOI of the publication this finding is from (for validation)
        range: uriorcurie
        implements:
          - linkml:authoritative_reference

  PrimaryReferenceInfo:
    description: >-
      Container for a primary reference with its metadata. Provides a structured
      way to associate a publication reference with an entity (e.g., IsolateCollection,
      Dataset) while allowing future annotations about the relationship.
    attributes:
      reference:
        description: The primary publication reference
        range: Reference
        inlined: true
        required: true
      relationship_note:
        description: >-
          Optional note describing the relationship between the reference and the
          entity it's attached to (e.g., "Describes the isolation methods",
          "First report of these isolates")
        range: string

  ProgramOutputs:
    description: Summary of research outputs from a program
    attributes:
      publication_count:
        description: Number or description of publications
        range: string
      patent_applications:
        description: Number of patent applications
        range: integer
      invention_disclosures:
        description: Number of invention disclosures
        range: integer
      licenses_options:
        description: Number of licenses or options
        range: integer
      patents:
        description: Number of patents granted
        range: integer
      startups:
        description: Number of startup companies formed
        range: integer

  ResearchResource:
    description: >-
      A large-grain research resource maintained or produced by a research
      program: an isolate collection, mutant library, phage bank, reference
      genome set, plasmid collection, synthetic community, knowledgebase, or
      similar reagent or data resource. Catalog-level metadata only; detailed
      records are expected to live in external systems referenced via
      identifiers. IsolateCollection is a subtype; other resource kinds are
      distinguished by the resource_type discriminator rather than by
      proliferating subclasses.
    abstract: true
    slots:
      - name
      - description
      - primary_reference
    attributes:
      resource_type:
        description: Coarse classification of this resource.
        range: ResourceType
      identifiers:
        description: >-
          Typed external identifiers for the resource — registry + accession
          tuples pointing to records in catalogs such as Addgene, BEI, ATCC,
          DSMZ, KBase narratives, NCBI:Assembly, the LBNL Fitness Browser,
          lab catalogs, or RRID-issuing registries.
        range: ResourceIdentifier
        multivalued: true
        inlined_as_list: true
      provider:
        description: >-
          Organization or laboratory that maintains and distributes the
          resource (e.g., LBNL, EMSL, JGI, BEI Resources).
        range: string
      url:
        description: Primary landing or catalog URL for the resource.
        range: uri
      count:
        description: >-
          Approximate size of the resource (e.g., "~10^5 mutants",
          "261 isolates", "135 Gbases"). Free text so units travel with the
          value.
        range: string
      members:
        description: >-
          Members of the resource at human-readable grain (e.g., organism
          names with strain designators, condition or media descriptors).
          For panel resources this is the panel content. May be a
          representative subset when the full list is large; in that case
          the canonical list lives at the resource's url and member_count
          reflects the total.
        range: string
        multivalued: true
      member_count:
        description: >-
          Total number of members in the resource. Useful when members is
          a representative subset rather than a complete enumeration.
        range: integer
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for
          validation. Preferred over primary_reference for new entries.
        range: PrimaryReferenceInfo
        inlined: true

  ResourceIdentifier:
    description: >-
      A typed external identifier for a research resource: a {registry,
      accession} tuple with an optional resolvable URL and citation. Used
      to point at a resource's record in any external catalog or registry —
      examples include Addgene, BEI, ATCC, DSMZ, KBase narrative IDs,
      NCBI:Assembly accessions, a Fitness Browser organism ID, an RRID,
      or a lab catalog identifier.
    attributes:
      registry:
        description: >-
          Issuing registry or catalog (e.g., RRID, Addgene, BEI, ATCC, DSMZ,
          KBase, NCBI:Assembly, fit.genomics.lbl.gov, internal).
        range: string
        required: true
      accession:
        description: Identifier assigned by the registry.
        range: string
        required: true
      url:
        description: Resolvable URL for the identifier.
        range: uri
      citation:
        description: >-
          DOI of a canonical publication describing this resource entry,
          when distinct from the resource's primary_reference.
        range: uriorcurie

  IsolateCollection:
    description: >-
      A collection of cultured microbial isolates maintained by a research program.
      Provides catalog-level metadata about the collection; detailed isolate records
      are maintained in external systems (KBase, JGI, culture collections).
      Subtype of ResearchResource; other resource kinds (mutant libraries, phage
      banks, knowledgebases) are modeled as ResearchResource directly using the
      resource_type discriminator.
    is_a: ResearchResource
    slots:
      - name
      - description
    attributes:
      organism_types:
        description: Types of organisms in this collection
        range: OrganismType
        multivalued: true
      isolate_count:
        description: Approximate number of isolates in the collection
        range: integer
      genome_count:
        description: Number of isolates with sequenced genomes
        range: integer
      source_environments:
        description: >-
          Environments from which isolates were obtained (e.g., rhizosphere,
          subsurface, contaminated groundwater, phyllosphere)
        range: string
        multivalued: true
      isolation_methods:
        description: >-
          Brief description of isolation methods used (e.g., aerobic plating,
          anaerobic enrichment, single-cell sorting)
        range: string
        multivalued: true
      host_organisms:
        description: >-
          Host organisms if isolates are host-associated (e.g., Populus,
          Panicum virgatum)
        range: string
        multivalued: true
      culture_collection_url:
        description: URL to browse or request live cultures
        range: uri
      genome_catalog_url:
        description: URL to genome data (KBase narrative, JGI, NCBI BioProject)
        range: uri
      kbase_narrative_id:
        description: KBase narrative ID containing isolate genomes if applicable
        range: string
      primary_reference:
        description: >-
          DOI of primary publication describing the collection.
          DEPRECATED: Use primary_reference_info for new entries to enable title validation.
        range: uriorcurie
        implements:
          - linkml:authoritative_reference
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  # ---------------------------------------------------------------------------
  # Supporting Classes - Field Sites and Research Focus
  # ---------------------------------------------------------------------------

  FieldSite:
    description: A field research site associated with a research program
    is_a: NamedThing
    class_uri: schema:Place
    slot_usage:
      id:
        description: A unique identifier for the field site
        required: true
      name:
        description: The canonical name of the field site
        required: true
    attributes:
      location:
        description: Geographic location of the field site
        range: string
      site_type:
        description: >-
          Type of field site (e.g., NEON, LTER, RESEARCH_STATION, NATIONAL_FOREST,
          NATIONAL_PARK, AGRICULTURAL, URBAN, COASTAL_WETLAND)
        range: string
      pi:
        description: Principal investigator leading research at this site
        range: string
      institution:
        description: Institution of the principal investigator
        range: string
      relevance:
        description: >-
          Research relevance categories for the site (e.g., BIOTECH, BIOENERGY,
          HAZARD_PREDICTION, WILDFIRE, CLIMATE_CHANGE, AGRICULTURE)
        range: string
        multivalued: true
      contaminants:
        description: Contaminants present at the site (if applicable)
        range: string
        multivalued: true
      contamination_source:
        description: Source of contamination at the site
        range: string
      elevation_m:
        description: Elevation of the field site in meters above sea level
        range: integer
      mean_annual_temp_c:
        description: Mean annual temperature at the site in degrees Celsius
        range: float
      mean_annual_precip_cm:
        description: Mean annual precipitation at the site in centimeters
        range: float

  Technology:
    description: A technology or tool developed by a research program
    slots:
      - name
      - description

  WebReference:
    description: >-
      A reference to a web resource such as a project page, news article, or
      documentation. Used for citing non-DOI sources that document research
      activities.
    attributes:
      url:
        description: URL of the web resource
        range: uri
        required: true
      title:
        description: Title of the web page or resource
        range: string
        required: true
      summary:
        description: >-
          Brief description of what content can be found at this URL.
          Serves as an annotation to help users understand what information
          the source provides before clicking.
        range: string

  StudyDesign:
    description: >-
      Study-level design metadata that applies across variables and datasets.
      This captures the design pattern, experimental or observational units,
      replication, blocking, randomization, and related notes separately from
      the data dictionary entries for individual variables.
    slots:
      - description
    attributes:
      design_types:
        description: OBI or related ontology terms describing the study design
        range: OntologyTerm
        multivalued: true
        inlined_as_list: true
        bindings:
          - binds_value_of: id
            range: StudyDesignTerm
            obligation_level: RECOMMENDED
      factor_panels:
        description: >-
          Names of panel ResearchResource entries (typically ORGANISM_PANEL
          or CONDITION_PANEL) that contribute the factor levels for this
          study. Lets multiple studies share a panel definition rather than
          redeclaring it; the cross-product of the referenced panels is
          implied by the study design and need not be enumerated cell by
          cell.
        range: string
        multivalued: true
      experimental_units:
        description: Units assigned to treatments or interventions
        range: string
        multivalued: true
      observational_units:
        description: Units on which measurements are made
        range: string
        multivalued: true
      sampling_strategy:
        description: Sampling strategy or sampling design used by the study
        range: string
      replication:
        description: Description of biological, technical, field, or model replication
        range: string
      randomization:
        description: Description of randomization, if used
        range: string
      blocking:
        description: Description of blocking or stratification, if used
        range: string
      controls:
        description: Description of control groups, baselines, or reference conditions
        range: string
      notes:
        description: Additional notes about the study design
        range: string

  NMDCStudyReference:
    description: >-
      A reference to an NMDC study associated with a research program.
      Links BRC/SFA research to specific studies in the National Microbiome
      Data Collaborative. Can also represent studies that are candidates for
      NMDC ingest (nmdc_ingest_target=true).
    slots:
      - nmdc_study_id
      - name
      - description
      - primary_reference
      - keywords
      - field_site_ids
      - study_design
      - variables
    attributes:
      pi:
        description: Principal investigator name for this study
        range: string
      bioproject_ids:
        description: NCBI BioProject identifiers associated with this study
        range: string
        multivalued: true
      gold_study_id:
        description: GOLD study identifier (e.g., gold:Gs0128851)
        range: string
      jgi_proposal_id:
        description: JGI proposal identifier
        range: string
      brc_dataset_ids:
        description: >-
          Dataset identifiers from the BRC API (api.bioenergy.org) associated
          with this study. These are the native identifiers which may be
          DOIs, BioProject IDs, or repository-specific IDs.
        range: string
        multivalued: true
      nmdc_ingest_target:
        description: >-
          If true, indicates this study has data that should be targeted
          for ingest into NMDC but is not yet registered there.
        range: boolean
      nmdc_ingest_priority:
        description: >-
          Priority level for NMDC ingest consideration. HIGH for datasets
          with rich microbiome data ready for processing, MEDIUM for
          datasets that need some preparation, LOW for marginal candidates.
        range: NMDCIngestPriority
      data_modalities:
        description: Types of data generated in this study (e.g., 16S_AMPLICON, METAGENOMICS)
        range: DataType
        multivalued: true
      sample_count:
        description: Number of samples in the study
        range: integer
      organism:
        description: Primary organism studied
        range: string
      preprocessed_data_available:
        description: >-
          Types of preprocessed/derived data products available in public repositories
          (e.g., NCBI) for this study. Examples include MAGs (metagenome-assembled genomes),
          genome assemblies, gene annotations, etc. Used to identify studies with
          analysis-ready data that may meet NMDC quality standards.
        range: PreprocessedDataType
        multivalued: true
      preprocessed_data_counts:
        description: >-
          Counts of preprocessed data products available (e.g., "28 MAGs", "135 Gbases").
          Free text to capture quantity and type.
        range: string
      ncbi_data_quality_notes:
        description: >-
          Notes about the quality or completeness of preprocessed data in NCBI.
          Used to track whether external data meets NMDC standards.
        range: string
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true
      source_reference:
        description: >-
          Web reference documenting this study (project page, news article, etc.)
          for studies without a primary DOI publication.
        range: WebReference
        inlined: true
      synthetic_communities:
        description: >-
          CURIEs referencing synthetic community (SynCom) entries in the
          CommunityMech knowledge base that are associated with this study.
        range: uriorcurie
        multivalued: true

  # ---------------------------------------------------------------------------
  # Supporting Classes - Analysis and KBase
  # ---------------------------------------------------------------------------

  Analysis:
    description: >-
      A computational analysis performed on research data. This is an abstract
      base class for different types of analyses including KBase narratives,
      pipeline runs, and other computational workflows.
    is_a: NamedThing
    abstract: true
    slots:
      - primary_reference
      - additional_references
    attributes:
      analysis_type:
        description: Type of analysis performed
        range: AnalysisType
      input_data_description:
        description: Description of input data used
        range: string
      output_data_types:
        description: Types of data objects produced
        range: DataType
        multivalued: true
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  KBaseNarrative:
    description: >-
      A KBase Narrative - a reproducible, shareable analysis workflow in the
      DOE Systems Biology Knowledgebase. Narratives combine data, analysis
      steps, and documentation in an executable Jupyter-like notebook format.
      Can be made public, shared, and assigned DOIs for citation.
    is_a: Analysis
    attributes:
      kbase_narrative_id:
        description: >-
          KBase narrative numeric ID (e.g., "109073"). This is the number
          that appears in URLs like kbase.us/n/109073/63/
        range: string
      kbase_narrative_url:
        description: Full URL to the public narrative
        range: uri
      kbase_workspace_id:
        description: >-
          Workspace ID for programmatic access via KBase Workspace API
        range: string
      osti_doi:
        description: >-
          DOI assigned by OSTI if narrative has been registered as a
          citable dataset (format: 10.25982/...)
        range: string
      is_static:
        description: >-
          Whether this is a static (snapshot) narrative suitable for citation
        range: boolean
      genome_count:
        description: Number of genomes/MAGs in this narrative
        range: integer
      sample_count:
        description: Number of samples in this narrative
        range: integer
      related_narratives:
        description: IDs of related KBase narratives
        range: string
        multivalued: true

  FlagshipGenome:
    description: A flagship genome sequenced and maintained by a facility
    slots:
      - name
      - description
    attributes:
      common_name:
        description: Common name of the organism
        range: string
      year:
        description: Year the genome was sequenced
        range: integer

  ReferenceData:
    description: Reference data maintained by a facility
    attributes:
      microbial_genomes:
        description: Number/source of microbial genomes
        range: string
      plant_genomes:
        description: Number/source of plant genomes
        range: string
      biolog_media:
        description: Number of Biolog media formulations
        range: string
      reactions_compounds:
        description: Number/source of reactions and compounds
        range: string

  # ---------------------------------------------------------------------------
  # Supporting Classes - Capabilities
  # ---------------------------------------------------------------------------

  Capability:
    description: >-
      A scientific capability or resource provided by a user facility,
      including instrumentation, platforms, and analytical services.
    slots:
      - name
      - description
    attributes:
      capability_type:
        description: The type/category of capability
        range: CapabilityType
      instruments:
        description: Specific instruments or equipment supporting this capability
        range: Instrument
        multivalued: true
        inlined_as_list: true
      access_mode:
        description: How users can access this capability
        range: string
      throughput:
        description: Throughput or capacity metrics
        range: string
      year_established:
        description: Year this capability was established
        range: integer
      url:
        description: URL for more information about this capability
        range: uri
      applications:
        description: Key applications or use cases for this capability
        range: string
        multivalued: true
      data_products:
        description: Types of data products generated by this capability
        range: string
        multivalued: true
      status:
        description: Current operational status
        range: CapabilityStatus
      commissioned_date:
        description: Date the capability was commissioned
        range: date
      leader:
        description: Name of the capability lead or manager
        range: string
      future_expansion:
        description: Notes on planned future expansion or related facilities
        range: string

  Instrument:
    description: >-
      A scientific instrument or piece of equipment that supports a capability.
    slots:
      - name
      - description
    attributes:
      instrument_type:
        description: Type of instrument
        range: InstrumentType
      manufacturer:
        description: Manufacturer of the instrument
        range: string
      model:
        description: Model name or number
        range: string
      count:
        description: Number of instruments of this type
        range: integer
      specifications:
        description: Key specifications (e.g., resolution, sensitivity)
        range: string

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Identifier Slots
  # ---------------------------------------------------------------------------

  id:
    identifier: true
    slot_uri: schema:identifier
    range: uriorcurie
    description: A unique identifier for an entity

  acronym:
    description: Short acronym or abbreviation for the program (e.g., GLBRC, ENIGMA)
    range: string
    slot_uri: schema:alternateName

  ror_id:
    description: Research Organization Registry identifier
    range: uriorcurie
    pattern: "^ror:\\d{9}$"

  orcid:
    description: ORCID identifier for a person
    range: uriorcurie
    pattern: "^orcid:\\d{4}-\\d{4}-\\d{4}-\\d{3}[0-9X]$"

  doi:
    description: Digital Object Identifier
    range: uriorcurie

  pmid:
    description: PubMed identifier
    range: string

  osti_id:
    description: OSTI (Office of Scientific and Technical Information) identifier
    range: string

  nmdc_study_id:
    description: >-
      National Microbiome Data Collaborative study identifier
      (e.g., nmdc:sty-11-ev70y104)
    range: uriorcurie
    pattern: "^nmdc:sty-[a-z0-9-]+$"

  nmdc_umbrella_study:
    description: >-
      The NMDC umbrella study identifier for this research program.
      This is the top-level study that child studies link to via part_of.
    range: uriorcurie
    pattern: "^nmdc:sty-[a-z0-9-]+$"

  studies:
    description: >-
      NMDC studies associated with this research program. These are
      individual research studies that are part of the program.
    range: NMDCStudyReference
    multivalued: true
    inlined_as_list: true

  analyses:
    description: >-
      Computational analyses associated with this research program,
      including KBase narratives and other workflows.
    range: KBaseNarrative
    multivalued: true
    inlined_as_list: true

  kbase_genome_collection:
    description: >-
      If this program has a curated genome collection in KBase Collections
      (e.g., ENIGMA, PMI, GROW), the collection identifier. Collections are
      searchable curated datasets with GTDB taxonomy and microTrait annotations.
    range: KBaseCollection

  jgi_project_id:
    description: >-
      DOE Joint Genome Institute project identifier for sequence data
      (e.g., Gs0114663 or 1191516)
    range: string

  ameriflux_site_id:
    description: >-
      Ameriflux site identifier for flux tower data (e.g., US-KL1)
    range: string
    pattern: "^[A-Z]{2}-[A-Za-z0-9]+$"

  lter_dataset_id:
    description: >-
      Long Term Ecological Research Network dataset identifier
    range: string

  pride_id:
    description: >-
      ProteomeXchange/PRIDE Archive identifier for proteomics data
      (e.g., PXD049389)
    range: string
    pattern: "^PXD\\d+$"

  massive_id:
    description: >-
      MassIVE repository identifier for mass spectrometry data
      (e.g., MSV000095714)
    range: string
    pattern: "^MSV\\d+$"

  primary_reference:
    description: DOI of the primary publication describing this dataset
    range: uriorcurie
    implements:
      - linkml:authoritative_reference

  additional_references:
    description: DOIs of additional publications associated with or derived from this dataset
    range: uriorcurie
    multivalued: true

  # ---------------------------------------------------------------------------
  # Descriptive Slots
  # ---------------------------------------------------------------------------

  name:
    slot_uri: schema:name
    description: A human-readable name for an entity
    range: string

  description:
    slot_uri: schema:description
    description: A human-readable description for an entity
    range: string

  title:
    description: Title of a publication or other work
    range: string
    slot_uri: dcterms:title

  # ---------------------------------------------------------------------------
  # Program Classification Slots
  # ---------------------------------------------------------------------------

  program_type:
    description: The type of research program
    range: ProgramType

  sfa_type:
    description: The specific type of Scientific Focus Area
    range: SFAType

  initiative_name:
    description: >-
      Name of the parent initiative this program belongs to (e.g., BRaVE for
      Biopreparedness Research Virtual Environment projects)
    range: string

  funding_period:
    description: >-
      The funding period for time-limited initiatives (e.g., "2023-2026" or
      "FY2023-FY2025")
    range: string

  participating_offices:
    description: >-
      DOE offices participating in funding this initiative (e.g., BER, ASCR, BES)
    range: string
    multivalued: true

  institution_type:
    description: The type of institution
    range: InstitutionType

  # ---------------------------------------------------------------------------
  # Organizational Slots
  # ---------------------------------------------------------------------------

  lead_institution:
    description: The primary institution leading the program
    range: string

  lead_institutions:
    description: Multiple lead institutions (for collaborative programs)
    range: string
    multivalued: true

  partner_institutions:
    description: Partner institutions participating in the program
    range: string
    multivalued: true

  principal_investigators:
    description: Principal investigators leading the program
    range: Person
    multivalued: true
    inlined_as_list: true

  co_investigators:
    description: Co-investigators on the program
    range: Person
    multivalued: true
    inlined_as_list: true

  collaborators:
    description: Description of collaborators
    range: string

  isolate_collections:
    description: >-
      Microbial isolate collections maintained by this research program.
      Provides catalog-level information about available cultures and genomes.
      For new entries that are not isolate collections (mutant libraries, phage
      banks, knowledgebases, reference genome sets), use research_resources
      instead. Both slots reference subtypes of ResearchResource, so a single
      query against the class hierarchy returns every resource a program
      maintains.
    range: IsolateCollection
    multivalued: true
    inlined_as_list: true

  research_resources:
    description: >-
      Research resources maintained or produced by this program at catalog
      grain (mutant libraries, phage banks, reference genome sets, plasmid
      collections, synthetic communities, knowledgebases, software). Use this
      slot for resource kinds other than isolate collections; existing
      isolate collections remain under the isolate_collections slot for
      back-compatibility but are also instances of ResearchResource.
    range: ResearchResource
    multivalued: true
    inlined_as_list: true

  phenotype_assays:
    description: >-
      Types of phenotype assays performed by this research program.
      Catalogs the phenotyping capabilities and data types generated.
    range: PhenotypeAssayType
    multivalued: true

  # ---------------------------------------------------------------------------
  # Person Slots
  # ---------------------------------------------------------------------------

  role:
    description: Role of a person in the program (e.g., Director, Principal Investigator)
    range: string

  affiliation:
    description: Institutional affiliation of a person
    range: string

  email:
    description: Email address
    range: string
    slot_uri: schema:email

  expertise:
    description: Area of expertise
    range: string

  # ---------------------------------------------------------------------------
  # Location and Web Slots
  # ---------------------------------------------------------------------------

  location:
    description: Geographic location of the program
    range: Location

  websites:
    description: Web resources associated with the program
    range: WebResources

  url:
    description: A URL
    range: uri
    slot_uri: schema:url

  repository:
    description: Data repository where a dataset is stored
    range: string

  # ---------------------------------------------------------------------------
  # Funding Slots
  # ---------------------------------------------------------------------------

  funding:
    description: Funding information for the program
    range: FundingInfo

  # ---------------------------------------------------------------------------
  # Research Focus Slots
  # ---------------------------------------------------------------------------

  scientific_questions:
    description: Key scientific questions addressed by the program
    range: string
    multivalued: true

  keywords:
    description: Keywords describing the research focus
    range: Keyword
    multivalued: true
    slot_uri: schema:keywords

  data_types:
    description: Types of data collected or generated
    range: DataType
    multivalued: true

  data_collection_modalities:
    description: Methods and modalities used for data collection
    range: DataCollectionModality
    multivalued: true

  interaction_types:
    description: Types of microbial interactions studied (e.g., mutualism, antagonism, competition)
    range: InteractionType
    multivalued: true

  interaction_modes:
    description: Physical or chemical modes of microbial interaction (e.g., endohyphal, siderophore-mediated)
    range: InteractionMode
    multivalued: true

  services:
    description: Services provided by a facility
    range: string
    multivalued: true

  capabilities:
    description: Scientific capabilities provided by the facility
    range: Capability
    multivalued: true
    inlined_as_list: true

  supported_data_types:
    description: Data types supported by a facility
    range: string
    multivalued: true

  # ---------------------------------------------------------------------------
  # Output Slots
  # ---------------------------------------------------------------------------

  datasets:
    description: Datasets produced by or associated with the program
    range: Dataset
    multivalued: true
    inlined_as_list: true

  field_site_ids:
    description: >-
      Identifiers of canonical field sites associated with the program or
      study. These reference entries in the top-level sites collection.
    range: uriorcurie
    multivalued: true

  study_design:
    description: Study design metadata associated with a study
    range: StudyDesign
    inlined: true

  variables:
    description: >-
      Variables, factors, measurements, or data fields catalogued for a study
      or dataset.
    range: Variable
    multivalued: true
    inlined_as_list: true

  key_publications:
    description: Key publications from the program with their findings
    range: Reference
    multivalued: true
    inlined_as_list: true

  outputs:
    description: Summary of program outputs
    range: ProgramOutputs

  technologies_developed:
    description: Technologies or tools developed by the program
    range: Technology
    multivalued: true
    inlined_as_list: true

  flagship_genomes:
    description: Flagship genomes sequenced by the facility
    range: FlagshipGenome
    multivalued: true
    inlined_as_list: true

  reference_data:
    description: Reference data maintained by the facility
    range: ReferenceData

  # ---------------------------------------------------------------------------
  # Reference and Finding Slots
  # ---------------------------------------------------------------------------

  findings:
    description: Key findings or claims extracted from a publication
    range: Finding
    multivalued: true
    inlined_as_list: true

  statement:
    description: A key finding or claim from the publication
    range: string
    required: true

  supporting_text:
    description: Exact excerpt or quote from the publication supporting the finding
    range: string
    implements:
      - linkml:excerpt

  year:
    description: Year of publication or establishment
    range: integer

  # ---------------------------------------------------------------------------
  # Dataset-specific Slots
  # ---------------------------------------------------------------------------

  data_type:
    description: Type of data in a dataset
    range: string

  size:
    description: Size of a dataset
    range: string

  version:
    description: Version of a dataset or resource
    range: string

  years:
    description: Years covered by a dataset
    range: string

  reference:
    description: Reference citation for a dataset
    range: string

  count:
    description: Count of items in a dataset
    range: string

  doi_examples:
    description: Example DOIs for a dataset collection
    range: string
    multivalued: true

  # ---------------------------------------------------------------------------
  # Temporal Slots
  # ---------------------------------------------------------------------------

  established:
    description: Year the program was established
    range: integer

  start_date:
    description: >-
      Date or year when the program started. Prefer ISO 8601 dates when known;
      use a year-only value when the exact date is not known.
    range: string

  end_date:
    description: >-
      Date or year when the program ended. Leave empty for ongoing programs.
      Prefer ISO 8601 dates when known; use a year-only value when the exact
      date is not known.
    range: string

  predecessor:
    description: Predecessor program that this program builds upon
    range: string

# =============================================================================
# ENUMS
# =============================================================================

enums:

  ProgramType:
    description: Types of DOE BER research programs
    permissible_values:
      BIOENERGY_RESEARCH_CENTER:
        description: >-
          A Bioenergy Research Center (BRC) - large-scale, multi-institutional
          center focused on biofuels and bioproducts from plant biomass
      SCIENTIFIC_FOCUS_AREA:
        description: >-
          A Scientific Focus Area (SFA) - integrated research program at
          DOE national laboratories
      USER_FACILITY:
        description: >-
          A DOE BER User Facility providing resources to the scientific community
      DATA_REPOSITORY:
        description: A data repository or archive
      DATA_COLLABORATIVE:
        description: A collaborative data initiative
      BIOPREPAREDNESS_INITIATIVE:
        description: >-
          A biopreparedness research initiative such as BRaVE (Biopreparedness
          Research Virtual Environment) - typically cross-cutting, time-limited
          projects spanning multiple DOE offices
      AI_PILOT_PROJECT:
        description: >-
          Artificial intelligence pilot project or AI-enabled science initiative,
          typically cross-cutting and often involving BER and ASCR.
      FIELD_CAMPAIGN:
        description: >-
          Time-limited coordinated field campaign, often associated with an SFA
          or other BER program, producing campaign-specific observations and datasets.
      OTHER_INITIATIVE:
        description: >-
          Other research initiatives that don't fit traditional categories

  SFAType:
    description: Types of Scientific Focus Areas by program area
    permissible_values:
      GENOMIC_SCIENCE_SFA:
        description: >-
          SFA within the Genomic Science Program focusing on plant and
          microbial systems biology
      ENVIRONMENTAL_SYSTEM_SCIENCE_SFA:
        description: >-
          SFA within the Environmental System Science program focusing on
          watershed and ecosystem processes
      ENVIRONMENTAL_MICROBIOME_SCIENCE:
        description: SFA focused on environmental microbiome research
      SECURE_BIOSYSTEMS_DESIGN:
        description: SFA focused on secure biosystems design and biocontainment

  InstitutionType:
    description: Types of research institutions
    permissible_values:
      NATIONAL_LABORATORY:
        description: A DOE National Laboratory
      UNIVERSITY:
        description: A university or academic institution
      RESEARCH_INSTITUTE:
        description: A research institute
      FEDERAL_AGENCY:
        description: A federal government agency
      PRIVATE_SECTOR:
        description: A private sector organization

  PreprocessedDataType:
    description: >-
      Types of preprocessed or derived data products available in public repositories.
      Used to identify studies with analysis-ready data for NMDC consideration.
    permissible_values:
      MAGS:
        description: >-
          Metagenome-assembled genomes - draft genomes reconstructed from metagenomic
          data through binning and assembly
      GENOME_ASSEMBLIES:
        description: Assembled genome sequences (contigs, scaffolds, or complete)
      GENE_ANNOTATIONS:
        description: Predicted gene calls and functional annotations
      FUNCTIONAL_ANNOTATIONS:
        description: Functional annotations (COG, KEGG, Pfam, etc.)
      TAXONOMIC_CLASSIFICATIONS:
        description: Taxonomic assignments for sequences or bins
      READ_QC:
        description: Quality-controlled sequencing reads
      ASSEMBLY_QC:
        description: Assembly quality metrics (CheckM, QUAST, etc.)
      METABOLIC_MODELS:
        description: Genome-scale metabolic reconstructions
      PHYLOGENETIC_TREES:
        description: Phylogenetic trees or placements

  DataType:
    description: Types of scientific data
    permissible_values:
      GENOMICS:
        description: Genomic sequence data
        title: DNA sequencing assay
        meaning: OBI:0000626
      METAGENOMICS:
        description: Metagenomic sequence data
        title: whole metagenome sequencing assay
        meaning: OBI:0002623
      TRANSCRIPTOMICS:
        description: Transcriptomic expression data
        title: transcription profiling assay
        meaning: OBI:0000424
      METATRANSCRIPTOMICS:
        description: Metatranscriptomic data
      AMPLICON_16S:
        description: 16S rRNA gene amplicon sequencing for bacterial/archaeal profiling
        title: 16s ribosomal gene sequencing assay
        meaning: OBI:0002763
      AMPLICON_ITS:
        description: ITS amplicon sequencing for fungal profiling
        title: ITS rRNA gene sequencing assay
      AMPLICON_18S:
        description: 18S rRNA gene amplicon sequencing for eukaryotic profiling
      PROTEOMICS:
        description: Proteomic data
        title: protein expression profiling assay
        meaning: OBI:0000615
      METABOLOMICS:
        description: Metabolomic data
        title: metabolite profiling assay
        meaning: OBI:0000366
      EXOMETABOLOMICS:
        description: Exometabolomic data (extracellular metabolites)
      GEOSPATIAL:
        description: Geospatial or GIS data
      PHENOTYPIC_DATA:
        description: Phenotypic measurement data
      IMAGING_DATA:
        description: Various imaging data
      ENVIRONMENTAL_SENSOR_DATA:
        description: Environmental sensor time series data
      HYDROLOGICAL_DATA:
        description: Hydrological measurements
      BIOGEOCHEMICAL_DATA:
        description: Biogeochemical measurements
      STABLE_ISOTOPE_DATA:
        description: Stable isotope measurements
      SYNTHETIC_BIOLOGY_CONSTRUCTS:
        description: Synthetic biology parts and constructs
