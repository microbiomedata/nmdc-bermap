  AnalysisType:
    description: Types of computational analyses
    permissible_values:
      KBASE_NARRATIVE:
        description: >-
          KBase reproducible analysis workflow - a Jupyter-like notebook
          combining data, analysis steps, and documentation
      NMDC_WORKFLOW:
        description: >-
          NMDC standardized bioinformatics workflow (e.g., metagenome
          annotation, MAG assembly)
      CUSTOM_PIPELINE:
        description: Custom analysis pipeline not in KBase or NMDC

  KBaseCollection:
    description: >-
      Available KBase genome collections (as of 2024). Collections are
      curated datasets searchable by sequence similarity, taxonomy (GTDB),
      and functional traits (microTrait).
    permissible_values:
      GTDB:
        description: >-
          Genome Taxonomy Database reference collection - standardized
          microbial taxonomy based on genome phylogeny
      ENIGMA:
        description: >-
          ENIGMA SFA subsurface microbiome genomes from Oak Ridge
          Reservation contaminated site studies
      PMI:
        description: >-
          Plant Microbe Interfaces SFA rhizosphere genomes - plant-host
          associated microbial genomes showing Populus rhizosphere diversity
      GROW:
        description: >-
          Genome Resolved Open Watersheds (GROWdb) river microbiome MAGs
          from WHONDRS worldwide river sampling

  NMDCIngestPriority:
    description: >-
      Priority level for considering a study/dataset for NMDC ingest.
      Used to help prioritize which external datasets should be targeted
      for ingestion into the National Microbiome Data Collaborative.
    permissible_values:
      HIGH:
        description: >-
          High priority - dataset has rich microbiome data (metagenomes,
          amplicon sequences) with good metadata, ready for NMDC processing.
          Should be prioritized for ingest.
      MEDIUM:
        description: >-
          Medium priority - dataset has relevant microbiome data but may
          need metadata enrichment or format conversion before ingest.
      LOW:
        description: >-
          Low priority - dataset has some microbiome relevance but is
          either small, has limited metadata, or is a marginal candidate.

  ResourceType:
    description: >-
      Coarse type of a research resource, used as a discriminator on the
      ResearchResource class. Lets the catalog represent isolate collections,
      mutant libraries, phage banks, knowledgebases, and similar large-grain
      reagent or data resources without proliferating subclasses.
    permissible_values:
      ISOLATE_COLLECTION:
        description: A collection of cultured microbial isolates.
      MUTANT_LIBRARY:
        description: >-
          A pooled mutant library, e.g. a randomly-barcoded transposon
          (RB-TnSeq) insertion library or a CRISPRi library.
      PHAGE_BANK:
        description: >-
          A collection of bacteriophage isolates maintained as a reagent bank.
      REFERENCE_GENOME_SET:
        description: A curated set of reference genomes maintained by a program.
      PLASMID_COLLECTION:
        description: A collection of plasmids or other genetic constructs.
      SYNTHETIC_COMMUNITY:
        description: >-
          A defined synthetic microbial community maintained as a reagent.
      ORGANISM_PANEL:
        description: >-
          A defined set of organisms used as an experimental factor across
          one or more studies (e.g., the LBNL Fitness Browser organism set).
      CONDITION_PANEL:
        description: >-
          A defined set of growth conditions, media, stressors, or selective
          agents used as an experimental factor across one or more studies.
      KNOWLEDGEBASE:
        description: >-
          A versioned data resource or knowledgebase produced and maintained
          by the program (e.g., the LBNL Fitness Browser, the Phage Foundry
          Knowledge-Base).
      SOFTWARE:
        description: A software tool or pipeline produced as a research resource.
      OTHER:
        description: A research resource not covered by the above categories.

  OrganismType:
    description: >-
      Types of organisms in a microbial isolate collection. Used to characterize
      the taxonomic breadth of culture collections maintained by research programs.
    permissible_values:
      BACTERIA:
        description: Bacterial isolates
        meaning: NCBITaxon:2
      ARCHAEA:
        description: Archaeal isolates
        meaning: NCBITaxon:2157
      FUNGI:
        description: Fungal isolates including yeasts and filamentous fungi
        meaning: NCBITaxon:4751
      PHAGE:
        description: Bacteriophages and archaeal viruses
      OTHER_VIRUS:
        description: Other viruses (not phage)
      PROTIST:
        description: Protist/microeukaryote isolates
      MICROALGAE:
        description: Microalgae isolates

  PhenotypeAssayType:
    description: >-
      Types of phenotype assays performed by research programs. Used to catalog
      what phenotyping capabilities and data types each SFA/BRC generates.
    permissible_values:
      # =========================================================================
      # Growth and fitness assays
      # =========================================================================
      GROWTH_CURVES:
        description: Growth rate measurements in liquid culture
      BIOLOG_PHENOTYPING:
        description: Biolog plate carbon/nitrogen source utilization profiling
      ANAEROBIC_GROWTH:
        description: Growth characterization under anaerobic conditions
      STRESS_TOLERANCE:
        description: Growth under stress conditions (pH, temperature, osmotic, metal)
      ANTIBIOTIC_RESISTANCE:
        description: Antibiotic susceptibility/resistance profiling

      # =========================================================================
      # Genetic/fitness screening
      # =========================================================================
      RBTSEQ_FITNESS:
        description: >-
          Random barcode transposon sequencing (RB-TnSeq) for genome-wide
          fitness profiling across conditions
      TRANSPOSON_MUTAGENESIS:
        description: Transposon insertion sequencing for gene essentiality/fitness
      CRISPR_SCREENS:
        description: CRISPR-based genetic screens (CRISPRi, knockout libraries)
      TNSEQ:
        description: Transposon sequencing for fitness profiling

      # =========================================================================
      # Interaction assays
      # =========================================================================
      COCULTURE_INTERACTIONS:
        description: Pairwise or multi-species co-culture interaction assays
      BACTERIAL_FUNGAL_INTERACTION_ASSAY:
        description: Bacterial-fungal co-culture or proximity interaction assays
      FUNGAL_HIGHWAY_ASSAY:
        description: Fungal highway column assays for bacterial dispersal via mycelia
      ENDOHYPHAL_SCREENING:
        description: Screening for endohyphal bacteria within fungal isolates
      INTERNALIZATION_ASSAY:
        description: In vitro bacterial internalization into fungal cells
      SIDEROPHORE_ASSAY:
        description: Siderophore production and iron chelation assays
      PLANT_COLONIZATION:
        description: Plant root or leaf colonization assays
      PHAGE_HOST_RANGE:
        description: Phage-host infection range and specificity testing
      SYNTHETIC_COMMUNITY:
        description: Defined synthetic community assembly and dynamics
      COMPETITION_ASSAYS:
        description: Competitive fitness assays between strains

      # =========================================================================
      # Metabolic/biochemical assays
      # =========================================================================
      EXOMETABOLOMICS:
        description: Extracellular metabolite profiling (spent media analysis)
      ENZYME_ACTIVITY_ASSAY:
        description: Enzyme activity measurements
      SUBSTRATE_UTILIZATION:
        description: Carbon/nitrogen substrate utilization profiling
      METABOLIC_FLUX:
        description: Metabolic flux analysis (13C labeling)
      RESPIRATION:
        description: Respiration rate measurements (O2 consumption, CO2 production)

      # =========================================================================
      # Imaging and single-cell assays
      # =========================================================================
      LIVE_CELL_IMAGING:
        description: Time-lapse microscopy of live cells
      FLOW_CYTOMETRY_PHENOTYPING:
        description: Single-cell phenotyping via flow cytometry
      NANOSIMS_ACTIVITY:
        description: NanoSIMS stable isotope incorporation for activity measurement
      CELL_MORPHOLOGY:
        description: Cell morphology and size measurements
      BIOFILM_ASSAYS:
        description: Biofilm formation and structure assays

      # =========================================================================
      # Environmental/ecological phenotypes
      # =========================================================================
      SOIL_INCUBATION:
        description: Soil microcosm incubation experiments
      QSIP_ACTIVITY:
        description: Quantitative stable isotope probing for in-situ activity
      ECOFAB_PHENOTYPING:
        description: EcoFAB fabricated ecosystem phenotyping

  InteractionType:
    description: Types of bacterial-fungal interactions based on ecological outcome
    permissible_values:
      MUTUALISM:
        description: >-
          Win-win interaction where bacteria and fungi achieve functional complementarity
          through resource sharing (e.g., mycorrhizal symbiosis, lichen symbiosis)
      ANTAGONISM:
        description: >-
          Reciprocal inhibition including pathogen infection, antibiotic production,
          and biological control mechanisms
      COMPETITION:
        description: >-
          Resource and spatial rivalry maintaining community stability through
          niche differentiation (e.g., iron, biotin, adhesion sites)
      COMMENSALISM:
        description: >-
          Interaction where one partner benefits while the other is unaffected
      PARASITISM:
        description: >-
          Interaction where one partner benefits at the expense of the other
      ENDOSYMBIOSIS:
        description: >-
          Obligate or facultative intracellular association where bacteria
          live within fungal cells (endohyphal bacteria)

  InteractionMode:
    description: Physical or chemical mode of bacterial-fungal interaction
    permissible_values:
      # Physical interaction modes
      PHYSICAL_ATTACHMENT:
        description: External attachment of bacteria to fungal surfaces (hyphae, spores)
      ENDOHYPHAL:
        description: Bacteria residing within fungal hyphae
      BIOFILM_FORMATION:
        description: Biofilm formation on fungal structures
      FUNGAL_HIGHWAY:
        description: Bacterial dispersal using fungal mycelia as transport networks
      # Chemical interaction modes
      QUORUM_SENSING:
        description: Chemical signaling via quorum sensing molecules
      VOLATILE_METABOLITES:
        description: Interaction mediated by volatile organic compounds
      SIDEROPHORE_MEDIATED:
        description: Iron competition via siderophore production
      ANTIBIOTIC_PRODUCTION:
        description: Interaction mediated by antibiotic secretion
      NUTRIENT_EXCHANGE:
        description: Metabolite exchange including carbon, nitrogen, vitamins
      CHEMOTAXIS:
        description: Directed movement in response to chemical gradients
