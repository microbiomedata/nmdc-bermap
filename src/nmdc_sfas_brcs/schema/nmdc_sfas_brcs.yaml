  KBaseCollection:
    description: >-
      Available KBase genome collections (as of 2024). Collections are
      curated datasets searchable by sequence similarity, taxonomy (GTDB),
      and functional traits (microTrait).
    permissible_values:
      GTDB:
        description: >-
          Genome Taxonomy Database reference collection - standardized
          microbial taxonomy based on genome phylogeny
      ENIGMA:
        description: >-
          ENIGMA SFA subsurface microbiome genomes from Oak Ridge
          Reservation contaminated site studies
      PMI:
        description: >-
          Plant Microbe Interfaces SFA rhizosphere genomes - plant-host
          associated microbial genomes showing Populus rhizosphere diversity
      GROW:
        description: >-
          Genome Resolved Open Watersheds (GROWdb) river microbiome MAGs
          from WHONDRS worldwide river sampling

  NMDCIngestPriority:
    description: >-
      Priority level for considering a study/dataset for NMDC ingest.
      Used to help prioritize which external datasets should be targeted
      for ingestion into the National Microbiome Data Collaborative.
    permissible_values:
      HIGH:
        description: >-
          High priority - dataset has rich microbiome data (metagenomes,
          amplicon sequences) with good metadata, ready for NMDC processing.
          Should be prioritized for ingest.
      MEDIUM:
        description: >-
          Medium priority - dataset has relevant microbiome data but may
          need metadata enrichment or format conversion before ingest.
      LOW:
        description: >-
          Low priority - dataset has some microbiome relevance but is
          either small, has limited metadata, or is a marginal candidate.

  OrganismType:
    description: >-
      Types of organisms in a microbial isolate collection. Used to characterize
      the taxonomic breadth of culture collections maintained by research programs.
    permissible_values:
