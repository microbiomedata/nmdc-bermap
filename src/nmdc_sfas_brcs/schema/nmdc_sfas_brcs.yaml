---
id: https://w3id.org/nmdc/sfas-brcs
name: nmdc-sfas-brcs
title: NMDC SFAs and BRCs Schema
description: |-
  A LinkML schema for representing DOE BER (Biological and Environmental Research)
  funded Scientific Focus Areas (SFAs) and Bioenergy Research Centers (BRCs),
  including their metadata, datasets, publications, and organizational structure.
license: MIT
see_also:
  - https://www.genomicscience.energy.gov
  - https://ess.science.energy.gov
  - https://science.osti.gov/ber

prefixes:
  nmdc_sfas_brcs: https://w3id.org/nmdc/sfas-brcs/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  orcid: https://orcid.org/
  ror: https://ror.org/
  doi: https://doi.org/
  pmid: https://www.ncbi.nlm.nih.gov/pubmed/
  obo: http://purl.obolibrary.org/obo/
  IAO: http://purl.obolibrary.org/obo/IAO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_

default_prefix: nmdc_sfas_brcs
default_range: string

imports:
  - linkml:types

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Container / Root Classes
  # ---------------------------------------------------------------------------

  ResearchProgramCollection:
    description: >-
      A container for DOE BER funded research programs including Bioenergy
      Research Centers (BRCs), Scientific Focus Areas (SFAs), and User Facilities.
    tree_root: true
    attributes:
      bioenergy_research_centers:
        description: Collection of DOE Bioenergy Research Centers
        range: BioenergyResearchCenter
        multivalued: true
        inlined_as_list: true
      genomic_science_sfas:
        description: Collection of Genomic Science Program Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      environmental_system_science_sfas:
        description: Collection of Environmental System Science Scientific Focus Areas
        range: ScientificFocusArea
        multivalued: true
        inlined_as_list: true
      user_facilities:
        description: Collection of DOE BER User Facilities
        range: UserFacility
        multivalued: true
        inlined_as_list: true
      other_programs:
        description: >-
          Other DOE research programs and initiatives that don't fit the
          traditional SFA/BRC/Facility categories (e.g., BRaVE, cross-cutting
          initiatives, time-limited projects)
        range: OtherProgram
        multivalued: true
        inlined_as_list: true
      metadata:
        description: Metadata about this collection
        range: CollectionMetadata

  CollectionMetadata:
    description: Metadata about the research program collection
    attributes:
      compiled_date:
        description: Date this collection was compiled (ISO 8601 format)
        range: string
      sources:
        description: Sources used to compile this collection
        range: string
        multivalued: true
      notes:
        description: Additional notes about the collection
        range: string

  # ---------------------------------------------------------------------------
  # Base Classes
  # ---------------------------------------------------------------------------

  NamedThing:
    description: >-
      A generic grouping for any identifiable entity
    abstract: true
    slots:
      - id
      - name
      - description
    class_uri: schema:Thing

  # ---------------------------------------------------------------------------
  # Research Programs (Common Parent for BRCs and SFAs)
  # ---------------------------------------------------------------------------

  ResearchProgram:
    description: >-
      A DOE BER funded research program. This is the common parent class for
      Bioenergy Research Centers (BRCs) and Scientific Focus Areas (SFAs).
      Both program types share common attributes including funding, institutions,
      personnel, research focus, and outputs.
    is_a: NamedThing
    abstract: true
    slots:
      - acronym
      - program_type
      - lead_institution
      - partner_institutions
      - principal_investigators
      - funding
      - location
      - websites
      - scientific_questions
      - keywords
      - data_types
      - data_collection_modalities
      - nmdc_umbrella_study
      - studies
      - analyses
      - kbase_genome_collection
      - datasets
      - key_publications
      - field_sites
      - established
      - collaborators
      - isolate_collections
      - phenotype_assays
    slot_usage:
      id:
        description: A unique identifier for the research program (e.g., nmdc_sfas_brcs:glbrc)
        pattern: "^([a-z][a-z0-9_]*:)?[a-z][a-z0-9_]*$"
      name:
        description: The full official name of the research program
        required: true

  BioenergyResearchCenter:
    description: >-
      A DOE Bioenergy Research Center (BRC). BRCs are large-scale, multi-institutional
      research centers focused on developing sustainable biofuels and bioproducts
      from plant biomass. The BRC program is part of the Genomic Science portfolio
      within DOE's Office of Science Office of Biological and Environmental Research.
    is_a: ResearchProgram
    class_uri: OBI:0000835
    slots:
      - outputs
      - predecessor
    slot_usage:
      program_type:
        ifabsent: "string(BIOENERGY_RESEARCH_CENTER)"

  ScientificFocusArea:
    description: >-
      A DOE Scientific Focus Area (SFA). SFAs are integrated research programs
      at DOE national laboratories focused on specific scientific areas within
      BER's portfolio. SFAs conduct coordinated, team-oriented research taking
      advantage of national laboratory strengths.
    is_a: ResearchProgram
    slots:
      - sfa_type
      - technologies_developed
      - co_investigators
    slot_usage:
      program_type:
        ifabsent: "string(SCIENTIFIC_FOCUS_AREA)"

  OtherProgram:
    description: >-
      Other DOE research programs and initiatives that don't fit the traditional
      SFA/BRC/Facility categories. Examples include BRaVE (Biopreparedness Research
      Virtual Environment) projects, cross-cutting initiatives, and time-limited
      collaborative projects spanning multiple DOE offices.
    is_a: ResearchProgram
    slots:
      - initiative_name
      - funding_period
      - participating_offices
    slot_usage:
      program_type:
        ifabsent: "string(OTHER_INITIATIVE)"

  UserFacility:
    description: >-
      A DOE BER User Facility providing resources and capabilities to the
      broader scientific community. Examples include JGI, EMSL, and KBase.
    is_a: NamedThing
    slots:
      - acronym
      - program_type
      - lead_institution
      - lead_institutions
      - funding
      - websites
      - services
      - capabilities
      - flagship_genomes
      - reference_data
      - supported_data_types

  # ---------------------------------------------------------------------------
  # Supporting Classes - Organizations and People
  # ---------------------------------------------------------------------------

  Institution:
    description: >-
      A research institution such as a national laboratory, university,
      or research institute.
    slots:
      - name
      - description
      - ror_id
      - institution_type
    class_uri: schema:Organization

  Person:
    description: >-
      A person involved in a research program, such as a principal investigator,
      co-investigator, or other key personnel.
    slots:
      - name
      - role
      - affiliation
      - email
      - orcid
      - expertise
    class_uri: schema:Person

  # ---------------------------------------------------------------------------
  # Supporting Classes - Funding and Location
  # ---------------------------------------------------------------------------

  FundingInfo:
    description: >-
      Information about funding for a research program including agency,
      program, and award details.
    attributes:
      agency:
        description: The funding agency (e.g., DOE BER)
        range: string
      program:
        description: The specific funding program (e.g., Genomic Science Program)
        range: string
      division:
        description: The division within the agency
        range: string
      subprogram:
        description: Subprogram or area within the program
        range: string
      area:
        description: Research area designation
        range: string
      contract:
        description: Contract number
        range: string
      grant:
        description: Grant number or identifier
        range: string
      total_funding:
        description: Total funding amount (may include period)
        range: string
      amount:
        description: Specific funding amount
        range: string
      award_2017:
        description: Award amount for 2017 funding cycle
        range: string
      current_period:
        description: Current funding period (e.g., 2023-2028)
        range: string

  Location:
    description: Geographic location information for a research program
    attributes:
      address:
        description: Street address or building name
        range: string
      city:
        description: City name
        range: string
      state:
        description: State or province
        range: string
      country:
        description: Country name
        range: string
        ifabsent: "string(USA)"

  # ---------------------------------------------------------------------------
  # Supporting Classes - Web Resources
  # ---------------------------------------------------------------------------

  WebResources:
    description: Collection of web resources associated with a research program
    attributes:
      main:
        description: Main website URL
        range: uri
      doe_page:
        description: DOE program page URL
        range: uri
      ornl_page:
        description: ORNL project page URL
        range: uri
      llnl_page:
        description: LLNL project page URL
        range: uri
      data_portal:
        description: Data portal URL
        range: uri
      data_hub:
        description: Data hub URL
        range: uri
      data_page:
        description: Data page URL
        range: uri
      atlas:
        description: Atlas or mapping portal URL
        range: uri
      github:
        description: GitHub organization or repository URL
        range: uri
      kbase:
        description: KBase collaboration page URL
        range: uri
      ess_dive:
        description: ESS-DIVE data portal URL
        range: uri
      ideas_watersheds:
        description: IDEAS-Watersheds page URL
        range: uri
      czen:
        description: Critical Zone Exploration Network page URL
        range: uri
      publications:
        description: Publications page URL
        range: uri
      highlights:
        description: Research highlights page URL
        range: uri
      documentation:
        description: Documentation URL
        range: uri
      bacterial_strains:
        description: Bacterial strains collection URL
        range: uri
      bfi_portal:
        description: BFI research portal URL
        range: uri
      ssrl_page:
        description: SSRL page URL
        range: uri
      anl_page:
        description: ANL page URL
        range: uri
      team:
        description: Team page URL
        range: uri
      phytozome:
        description: Phytozome plant genome portal URL
        range: uri

  # ---------------------------------------------------------------------------
  # Supporting Classes - Research Outputs
  # ---------------------------------------------------------------------------

  Dataset:
    description: >-
      A dataset produced by or associated with a research program.
    slots:
      - name
      - description
      - doi
      - url
      - repository
      - data_type
      - size
      - version
      - years
      - reference
      - count
      - osti_id
      - doi_examples
      - nmdc_study_id
      - jgi_project_id
      - ameriflux_site_id
      - lter_dataset_id
      - primary_reference
      - additional_references
    attributes:
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  Reference:
    description: >-
      A publication reference with key findings. Minimal metadata is stored here;
      full bibliographic data can be fetched/cached via linkml-reference-validator.
    slots:
      - id
      - title
      - findings
    slot_usage:
      id:
        description: DOI of the publication (e.g., doi:10.1038/s41586-020-03127-1)
        implements:
          - linkml:authoritative_reference

  Finding:
    description: A key finding or claim extracted from a publication
    slots:
      - statement
      - supporting_text
    attributes:
      reference:
        description: DOI of the publication this finding is from (for validation)
        range: uriorcurie
        implements:
          - linkml:authoritative_reference

  PrimaryReferenceInfo:
    description: >-
      Container for a primary reference with its metadata. Provides a structured
      way to associate a publication reference with an entity (e.g., IsolateCollection,
      Dataset) while allowing future annotations about the relationship.
    attributes:
      reference:
        description: The primary publication reference
        range: Reference
        inlined: true
        required: true
      relationship_note:
        description: >-
          Optional note describing the relationship between the reference and the
          entity it's attached to (e.g., "Describes the isolation methods",
          "First report of these isolates")
        range: string

  ProgramOutputs:
    description: Summary of research outputs from a program
    attributes:
      publication_count:
        description: Number or description of publications
        range: string
      patent_applications:
        description: Number of patent applications
        range: integer
      invention_disclosures:
        description: Number of invention disclosures
        range: integer
      licenses_options:
        description: Number of licenses or options
        range: integer
      patents:
        description: Number of patents granted
        range: integer
      startups:
        description: Number of startup companies formed
        range: integer

  IsolateCollection:
    description: >-
      A collection of cultured microbial isolates maintained by a research program.
      Provides catalog-level metadata about the collection; detailed isolate records
      are maintained in external systems (KBase, JGI, culture collections).
    slots:
      - name
      - description
    attributes:
      organism_types:
        description: Types of organisms in this collection
        range: OrganismType
        multivalued: true
      isolate_count:
        description: Approximate number of isolates in the collection
        range: integer
      genome_count:
        description: Number of isolates with sequenced genomes
        range: integer
      source_environments:
        description: >-
          Environments from which isolates were obtained (e.g., rhizosphere,
          subsurface, contaminated groundwater, phyllosphere)
        range: string
        multivalued: true
      isolation_methods:
        description: >-
          Brief description of isolation methods used (e.g., aerobic plating,
          anaerobic enrichment, single-cell sorting)
        range: string
        multivalued: true
      host_organisms:
        description: >-
          Host organisms if isolates are host-associated (e.g., Populus,
          Panicum virgatum)
        range: string
        multivalued: true
      culture_collection_url:
        description: URL to browse or request live cultures
        range: uri
      genome_catalog_url:
        description: URL to genome data (KBase narrative, JGI, NCBI BioProject)
        range: uri
      kbase_narrative_id:
        description: KBase narrative ID containing isolate genomes if applicable
        range: string
      primary_reference:
        description: >-
          DOI of primary publication describing the collection.
          DEPRECATED: Use primary_reference_info for new entries to enable title validation.
        range: uriorcurie
        implements:
          - linkml:authoritative_reference
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  # ---------------------------------------------------------------------------
  # Supporting Classes - Field Sites and Research Focus
  # ---------------------------------------------------------------------------

  FieldSite:
    description: A field research site associated with a research program
    slots:
      - name
      - description
    attributes:
      location:
        description: Geographic location of the field site
        range: string
      contaminants:
        description: Contaminants present at the site (if applicable)
        range: string
        multivalued: true
      contamination_source:
        description: Source of contamination at the site
        range: string

  Technology:
    description: A technology or tool developed by a research program
    slots:
      - name
      - description

  NMDCStudyReference:
    description: >-
      A reference to an NMDC study associated with a research program.
      Links BRC/SFA research to specific studies in the National Microbiome
      Data Collaborative. Can also represent studies that are candidates for
      NMDC ingest (nmdc_ingest_target=true).
    slots:
      - nmdc_study_id
      - name
      - description
      - primary_reference
      - keywords
    attributes:
      pi:
        description: Principal investigator name for this study
        range: string
      bioproject_ids:
        description: NCBI BioProject identifiers associated with this study
        range: string
        multivalued: true
      gold_study_id:
        description: GOLD study identifier (e.g., gold:Gs0128851)
        range: string
      jgi_proposal_id:
        description: JGI proposal identifier
        range: string
      brc_dataset_ids:
        description: >-
          Dataset identifiers from the BRC API (api.bioenergy.org) associated
          with this study. These are the native identifiers which may be
          DOIs, BioProject IDs, or repository-specific IDs.
        range: string
        multivalued: true
      nmdc_ingest_target:
        description: >-
          If true, indicates this study has data that should be targeted
          for ingest into NMDC but is not yet registered there.
        range: boolean
      nmdc_ingest_priority:
        description: >-
          Priority level for NMDC ingest consideration. HIGH for datasets
          with rich microbiome data ready for processing, MEDIUM for
          datasets that need some preparation, LOW for marginal candidates.
        range: NMDCIngestPriority
      data_modalities:
        description: Types of data generated in this study (e.g., 16S_AMPLICON, METAGENOMICS)
        range: DataType
        multivalued: true
      sample_count:
        description: Number of samples in the study
        range: integer
      organism:
        description: Primary organism studied
        range: string
      preprocessed_data_available:
        description: >-
          Types of preprocessed/derived data products available in public repositories
          (e.g., NCBI) for this study. Examples include MAGs (metagenome-assembled genomes),
          genome assemblies, gene annotations, etc. Used to identify studies with
          analysis-ready data that may meet NMDC quality standards.
        range: PreprocessedDataType
        multivalued: true
      preprocessed_data_counts:
        description: >-
          Counts of preprocessed data products available (e.g., "28 MAGs", "135 Gbases").
          Free text to capture quantity and type.
        range: string
      ncbi_data_quality_notes:
        description: >-
          Notes about the quality or completeness of preprocessed data in NCBI.
          Used to track whether external data meets NMDC standards.
        range: string
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  # ---------------------------------------------------------------------------
  # Supporting Classes - Analysis and KBase
  # ---------------------------------------------------------------------------

  Analysis:
    description: >-
      A computational analysis performed on research data. This is an abstract
      base class for different types of analyses including KBase narratives,
      pipeline runs, and other computational workflows.
    is_a: NamedThing
    abstract: true
    slots:
      - primary_reference
      - additional_references
    attributes:
      analysis_type:
        description: Type of analysis performed
        range: AnalysisType
      input_data_description:
        description: Description of input data used
        range: string
      output_data_types:
        description: Types of data objects produced
        range: DataType
        multivalued: true
      primary_reference_info:
        description: >-
          Primary publication reference with structured metadata for validation.
          Preferred over primary_reference slot - enables title and excerpt validation.
        range: PrimaryReferenceInfo
        inlined: true

  KBaseNarrative:
    description: >-
      A KBase Narrative - a reproducible, shareable analysis workflow in the
      DOE Systems Biology Knowledgebase. Narratives combine data, analysis
      steps, and documentation in an executable Jupyter-like notebook format.
      Can be made public, shared, and assigned DOIs for citation.
    is_a: Analysis
    attributes:
      kbase_narrative_id:
        description: >-
          KBase narrative numeric ID (e.g., "109073"). This is the number
          that appears in URLs like kbase.us/n/109073/63/
        range: string
      kbase_narrative_url:
        description: Full URL to the public narrative
        range: uri
      kbase_workspace_id:
        description: >-
          Workspace ID for programmatic access via KBase Workspace API
        range: string
      osti_doi:
        description: >-
          DOI assigned by OSTI if narrative has been registered as a
          citable dataset (format: 10.25982/...)
        range: string
      is_static:
        description: >-
          Whether this is a static (snapshot) narrative suitable for citation
        range: boolean
      genome_count:
        description: Number of genomes/MAGs in this narrative
        range: integer
      sample_count:
        description: Number of samples in this narrative
        range: integer
      related_narratives:
        description: IDs of related KBase narratives
        range: string
        multivalued: true

  FlagshipGenome:
    description: A flagship genome sequenced and maintained by a facility
    slots:
      - name
      - description
    attributes:
      common_name:
        description: Common name of the organism
        range: string
      year:
        description: Year the genome was sequenced
        range: integer

  ReferenceData:
    description: Reference data maintained by a facility
    attributes:
      microbial_genomes:
        description: Number/source of microbial genomes
        range: string
      plant_genomes:
        description: Number/source of plant genomes
        range: string
      biolog_media:
        description: Number of Biolog media formulations
        range: string
      reactions_compounds:
        description: Number/source of reactions and compounds
        range: string

  # ---------------------------------------------------------------------------
  # Supporting Classes - Capabilities
  # ---------------------------------------------------------------------------

  Capability:
    description: >-
      A scientific capability or resource provided by a user facility,
      including instrumentation, platforms, and analytical services.
    slots:
      - name
      - description
    attributes:
      capability_type:
        description: The type/category of capability
        range: CapabilityType
      instruments:
        description: Specific instruments or equipment supporting this capability
        range: Instrument
        multivalued: true
        inlined_as_list: true
      access_mode:
        description: How users can access this capability
        range: string
      throughput:
        description: Throughput or capacity metrics
        range: string
      year_established:
        description: Year this capability was established
        range: integer
      url:
        description: URL for more information about this capability
        range: uri
      applications:
        description: Key applications or use cases for this capability
        range: string
        multivalued: true
      data_products:
        description: Types of data products generated by this capability
        range: string
        multivalued: true
      status:
        description: Current operational status
        range: CapabilityStatus
      commissioned_date:
        description: Date the capability was commissioned
        range: date
      leader:
        description: Name of the capability lead or manager
        range: string
      future_expansion:
        description: Notes on planned future expansion or related facilities
        range: string

  Instrument:
    description: >-
      A scientific instrument or piece of equipment that supports a capability.
    slots:
      - name
      - description
    attributes:
      instrument_type:
        description: Type of instrument
        range: InstrumentType
      manufacturer:
        description: Manufacturer of the instrument
        range: string
      model:
        description: Model name or number
        range: string
      count:
        description: Number of instruments of this type
        range: integer
      specifications:
        description: Key specifications (e.g., resolution, sensitivity)
        range: string

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Identifier Slots
  # ---------------------------------------------------------------------------

  id:
    identifier: true
    slot_uri: schema:identifier
    range: uriorcurie
    description: A unique identifier for an entity

  acronym:
    description: Short acronym or abbreviation for the program (e.g., GLBRC, ENIGMA)
    range: string
    slot_uri: schema:alternateName

  ror_id:
    description: Research Organization Registry identifier
    range: uriorcurie
    pattern: "^ror:\\d{9}$"

  orcid:
    description: ORCID identifier for a person
    range: uriorcurie
    pattern: "^orcid:\\d{4}-\\d{4}-\\d{4}-\\d{3}[0-9X]$"

  doi:
    description: Digital Object Identifier
    range: uriorcurie

  pmid:
    description: PubMed identifier
    range: string

  osti_id:
    description: OSTI (Office of Scientific and Technical Information) identifier
    range: string

  nmdc_study_id:
    description: >-
      National Microbiome Data Collaborative study identifier
      (e.g., nmdc:sty-11-ev70y104)
    range: uriorcurie
    pattern: "^nmdc:sty-[a-z0-9-]+$"

  nmdc_umbrella_study:
    description: >-
      The NMDC umbrella study identifier for this research program.
      This is the top-level study that child studies link to via part_of.
    range: uriorcurie
    pattern: "^nmdc:sty-[a-z0-9-]+$"

  studies:
    description: >-
      NMDC studies associated with this research program. These are
      individual research studies that are part of the program.
    range: NMDCStudyReference
    multivalued: true
    inlined_as_list: true

  analyses:
    description: >-
      Computational analyses associated with this research program,
      including KBase narratives and other workflows.
    range: KBaseNarrative
    multivalued: true
    inlined_as_list: true

  kbase_genome_collection:
    description: >-
      If this program has a curated genome collection in KBase Collections
      (e.g., ENIGMA, PMI, GROW), the collection identifier. Collections are
      searchable curated datasets with GTDB taxonomy and microTrait annotations.
    range: KBaseCollection

  jgi_project_id:
    description: >-
      DOE Joint Genome Institute project identifier for sequence data
      (e.g., Gs0114663 or 1191516)
    range: string

  ameriflux_site_id:
    description: >-
      Ameriflux site identifier for flux tower data (e.g., US-KL1)
    range: string
    pattern: "^[A-Z]{2}-[A-Za-z0-9]+$"

  lter_dataset_id:
    description: >-
      Long Term Ecological Research Network dataset identifier
    range: string

  primary_reference:
    description: DOI of the primary publication describing this dataset
    range: uriorcurie
    implements:
      - linkml:authoritative_reference

  additional_references:
    description: DOIs of additional publications associated with or derived from this dataset
    range: uriorcurie
    multivalued: true

  # ---------------------------------------------------------------------------
  # Descriptive Slots
  # ---------------------------------------------------------------------------

  name:
    slot_uri: schema:name
    description: A human-readable name for an entity
    range: string

  description:
    slot_uri: schema:description
    description: A human-readable description for an entity
    range: string

  title:
    description: Title of a publication or other work
    range: string
    slot_uri: dcterms:title

  # ---------------------------------------------------------------------------
  # Program Classification Slots
  # ---------------------------------------------------------------------------

  program_type:
    description: The type of research program
    range: ProgramType

