  - DNA synthesis
  - METABOLOMICS
  - computational analysis
  - single-cell genomics
  capabilities:
  - name: High-Throughput Sequencing
    description: Short- and long-read sequencing platforms producing billions of reads for genomic assembly,
      resequencing, RNAseq annotation, and metagenomics. Total output in 2024 was 870 Tb.
    capability_type: SEQUENCING
    status: OPERATIONAL
    url: https://jgi.doe.gov/work-with-us/offerings-capabilities
    throughput: 870 Tb annually
    instruments:
    - name: Illumina NovaSeq
      instrument_type: ILLUMINA_SEQUENCER
      description: Short-read sequencing producing paired-end 150bp reads
    - name: PacBio Revio
      instrument_type: PACBIO_SEQUENCER
      description: Long-read sequencing averaging 60-70 kbp reads
    applications:
    - Genome assembly
    - Metagenome sequencing
    - RNA-seq
    - Single-cell genomics
    data_products:
    - Raw sequence reads
    - Assembled genomes
    - Annotated transcripts
  - name: DNA Synthesis Platform
    description: DNA design and synthesis capabilities supporting researchers exploring conversion of
      sequence into functional assessments. Minimum request is 100 kb.
    capability_type: DNA_SYNTHESIS
    status: OPERATIONAL
    url: https://jgi.doe.gov/work-with-us/offerings-capabilities
    applications:
    - Biosynthetic pathway refactoring
    - Gene synthesis
    - Construct assembly
    data_products:
    - Synthesized DNA constructs
    - Verified plasmids
  - name: Metabolomics Program
    description: Functional annotation of genomes through metabolomics, providing improved understanding
      of the role of small molecules in diverse biological systems. Minimum 22 samples required.
    capability_type: METABOLOMICS_MS
    status: OPERATIONAL
    url: https://jgi.doe.gov/science-programs/secmet
    applications:
    - Secondary metabolite identification
    - Biosynthetic gene cluster characterization
    - Pathway validation
    data_products:
    - Metabolite profiles
    - Mass spectra (submitted to MassIVE)
  - name: AI-Centric Analysis
    description: AI/ML-based computational analysis including protein family discovery, biosynthetic gene
      cluster prediction, and genome annotation. Doubled known protein families using AI clustering algorithms.
    capability_type: AI_ML_ANALYSIS
    status: OPERATIONAL
    applications:
