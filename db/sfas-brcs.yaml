    title: Rewiring metabolism of Clostridium thermocellum for consolidated bioprocessing of lignocellulosic
      biomass poplar to produce short-chain esters
    findings:
    - statement: Engineered C. thermocellum produces short-chain esters directly from poplar biomass
        via consolidated bioprocessing, with up to 80-fold improvement through carbohydrate esterase
        deletion and alcohol acetyltransferase overexpression
      reference: doi:10.1016/j.biortech.2023.129263
  - id: doi:10.1038/s41563-024-02024-6
    title: Lignin deoxygenation for the production of sustainable aviation fuel blendstocks
    findings:
    - statement: Continuous two-stage catalytic process using molybdenum carbide deoxygenates poplar
        lignin into jet-range aromatic hydrocarbons with 87.5% selectivity and 86% carbon recovery
      reference: doi:10.1038/s41563-024-02024-6
    - statement: Lignin-derived SAF aromatics are performance-advantaged relative to conventional jet
        fuel aromatics and lignin can meet current aromatic demand 2.5 times over
      reference: doi:10.1038/s41563-024-02024-6
