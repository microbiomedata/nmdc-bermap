- id: nmdc_sfas_brcs:mercury_sfa
  name: Biogeochemical Transformations at Critical Interfaces in a Mercury Perturbed Watershed
  acronym: Mercury SFA
  program_type: SCIENTIFIC_FOCUS_AREA
  sfa_type: ENVIRONMENTAL_SYSTEM_SCIENCE_SFA
  end_date: '2023'
  lead_institution: Oak Ridge National Laboratory
  principal_investigators:
  - name: Scott Brooks
    affiliation: Oak Ridge National Laboratory
  funding:
    agency: DOE BER
    program: Environmental System Science (ESS)
    subprogram: Subsurface Biogeochemical Research
  websites:
