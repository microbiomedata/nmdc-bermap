    title: Quantitative fermentation of unpretreated transgenic poplar by Caldicellulosiruptor bescii
    findings:
    - statement: Metabolically engineered C. bescii directly ferments transgenic low-lignin poplar
        without pretreatment, demonstrating consolidated bioprocessing of woody biomass
      reference: doi:10.1038/s41467-019-11376-6
    - statement: C. bescii with C. thermocellum adhE gene produces ethanol directly from unpretreated
        plant biomass, bypassing costly pretreatment steps for lignin-rich feedstocks
      reference: doi:10.1038/s41467-019-11376-6
