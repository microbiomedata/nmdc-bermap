  description: 'Develops mechanistic understanding of how climatic conditions affect terrestrial wetland
    ecosystem function, particularly carbon dynamics. Organized around three themes: fine-scale hydro-biogeochemical
    mechanisms controlling C cycling and GHG emissions, above/belowground processes and interactions,
    and model integration at fine and intermediate scales.'
