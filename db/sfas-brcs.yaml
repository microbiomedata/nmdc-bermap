    description: >
      Comprehensive dataset from MONet 1000 Soils Pilot including geochemistry, texture, respiration,
      enzyme activities, FTICR-MS organic matter chemistry, microbial biomass C and N, water-extractable
      organic matter TOC/TDN, X-ray computed tomography metrics, metagenomes, and soil hydraulic properties.
      Interactive visualization at https://shinyproxy.emsl.pnnl.gov/app/1000soils
    repository: Zenodo
    doi: 10.5281/zenodo.15328215
    url: https://zenodo.org/records/15328215
    data_type: multi-omics
    version: v9
