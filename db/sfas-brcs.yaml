  description: SEED develops predictive understanding of how microorganisms establish, spread, and influence
    ecosystems critical to DOE missions. Combines expertise in microbiology, plant biology, ecology, genetic
    engineering, and computational sciences. Currently deploying biodesign tools in the plant growth-promoting
    bacteria Bacillus velezensis to improve Populus resistance to the pathogenic fungus Sphaerulina musiva.
  scientific_questions:
  - What factors influence microbial invasion success?
  - How do introduced microbes establish and spread in ecosystems?
  - How can we engineer ecosystems for DOE missions?
  - What risks do engineered organisms pose to ecosystems?
  - How can we detect and quantify microbial activity in situ?
