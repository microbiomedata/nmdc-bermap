  description: >
    GLBRC is a cross-disciplinary research center developing sustainable biofuels and bioproducts from
    dedicated energy crops grown on marginal, nonagricultural lands. Research spans three crosscutting
    themes: sustainable bioenergy cropping systems, sustainable biomass conversion, and sustainable field-to-product
    optimization.
  scientific_questions:
  - How can we develop sustainable bioenergy cropping systems on marginal lands?
  - What are the mechanisms of lignocellulose deconstruction?
  - How do we optimize conversion of biomass to fuels and chemicals?
  - What microorganisms and enzymes can efficiently convert plant biomass?
  - How do we balance productivity with ecosystem sustainability?
