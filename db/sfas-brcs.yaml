  description: Identifies and quantifies biogeochemical processes and underlying mechanisms controlling
    actinide mobility to reliably predict and control cycling and migration of actinides in the environment.
    Focus on plutonium (>2200 metric tons deposited globally) and neptunium behavior, including interactions
    with lanmodulin and similar compounds.
