- id: nmdc_sfas_brcs:pnnl_soil_microbiome
  name: Phenotypic Response of the Soil Microbiome to Environmental Perturbations
  acronym: Soil Microbiome SFA
  program_type: SCIENTIFIC_FOCUS_AREA
  sfa_type: GENOMIC_SCIENCE_SFA
  lead_institution: Pacific Northwest National Laboratory
  principal_investigators:
  - name: Kirsten Hofmockel
    role: Principal Investigator
    affiliation: Pacific Northwest National Laboratory
  funding:
    agency: DOE BER
    program: Genomic Science Program
    area: Environmental Microbiome Science
  websites:
    main: https://www.pnnl.gov/projects/soil-microbiome
