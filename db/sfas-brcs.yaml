bioenergy_research_centers:
- id: nmdc_sfas_brcs:glbrc
  name: Great Lakes Bioenergy Research Center
  acronym: GLBRC
  program_type: BIOENERGY_RESEARCH_CENTER
  lead_institution: University of Wisconsin-Madison
  partner_institutions:
  - Michigan State University
  - DOE Joint Genome Institute
  - Pacific Northwest National Laboratory
  principal_investigators:
  - name: Timothy Donohue
    role: Director
    affiliation: University of Wisconsin-Madison
    email: tdonohue@bact.wisc.edu
  - name: Federica Brandizzi
    role: Science Director
    affiliation: Michigan State University
  funding:
    agency: DOE BER
    program: Genomic Science Program
    total_funding: $375 million (across three funding phases since 2007)
    current_period: 2023-2028
  location:
    address: Wisconsin Energy Institute, UW-Madison
    city: Madison
    state: Wisconsin
    country: USA
  websites:
    main: https://www.glbrc.org
    doe_page: https://www.genomicscience.energy.gov/glbrc/
    data_portal: https://www.glbrc.org/data-and-tools
    atlas: https://atlas.glbrc.org/
  description: >
    GLBRC is a cross-disciplinary research center developing sustainable biofuels and bioproducts from
    dedicated energy crops grown on marginal, nonagricultural lands. Research spans three crosscutting
    themes: sustainable bioenergy cropping systems, sustainable biomass conversion, and sustainable field-to-product
    optimization.
  scientific_questions:
  - How can we develop sustainable bioenergy cropping systems on marginal lands?
  - What are the mechanisms of lignocellulose deconstruction?
  - How do we optimize conversion of biomass to fuels and chemicals?
  - What microorganisms and enzymes can efficiently convert plant biomass?
  - How do we balance productivity with ecosystem sustainability?
  keywords:
  - BIOENERGY
  - BIOFUELS
  - LIGNOCELLULOSE
  - SWITCHGRASS
  - POPLAR
  - ENERGY_SORGHUM
  - MISCANTHUS
  - MICROBIAL_CONVERSION
  - SUSTAINABILITY
  - MARGINAL_LANDS
  - CELLULOSIC_BIOMASS
  - LIGNIN_VALORIZATION
  data_types:
  - GENOMICS
  - TRANSCRIPTOMICS
  - METABOLOMICS
  - PROTEOMICS
  - FIELD_TRIAL_DATA
  - SATELLITE_IMAGERY
  - CROP_YIELD_DATA
  - SOIL_MICROBIOME_DATA
  - ENZYME_ACTIVITY_DATA
  data_collection_modalities:
  - FIELD_EXPERIMENTS
  - GREENHOUSE_STUDIES
  - LABORATORY_FERMENTATION
  - REMOTE_SENSING
  - LONG_TERM_ECOLOGICAL_RESEARCH
  - HIGH_THROUGHPUT_SCREENING
  nmdc_umbrella_study: nmdc:sty-11-y1kdd163
  studies:
  - nmdc_study_id: nmdc:sty-11-e4yb9z58
    name: Seasonal activities of the phyllosphere microbiome of perennial crops
    pi: Ashley Shade
    description: Genome-centric approach to identify ecologically important leaf microbiome members on
      switchgrass and miscanthus, quantifying activities over two growing seasons. Classes represented
      by MAGs (Actinomycetia, Alpha- and Gamma-Proteobacteria, Bacteroidota) are active in late season
      with stress-associated pathways and biosynthetic pathways for terpenes and non-ribosomal peptides.
    organism: switchgrass phyllosphere metagenome
    data_modalities:
    - METAGENOMICS
    - METATRANSCRIPTOMICS
    gold_study_id: gold:Gs0128851
    jgi_proposal_id: '503249'
    primary_reference_info:
      reference:
        id: doi:10.1038/s41467-023-36515-y
        title: Seasonal activities of the phyllosphere microbiome of perennial crops
    study_design:
      design_types:
      - id: OBI:0500020
        label: time series design
      observational_units:
      - phyllosphere microbiome samples
      sampling_strategy: Seasonal field sampling over two growing seasons from perennial crop phyllospheres.
      replication: Samples collected across switchgrass and miscanthus field plots.
      notes: Initial variable catalog entry; source field names should be refined against the raw submission.
    variables:
    - name: sampling season
      description: Seasonal sampling point for phyllosphere microbiome activity measurements.
      roles:
      - DATE_TIME_VARIABLE
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      time_series: true
      temporal_resolution: seasonal sampling over two growing seasons
      levels:
      - early season
      - mid season
      - late season
      source_field_names:
      - season
      - sampling_date
      mixs_terms:
      - id: MIXS:0000829
        label: season
      - id: MIXS:0000011
        label: collection date
    - name: host crop
      description: Perennial bioenergy crop host sampled for phyllosphere community profiling.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      measured_entity: perennial bioenergy crop
      material_or_matrix: leaf phyllosphere
      levels:
      - switchgrass
      - miscanthus
      source_field_names:
      - host_species
      - crop
      mixs_terms:
      - id: MIXS:0000248
        label: host common name
    - name: phyllosphere transcript activity
      description: Microbial transcript abundance profiles used to infer seasonal activity of phyllosphere taxa.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: phyllosphere microbial community
      material_or_matrix: leaf phyllosphere
      method: metatranscriptomics
      time_series: true
      temporal_resolution: seasonal sampling over two growing seasons
      source_field_names:
