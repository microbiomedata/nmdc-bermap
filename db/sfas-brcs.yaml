  key_publications:
  - id: doi:10.3389/fsoil.2023.1120425
    title: One thousand soils for molecular understanding of belowground carbon cycling
    findings:
    - statement: >
        MONet pilot collected standardized soil samples using molecular techniques including FTICR-MS
        and X-ray computed tomography to advance understanding of belowground carbon cycling.
    - statement: >
        Wildfire may result in oxidation of SOM and structural changes to soil pore networks that
        persist into deeper soils, with reduced soil respiration, microbial biomass, and enzyme activity.
  - id: doi:10.1029/2024GL113091
    title: >
      Scaling High-Resolution Soil Organic Matter Composition to Improve Predictions of Potential
      Soil Respiration Across the Continental United States
    findings:
    - statement: >
        Machine learning can distill thousands of SOM formulas into tractable units for integration
        into soil respiration models.
    - statement: >
        In surface soils, SOM chemistry provides better estimates of potential soil respiration than
        soil physicochemistry alone; combining both yields the best prediction.
  collaborators: >
    Joint Genome Institute (sequencing and metagenome analysis),
    National Ecological Observatory Network (field sites and continuous sensing),
    National Microbiome Data Collaborative (microbiome metadata standards)
