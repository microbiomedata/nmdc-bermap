- id: nmdc_sfas_brcs:brave_sorghum_anthracnose
  name: Sorghum-Anthracnose-Biocontrol Interactions
  acronym: SABI
  program_type: BIOPREPAREDNESS_INITIATIVE
  initiative_name: BRaVE
  funding_period: 2023-2026
  participating_offices:
  - BER
  - ASCR
  lead_institution: Lawrence Berkeley National Laboratory
  principal_investigators:
  - name: Trent Northen
    role: Principal Investigator
    affiliation: Lawrence Berkeley National Laboratory
  funding:
    agency: DOE BER
    program: Biopreparedness Research Virtual Environment (BRaVE)
  websites:
    doe_page: https://www.genomicscience.energy.gov/brave-awards23/
  description: BRaVE project investigating molecular interactions between sorghum (a bioenergy crop),
    its anthracnose-disease causative fungal pathogen Colletotrichum sublineola (Cs), and antifungal biocontrol
    bacteria to create disease-resilient bioenergy crops. Uses computational and experimental approaches
    to study plant-pathosystem interactions.
  scientific_questions:
  - What molecular mechanisms underlie sorghum-Colletotrichum pathogenic interactions?
  - How do biocontrol bacteria protect sorghum from anthracnose disease?
  - How can we engineer disease-resilient bioenergy crops?
  keywords:
  - BIOSECURITY
  - SORGHUM
  - FUNGAL_PATHOGENS
  - BIOENERGY_CROPS
  - PLANT_MICROBE_INTERACTIONS
  - BIODEFENSE
  data_types:
  - METAGENOMICS
  - TRANSCRIPTOMICS
  - METABOLOMICS
  isolate_collections:
  - name: Sorghum-Associated Bacterial Collection
    description: Bacterial isolates with biocontrol activity against Colletotrichum sublineola, collected
      from sorghum rhizosphere and phyllosphere.
    organism_types:
    - BACTERIA
    source_environments:
    - Sorghum rhizosphere
    - Sorghum phyllosphere
    host_organisms:
    - Sorghum bicolor
  - name: Colletotrichum Pathogen Collection
    description: Colletotrichum sublineola isolates causing anthracnose disease in sorghum.
    organism_types:
    - FUNGI
    source_environments:
    - Infected sorghum tissue
  phenotype_assays:
  - PLANT_COLONIZATION
  - BACTERIAL_FUNGAL_INTERACTION_ASSAY
  - GROWTH_CURVES
  - COMPETITION_ASSAYS
