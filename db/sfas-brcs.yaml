  principal_investigators:
  - name: Margaret S. Cheung
    role: Principal Investigator
    affiliation: Pacific Northwest National Laboratory
  funding:
    agency: DOE BER
    program: Biopreparedness Research Virtual Environment (BRaVE)
  websites:
    doe_page: https://www.genomicscience.energy.gov/brave-awards23/
    main: https://www.pnnl.gov/projects/nw-brave
  description: >
    NW-BRaVE (Northwest BRaVE) project at PNNL developing a powerful and user-friendly platform
    to elucidate the fundamental principles of how molecular interactions drive pathogen-host
    relationships. Uses cyanobacteria (including Prochlorococcus marinus MED4) and their viral
    parasites (cyanophages) as a model system. Integrates structural biology (cryo-ET), genomics,
    proteomics, and multiomics measurements with machine learning to study pathogen adaptation
    and coevolution across molecular and evolutionary scales. Key computational tools include
    Lattice Microbes (spatiotemporal modeling), PTM-Psi (post-translational modification analysis),
    and EcoKMER (data processing). Research thrusts span cryo-ET visualization of molecular
    interactions, multiomics regulatory pathway mapping, spatiotemporal dynamics of
    cyanobacteria-phage systems, and multimodal data integration for host-pathogen surveillance.
  scientific_questions:
  - What molecular complexes form during pathogen infection?
  - How do regulatory changes occur during infection at the proteomics level?
  - What evolutionary factors affect host-pathogen coevolution?
  - How can we integrate multi-scale data for biosurveillance?
  - How do redox-dependent post-translational modifications regulate the dark complex and carbon fixation?
  keywords:
  - BIOSECURITY
  - BIODEFENSE
  - MICROBIAL_ECOSYSTEMS
