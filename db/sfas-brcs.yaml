  - name: Sorghum Phyllosphere Microbiome
    pi: Ashley Shade
    description: Functional and genomic diversity of the sorghum phyllosphere microbiome. Collection of
      47 bacteria isolated from aerial root mucilage of energy sorghum plus metagenome and metatranscriptome
      data from phyllosphere communities.
    organism: Sorghum bicolor
    keywords:
    - SORGHUM
    - RHIZOSPHERE
    - PLANT_MICROBE_INTERACTIONS
    - BIOENERGY
    data_modalities:
    - METAGENOMICS
    - METATRANSCRIPTOMICS
    - AMPLICON_16S
    bioproject_ids:
    - PRJNA862978
    - PRJNA844896
    brc_dataset_ids:
    - Gs0157305
    - PRJNA862978
    - PRJNA844896
    - '503249'
    nmdc_ingest_target: true
    nmdc_ingest_priority: HIGH
    primary_reference_info:
      reference:
        id: doi:10.1038/s41467-024-50463-1
        title: Disentangling plant- and environment-mediated drivers of active rhizosphere bacterial community
          dynamics during short-term drought
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      observational_units:
      - sorghum phyllosphere metagenome samples
      - sorghum phyllosphere metatranscriptome samples
      - sorghum-associated bacterial isolates
      sampling_strategy: Genome-resolved and transcript-resolved profiling of sorghum-associated phyllosphere
        communities, paired with isolation of culturable aerial root mucilage bacteria.
      notes: Variable catalog entry based on BRC dataset metadata and primary reference.
    variables:
    - name: host crop
      description: Sorghum host associated with phyllosphere, aerial root mucilage, or rhizosphere samples.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      measured_entity: Sorghum bicolor
      source_field_names:
      - host_common_name
      - crop
      - host_species
      mixs_terms:
      - id: MIXS:0000248
        label: host common name
    - name: plant-associated compartment
      description: Sorghum plant-associated habitat sampled for community profiling or isolate recovery.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      measured_entity: sorghum-associated microbial habitat
      levels:
      - phyllosphere
      - aerial root mucilage
      - rhizosphere
      source_field_names:
      - compartment
      - sample_type
      - niche
      mixs_terms:
      - id: MIXS:0000013
        label: local environmental context
      - id: MIXS:0000014
        label: environmental medium
    - name: sorghum-associated microbial community composition
      description: Amplicon, metagenomic, or metatranscriptomic profiles of sorghum-associated microbial communities.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: sorghum-associated microbial community
      material_or_matrix: phyllosphere, aerial root mucilage, and rhizosphere
      method: amplicon sequencing, metagenomics, and metatranscriptomics
      source_field_names:
      - asv_table
      - metagenome_profile
      - transcript_abundance
    - name: bacterial isolate identity
