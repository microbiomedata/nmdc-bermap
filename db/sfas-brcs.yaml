  - HYDROLOGICAL_DATA
  - BIOGEOCHEMICAL_DATA
  - WATER_CHEMISTRY
  - METAGENOMICS
  - METABOLOMICS
  - GEOSPATIAL
  data_collection_modalities:
  - FIELD_EXPERIMENTS
  - FIELD_SENSORS
  - STREAM_SAMPLING
  - GROUNDWATER_MONITORING
  - MULTI_OMICS
  - ECOSYSTEM_MODELING
  field_site_ids:
  - nmdc_sfas_brcs:site_chesapeake_bay_coastal_tai
  - nmdc_sfas_brcs:site_western_lake_erie_basin_coastal_tai
  studies:
  - name: Coastal Terrestrial-Aquatic Interface Flooding and Salinization Experiments
    pi: Vanessa Bailey
    description: Field and laboratory investigation of flooding, salinization, and water-level manipulation
      effects on coastal terrestrial-aquatic interface ecosystem state, redox chemistry, carbon oxidation,
      soil-water-sediment-microbe-plant interactions, and greenhouse gas production.
    organism: coastal soil, sediment, microbial, and plant communities
    data_modalities:
    - ENVIRONMENTAL_SENSOR_DATA
    - HYDROLOGICAL_DATA
    - BIOGEOCHEMICAL_DATA
    - METAGENOMICS
    - METABOLOMICS
    source_reference:
      url: https://ess.science.energy.gov/compass-coastal-systems/
      title: Coastal Observations, Mechanisms, and Predictions Across Systems and Scales - Field, Measurements, and Experiments
      summary: DOE ESS program page describing COMPASS-FME research questions, study regions, datasets,
        and data portal.
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      experimental_units:
      - field water-level manipulation plots
      - soil and sediment incubation cores
      - batch experiments
      observational_units:
      - coastal terrestrial-aquatic interface samples
      - in situ sensor time series
      - soil, water, sediment, microbial, and plant measurements
      sampling_strategy: Synoptic and temporally resolved sampling across shoreline-to-upland gradients,
        paired with field manipulations, laboratory incubations, and model integration.
      blocking: Chesapeake Bay and Western Lake Erie Basin regions; open-water, wetland, and upland gradient positions.
      notes: Variable catalog entry based on DOE ESS COMPASS-FME program description.
