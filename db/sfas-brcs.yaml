    data_hub: https://data.pnnl.gov/Soil_SFA
    kbase: https://www.kbase.us/research/hofmockel-sfa/
  description: >
    PNNL's Soil Microbiome SFA focuses on understanding how interactions among soil microbial community
    members lead to emergence of community functions. Research identifies molecular-level metabolic interactions
    governing decomposition and moisture effects on microbial phenotypes.
  field_site_ids:
  - nmdc_sfas_brcs:site_tall_wheatgrass_irrigation_trial
  scientific_questions:
  - How do microbial interactions lead to emergent community functions?
  - What predictable reaction modules exist based on resource availability?
  - How does soil desiccation affect metabolic processes?
  - What controls carbon use efficiency in soils?
  keywords:
  - SOIL_MICROBIOME
  - METAPHENOME
  - DECOMPOSITION
  - MOISTURE_EFFECTS
  - CARBON_USE_EFFICIENCY
  - MICROBIAL_INTERACTIONS
  - TALL_WHEATGRASS
  data_types:
  - METAGENOMICS
  - METABOLOMICS
  - IMAGING_DATA
  - IMAGING_DATA
  data_collection_modalities:
  - IMAGING
  - METAGENOMICS
  - LABORATORY_EXPERIMENTS
  studies:
  - name: Hi-C Metagenome Sequencing of Soil Moisture Impacts on Phage-Host Interactions
    pi: Kirsten Hofmockel
    description: High-throughput chromosomal conformation capture (Hi-C) metagenome sequencing revealing
      soil moisture impacts on phage-host interactions. Published in Nature Comm 2023.
    data_modalities:
    - METAGENOMICS
    nmdc_ingest_target: true
    primary_reference_info:
      reference:
        id: doi:10.1038/s41467-023-42967-z
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      experimental_units:
      - soil microcosms or field soil samples
      observational_units:
      - Hi-C metagenome samples
      - phage-host linkage records
      sampling_strategy: Hi-C metagenome sequencing to identify phage-host interactions across soil moisture
        conditions.
      notes: Variable catalog entry based on study description and primary publication.
    variables:
    - name: soil moisture condition
      description: Soil water availability condition used to assess moisture impacts on phage-host interactions.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - COVARIATE
      value_type: NUMERIC
      measured_entity: soil water content
      material_or_matrix: soil
      bervo_term:
        id: BERVO:0000301
        label: total soil water content
      source_field_names:
      - soil_moisture
      - water_content
      - moisture_condition
      mixs_terms:
      - id: MIXS:0000185
        label: water content
      - id: MIXS:0000591
        label: watering regimen
    - name: Hi-C contact signal
      description: Chromosomal conformation capture contact evidence used to link viral and host sequences.
      roles:
      - MEASURED_VARIABLE
      - DERIVED
      value_type: ARRAY
      measured_entity: viral-host DNA contact
      material_or_matrix: soil metagenome
      method: Hi-C metagenome sequencing
      source_field_names:
      - hic_contact
      - contact_matrix
      - read_pair_link
    - name: phage-host interaction
      description: Inferred interaction or linkage between phage sequence and microbial host genome.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - DERIVED
      value_type: ARRAY
      measured_entity: soil phage-host pair
      method: Hi-C link inference from metagenomic data
      source_field_names:
      - phage_host_link
      - virus_host_pair
      - host_prediction
    - name: viral contig or MAG
      description: Viral contig, viral genome, or microbial genome bin used in phage-host interaction analysis.
      roles:
      - IDENTIFIER
      - DERIVED
      value_type: IDENTIFIER
      measured_entity: viral or microbial genome sequence
      method: metagenome assembly and binning
      source_field_names:
      - viral_contig_id
      - mag_id
      - genome_id
  - name: Soil Microbiome Response to Depth, Irrigation and Plant Genotype
    pi: Kirsten Hofmockel
    description: Influence of soil depth, irrigation, and plant genotype on the soil microbiome, metaphenome,
      and carbon chemistry. Multi-omics study published in mBio 2023.
    data_modalities:
    - METAGENOMICS
    - METABOLOMICS
    - PROTEOMICS
    nmdc_ingest_target: true
    primary_reference_info:
      reference:
        id: doi:10.1128/mbio.01758-23
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      experimental_units:
      - planted soil microcosms
      observational_units:
      - soil multi-omics samples
      sampling_strategy: Multi-omics profiling across soil depth, irrigation, and plant genotype conditions.
      notes: Initial variable catalog entry based on study description.
    variables:
    - name: soil depth
      description: Sampling depth below the soil surface.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - SPATIAL_INDEX
      value_type: NUMERIC
