    doe_page: https://ess.science.energy.gov/compass-coastal-systems/
    ess_dive: https://data.ess-dive.lbl.gov/portals/compass
  description: >
    COMPASS-FME is a BER ESS coastal systems project improving predictive understanding of terrestrial-aquatic
    interfaces in the Chesapeake Bay and Western Lake Erie Basin. The project combines field observations,
    in situ sensors, large campaign-based collections, laboratory incubations, water-level manipulations,
    molecular characterization, and multiscale modeling of soil, water, sediment, microbial, and plant processes.
  scientific_questions:
  - What ecological, biogeochemical, and hydrological control points govern coastal terrestrial-aquatic interfaces?
  - How do flood frequency, duration, depth, and salinization affect carbon oxidation and coupled processes?
  - Which mechanisms and interactions are transferable across coastal systems and model scales?
  keywords:
  - WETLAND_SCIENCE
  - BIOGEOCHEMISTRY
  - WATERSHED_SCIENCE
  - CARBON_CYCLING
  - REDOX_CYCLING
  - HYDRO_BIOGEOCHEMISTRY
  - ENVIRONMENTAL_SYSTEMS
  data_types:
