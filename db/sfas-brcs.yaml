    title: 'High-Throughput Microfluidic Electroporation (HTME): A Scalable, 384-Well Platform for Multiplexed Cell Engineering'
    findings:
    - statement: HTME platform electroporates 384 wells in under one minute with individual well control, enabling high-throughput strain construction for ML-guided metabolic engineering
  - id: doi:10.1126/sciadv.adj0053
    title: Lignin conversion to β-ketoadipic acid by <i>Pseudomonas putida</i> via metabolic engineering
      and bioprocess development
    findings:
    - statement: Engineered P. putida KT2440 converts mixed lignin-derived aromatics to beta-ketoadipic
        acid, a precursor for performance-advantaged nylons, at titers of 44.5 g/L from model compounds
        and 25 g/L from corn stover-derived streams
      reference: doi:10.1126/sciadv.adj0053
    - statement: Technoeconomic analysis predicts a minimum selling price of $2.01/kg for beta-ketoadipate,
        cost-competitive with fossil-derived adipic acid
      reference: doi:10.1126/sciadv.adj0053
  - id: doi:10.1016/j.ymben.2021.02.005
    title: Metabolism of syringyl lignin-derived compounds in Pseudomonas putida enables convergent
      production of 2-pyrone-4,6-dicarboxylic acid
    findings:
    - statement: Engineered P. putida converges S-lignin-derived aromatics into 2-pyrone-4,6-dicarboxylic
        acid (PDC), expanding biological funneling beyond G-lignin substrates
      reference: doi:10.1016/j.ymben.2021.02.005
  - id: doi:10.1039/d0gc01663b
    title: Generation of ionic liquid tolerant <i>Pseudomonas putida</i> KT2440 strains <i>via</i>
      adaptive laboratory evolution
    findings:
    - statement: Adaptive laboratory evolution generated P. putida strains tolerant to ionic liquids
        used in biomass pretreatment, enabling one-pot bioprocessing of IL-treated lignocellulose
      reference: doi:10.1039/d0gc01663b
    - statement: Evolved strains grow at IL concentrations (4% TEOH-OAc, 8% TEA-HS) lethal to wild-type,
        with mutations in efflux pump emrE and glyoxylate cycle regulator PP_5350
      reference: doi:10.1039/d0gc01663b
  - id: doi:10.1021/acssuschemeng.1c00933
    title: Muconic Acid Production Using Engineered <i>Pseudomonas putida</i> KT2440 and a Guaiacol-Rich
      Fraction Derived from Kraft Lignin
    findings:
    - statement: Engineered P. putida produces cis,cis-muconic acid from guaiacol derived from kraft
        lignin depolymerization via O-demethylation to catechol followed by intradiol ring cleavage
      reference: doi:10.1021/acssuschemeng.1c00933
