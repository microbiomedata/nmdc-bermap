    program: Biopreparedness Research Virtual Environment (BRaVE)
  websites:
    doe_page: https://www.genomicscience.energy.gov/brave-awards23/
  description: >
    BRaVE project developing methods to understand how hosts survive pathogenic attacks through
    epigenetic mechanisms. Creates an exascale computational and explainable artificial intelligence
    workflow to map genome and epigenome changes during infection. Integrates 3D genomic maps,
    epigenetic modifications, and cryo-electron microscopy imaging to validate structure-function
    relationships and enable predictive dynamic modeling of host-pathogen dynamics.
  scientific_questions:
  - How do epigenetic mechanisms help hosts survive pathogenic attacks?
  - What genome structural changes are induced by viral pathogens?
  - How can we characterize molecular signatures of infection in genomes and epigenomes?
  - Can AI workflows enable predictive 4D modeling of host-pathogen dynamics?
