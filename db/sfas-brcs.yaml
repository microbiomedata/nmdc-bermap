- id: nmdc_sfas_brcs:jgi
  name: DOE Joint Genome Institute
  acronym: JGI
  program_type: USER_FACILITY
  lead_institution: Lawrence Berkeley National Laboratory
  funding:
    agency: DOE BER
    program: Genomic Science Program
  websites:
    main: https://jgi.doe.gov
    phytozome: https://phytozome.jgi.doe.gov
  description: >
    JGI provides integrated high-throughput sequencing, DNA design and synthesis, metabolomics, and computational
    analysis enabling systems-based scientific approaches. JGI sequences and analyzes genomes for DOE-relevant
    research in bioenergy, carbon cycling, and environmental microbiome science.
  services:
  - GENOME_SEQUENCING
  - metagenome sequencing
  - DNA synthesis
  - METABOLOMICS
  - computational analysis
  - single-cell genomics
  capabilities:
  - name: High-Throughput Sequencing
    description: Short- and long-read sequencing platforms producing billions of reads for genomic assembly,
      resequencing, RNAseq annotation, and metagenomics. Total output in 2024 was 870 Tb.
    capability_type: SEQUENCING
    status: OPERATIONAL
    url: https://jgi.doe.gov/work-with-us/offerings-capabilities
    throughput: 870 Tb annually
    instruments:
    - name: Illumina NovaSeq
      instrument_type: ILLUMINA_SEQUENCER
      description: Short-read sequencing producing paired-end 150bp reads
    - name: PacBio Revio
      instrument_type: PACBIO_SEQUENCER
      description: Long-read sequencing averaging 60-70 kbp reads
    applications:
    - Genome assembly
    - Metagenome sequencing
    - RNA-seq
    - Single-cell genomics
    data_products:
    - Raw sequence reads
    - Assembled genomes
    - Annotated transcripts
  - name: DNA Synthesis Platform
    description: DNA design and synthesis capabilities supporting researchers exploring conversion of
      sequence into functional assessments. Minimum request is 100 kb.
    capability_type: DNA_SYNTHESIS
    status: OPERATIONAL
    url: https://jgi.doe.gov/work-with-us/offerings-capabilities
    applications:
    - Biosynthetic pathway refactoring
    - Gene synthesis
    - Construct assembly
    data_products:
    - Synthesized DNA constructs
    - Verified plasmids
  - name: Metabolomics Program
    description: Functional annotation of genomes through metabolomics, providing improved understanding
      of the role of small molecules in diverse biological systems. Minimum 22 samples required.
    capability_type: METABOLOMICS_MS
    status: OPERATIONAL
    url: https://jgi.doe.gov/science-programs/secmet
    applications:
    - Secondary metabolite identification
    - Biosynthetic gene cluster characterization
    - Pathway validation
    data_products:
    - Metabolite profiles
    - Mass spectra (submitted to MassIVE)
  - name: AI-Centric Analysis
    description: AI/ML-based computational analysis including protein family discovery, biosynthetic gene
      cluster prediction, and genome annotation. Doubled known protein families using AI clustering algorithms.
    capability_type: AI_ML_ANALYSIS
    status: OPERATIONAL
    applications:
    - Protein family discovery
    - BGC prediction
    - Metagenome analysis
  flagship_genomes:
  - name: Populus trichocarpa
    common_name: Poplar / Black Cottonwood
    description: First tree genome sequenced
    year: 2006
  - name: Panicum virgatum
    common_name: Switchgrass
    description: Candidate biofuel feedstock used by all BRCs
  - name: Miscanthus
    description: Perennial grass bioenergy feedstock
  - name: Brachypodium distachyon
    description: Model grass
  - name: Setaria italica
    common_name: Foxtail millet
    description: Model C4 grass
  - name: Panicum hallii
    description: Diploid relative of switchgrass
- id: nmdc_sfas_brcs:emsl
  name: Environmental Molecular Sciences Laboratory
  acronym: EMSL
  program_type: USER_FACILITY
  lead_institution: Pacific Northwest National Laboratory
  funding:
    agency: DOE BER
  websites:
    main: https://www.emsl.pnnl.gov
  description: >
    EMSL provides advanced analytical capabilities for environmental and biological research, including
    mass spectrometry, NMR, electron microscopy, and high-performance computing.
  services:
  - MASS_SPECTROMETRY
  - NMR_SPECTROSCOPY
  - electron microscopy
  - high-performance computing
  - IMAGING
  - molecular characterization
  capabilities:
  - name: Metabolomics Mass Spectrometry Suite
    description: Comprehensive metabolomics workflow with 24 instruments for unbiased metabolite and lipid
      measurement including GC-MS, Orbitrap, and FTICR-MS platforms. Includes a 21 Tesla FTICR (one of
      two in the world).
    capability_type: METABOLOMICS_MS
    status: OPERATIONAL
    url: https://www.emsl.pnnl.gov/science/instruments-resources/metabolomics
    instruments:
    - name: GC-MS Instruments
      instrument_type: GC
      count: 4
      description: Gas chromatography-mass spectrometry
    - name: Orbitrap Mass Spectrometers
      instrument_type: ORBITRAP
      count: 16
      description: Diverse Orbitrap instruments including hybrid quadrupole and Tribrid
    - name: FTICR Mass Spectrometers
      instrument_type: FTICR
      count: 4
      specifications: Including 21 Tesla FTICR (one of two worldwide)
    - name: Triple Quadrupole MS
      instrument_type: TRIPLE_QUADRUPOLE
      count: 9
      description: For sensitive targeted quantification and metabolic flux measurements
    - name: Imaging Mass Spectrometers
      instrument_type: ORBITRAP
      count: 4
      description: Dedicated to mass spectrometry imaging
    applications:
    - Untargeted metabolomics
    - Targeted metabolite quantification
    - Lipidomics
    - Metabolic flux analysis
    data_products:
    - Metabolite profiles
    - Lipid profiles
    - Metabolite identifications
  - name: NMR Spectroscopy
    description: Robust solid- and liquid-state NMR capabilities for structural biology, metabolomics,
      natural products, and organic matter characterization. Non-destructive with minimal sample preparation.
    capability_type: NMR
    status: OPERATIONAL
    url: https://www.emsl.pnnl.gov/science/instruments-resources/liquid-state-nmr-metabolomics
    instruments:
    - name: Liquid-State NMR
      instrument_type: NMR_SPECTROMETER
      description: For metabolomics and natural products
    - name: Solid-State NMR
      instrument_type: NMR_SPECTROMETER
      description: For structural biology and materials
    applications:
    - Metabolomics
    - Structural biology
    - Natural products
    - Organic matter characterization
    data_products:
    - NMR spectra
    - Molecular structure data
  - name: Cryogenic Electron Microscopy
    description: Cryo-TEM suite including Krios G3i cryogenic TEM and Aquilos 2 cryo-FIB-SEM for de novo
      structure determination, high-resolution cellular imaging, and tomography. Supports samples from
      50 kDa proteins to whole cells.
    capability_type: CRYO_EM
    status: OPERATIONAL
    url: https://www.emsl.pnnl.gov/science/instruments-resources/cryogenic-transmission-electron-microscopy-structural-biology
    instruments:
    - name: Krios G3i
      instrument_type: CRYO_TEM
      manufacturer: Thermo Scientific
      description: Cryogenic transmission electron microscope for high-resolution imaging
    - name: Aquilos 2 Cryo-FIB-SEM
      instrument_type: FIB_SEM
      manufacturer: Thermo Scientific
      description: Sample preparation via lamella generation with ~10 nm resolution
    applications:
    - De novo protein structure determination
    - Cellular architecture imaging
    - Plant-microbe interaction studies
    - Biofilm morphology
    - Cryo-electron tomography
    data_products:
    - 3D structures
    - Tomographic reconstructions
    - Cellular ultrastructure images
  - name: Anaerobic Microbial Phenotyping Platform (AMP2)
    description: World's largest autonomous-capable science system for anaerobic microbial experimentation.
      Commissioned December 2024 by DOE Secretary Chris Wright. 18 instruments housed in 1,800 sq ft across
      seven anaerobic pods connected by robotic track system. Enables complete design-build-test-learn
      cycles with minimal operator intervention. Generates AI/ML-ready datasets in publicly available
      databases hosted on EMSL Science Central. Built in partnership with Ginkgo Bioworks under $4.66M
      contract.
    capability_type: ANAEROBIC_PHENOTYPING
    status: OPERATIONAL
    year_established: 2025
    commissioned_date: '2024-12-04'
    url: https://www.emsl.pnnl.gov/science/instruments-resources/anaerobic-microbial-phenotyping-platform-amp2
    leader: Scott Baker
    future_expansion: AMP2 is a prototype for M2PC (Microbial Molecular Phenotyping Capability), a $47M
      32,000 sq ft facility with 100+ instruments expected to open by 2030.
    instruments:
    - name: Anaerobic Chambers
      instrument_type: ANAEROBIC_CHAMBER
      count: 7
      description: Interconnected pods maintaining anaerobic environment
    - name: Liquid Handlers
      instrument_type: LIQUID_HANDLER
      description: Automated sample preparation, dispensing, and cherry-picking
    - name: Cultivation Systems
      instrument_type: INCUBATOR
      description: Supports up to 14 deep well plates for microbial growth
    - name: Fluorescence/Absorbance Readers
      instrument_type: PLATE_READER
      description: Optical density, fluorescence, and luminescence measurements
    - name: Flow Cytometers
      instrument_type: FLOW_CYTOMETER
      description: Cell counting and characterization
    - name: HPLC Systems
      instrument_type: HPLC
      description: Liquid chromatography for metabolite analysis
    - name: Electroporator
      instrument_type: ELECTROPORATOR
      description: Cell transformation capabilities
    applications:
    - Anaerobic microbe characterization
    - Design-build-test-learn cycles for microbial phenotyping
    - High-throughput screening under variable conditions
    - Genotype-phenotype mapping
    - Biofuel and biomaterial development
    - Chemical and energy production from microbes
    data_products:
    - Growth curves
    - Metabolite profiles
    - Flow cytometry data
    - AI/ML-ready phenotype datasets
  - name: NanoSIMS Imaging
    description: Nanoscale secondary ion mass spectrometry for subcellular-resolution chemical imaging
      and isotope ratio analysis in biological samples.
    capability_type: NANOSIMS_IMAGING
    status: OPERATIONAL
    applications:
    - Subcellular metabolic imaging
    - Isotope probing
    - Element mapping
- id: nmdc_sfas_brcs:kbase
  name: DOE Systems Biology Knowledgebase
  acronym: KBase
  program_type: USER_FACILITY
  lead_institutions:
  - Lawrence Berkeley National Laboratory
  - Argonne National Laboratory
  - Brookhaven National Laboratory
  - Oak Ridge National Laboratory
  funding:
    agency: DOE BER
    program: Genomic Science Program
  websites:
    main: https://www.kbase.us
    documentation: https://docs.kbase.us
    doe_page: https://www.genomicscience.energy.gov/kbase/
  description: >
    KBase is an open-source software and data platform enabling data sharing, integration, and analysis
    of microbes, plants, and their communities. Provides genomic, metabolic modeling, and multi-omics
    analysis capabilities.
  capabilities:
  - name: Genome Annotation Services
    description: Functional annotation tools including RAST and KEGG-based annotation, plus DRAM for metabolic
      profiling. Machine learning classifiers predict growth phenotypes from functional annotations.
    capability_type: GENOME_ANNOTATION
    status: OPERATIONAL
    url: https://docs.kbase.us/apps/analysis
    applications:
    - Genome functional annotation
    - MAG annotation
    - Viral genome annotation (DRAM-v)
    - Phenotype prediction
    data_products:
    - Annotated genomes
    - Functional summaries
    - KEGG mappings
  - name: Metabolic Modeling Pipeline
    description: Suite of apps for genome-scale metabolic model reconstruction, analysis, and prediction.
      Uses OMEGGA for omics-enabled global gapfilling. Over 500 media formulations available. Recent improvements
      achieve 72% model accuracy.
    capability_type: METABOLIC_MODELING
    status: OPERATIONAL
    url: https://docs.kbase.us/apps/analysis/metabolic-modeling
    applications:
    - Genome-scale model reconstruction
    - Flux balance analysis
    - Growth media optimization
    - Essential gene prediction
    - Pathway analysis
    data_products:
    - Metabolic models
    - FBA solutions
    - Growth predictions
  - name: Metagenome Analysis
    description: Metagenome assembly, binning, and annotation workflows. Applied to build models for over
      2,000 MAGs from the GROW (Genome Resolved Open Watersheds) project.
    capability_type: METAGENOME_ANALYSIS
    status: OPERATIONAL
    applications:
    - Metagenome assembly
    - Genome binning
    - Community metabolic modeling
    data_products:
    - Assembled metagenomes
    - MAGs
    - Community models
  reference_data:
    microbial_genomes: '>90,000 from RefSeq'
    plant_genomes: '>50 from Phytozome'
    biolog_media: '>300 formulations'
    reactions_compounds: '>30,000 from KEGG, BIGG, MetaCyc'
  supported_data_types:
  - reads
  - contigs
  - genomes
  - metabolic models
  - growth media
  - RNA-seq
  - expression data
  - growth phenotype data
  - flux balance analysis solutions
