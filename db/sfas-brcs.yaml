  - name: Mutant phenotypes for thousands of bacterial genes of unknown function
    description: >-
      Genome-wide mutant fitness assays across 32 diverse bacteria using
      RB-TnSeq, identifying mutant phenotypes for 11,779 protein-coding
      genes previously annotated only as "of unknown function." Flagship
      paper for the LBNL Fitness Browser.
    pi: Adam M. Deutschbauer
    organism: 32 diverse bacteria (Proteobacteria, Firmicutes, Actinobacteria, Bacteroidetes)
    data_modalities:
    - FITNESS_DATA
    - GENOMICS
    primary_reference_info:
      reference:
        id: doi:10.1038/s41586-018-0124-0
        title: Mutant phenotypes for thousands of bacterial genes of unknown function
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      experimental_units:
      - transposon insertion mutant strain (one per random insertion site)
      observational_units:
      - barcoded mutant pool grown competitively in a defined condition
      sampling_strategy: >-
        Per organism, a randomly-barcoded transposon insertion library is
        built once and frozen; aliquots are grown competitively under each
        defined condition with a paired Time0 reference; barcode abundances
        are read out by BarSeq amplicon sequencing.
      replication: >-
        32 bacterial species spanning Proteobacteria, Firmicutes,
        Actinobacteria, Bacteroidetes; dozens of conditions per organism;
        biological replicates per (organism × condition) pool.
      controls: Time0 reference aliquot paired with each condition assay.
      randomization: >-
        Random transposon insertion (Tn5 / mariner) at library construction
        gives stochastic coverage of the genome; condition assignment is
        experimenter-defined.
      notes: >-
        Combinatorial fitness profiling across an organism panel and a
        condition panel. Per-gene fitness = log2(end/Time0) with t-like
        statistic; data aggregated into the LBNL Fitness Browser.
      factor_panels:
      - LBNL Fitness Browser organism panel
      - LBNL Fitness Browser condition panel
    variables:
    - name: test bacterial species
      description: >-
        Bacterial species used as the parent strain for RB-TnSeq library
        construction and fitness profiling.
      roles:
      - EXPERIMENTAL_FACTOR
      - GROUPING
      value_type: CATEGORICAL
      measured_entity: bacterial species
      levels:
      - Escherichia coli BW25113
      - Pseudomonas fluorescens FW300-N2E2
      - Shewanella oneidensis MR-1
      - "(and 29 other species across Proteobacteria, Firmicutes, Actinobacteria, Bacteroidetes)"
    - name: growth condition
      description: >-
        Defined growth condition (carbon source, nitrogen source, metal,
        antibiotic, or other stressor) applied to each library aliquot.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      measured_entity: defined growth condition (selective agent)
      levels:
      - carbon source (e.g., D-glucose, D-xylose, L-arabinose, glycerol)
      - nitrogen source
      - metal stressor
      - antibiotic
      - other defined inhibitor
    - name: barcode-to-locus map
      description: >-
        Mapping from each library's random 20-bp barcodes to the transposon
        insertion sites in the parent genome, established once per organism
        by a single TnSeq (transposon-junction sequencing) run.
      roles:
      - IDENTIFIER
      - DERIVED
      value_type: ARRAY
      method: TnSeq (transposon-junction sequencing)
    - name: per-gene fitness value
      description: >-
        log2(end-of-experiment barcode abundance / Time0 abundance) per
        insertion-bearing gene, with a t-like statistic for confidence.
      roles:
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: log2 fold change
      method: BarSeq amplicon read counting, normalized
      measured_entity: bacterial gene
  - name: Rapid quantification of mutant fitness in diverse bacteria by sequencing randomly bar-coded transposons
    description: >-
      Methods paper introducing RB-TnSeq — random DNA barcodes carried by
      Tn5 and mariner transposons, read out by BarSeq amplicon sequencing.
      Demonstrated across five bacteria with 387 genome-wide fitness assays
      and 5,196 phenotyped genes; foundation for subsequent LBNL RB-TnSeq
      work and the Fitness Browser.
    pi: Adam M. Deutschbauer
    organism: five bacteria (E. coli, P. inhibens, P. stutzeri, S. amazonensis, S. oneidensis)
    data_modalities:
    - FITNESS_DATA
    - GENOMICS
    primary_reference_info:
      reference:
        id: doi:10.1128/mBio.00306-15
        title: Rapid quantification of mutant fitness in diverse bacteria by sequencing randomly bar-coded transposons
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      experimental_units:
      - transposon insertion mutant strain (barcoded)
      observational_units:
      - barcoded library aliquot grown competitively in a defined condition
      sampling_strategy: >-
        Tn5- and mariner-based randomly-barcoded transposon libraries built
        in each of five bacteria; aliquots competitively grown across defined
        carbon-source media; barcodes read out by BarSeq amplicon PCR and
        Illumina HiSeq.
      replication: >-
        Five bacteria; 387 successful genome-wide fitness assays across 130
        bacterium × carbon-source combinations; 5,196 phenotyped genes.
      controls: Time0 reference aliquot per pool.
      notes: >-
        Methods-development paper that introduces RB-TnSeq and BarSeq and
        demonstrates throughput and reproducibility. Per-gene fitness =
        log2(end/Time0).
      factor_panels:
      - LBNL Fitness Browser organism panel
      - LBNL Fitness Browser condition panel
    variables:
    - name: test bacterial species
      description: Parent strain used for RB-TnSeq library construction.
      roles:
      - EXPERIMENTAL_FACTOR
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - Escherichia coli K-12 (BW25113)
      - Phaeobacter inhibens DSM 17395
      - Pseudomonas stutzeri RCH2
      - Shewanella amazonensis SB2B
      - Shewanella oneidensis MR-1
    - name: carbon source
      description: Defined carbon source in minimal medium.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      measured_entity: carbon source compound
      levels:
      - "(carbon-source panel; varies by organism — e.g., D-mannose, D-mannitol, glycerol, D-glucose, L-arabinose)"
    - name: per-gene fitness value
      description: log2(end/Time0) per gene with t-like statistic.
      roles:
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: log2 fold change
      method: BarSeq amplicon read counting, normalized
