  - nmdc_study_id: nmdc:sty-11-wbc14h22
    name: Switchgrass cropping systems on marginal lands
    pi: Maren Friesen
    description: Understanding how rhizosphere microbiome influences soil nitrogen transformations under
      low- and high-N conditions across five locations in the Great Lakes Region.
    organism: Panicum virgatum
    data_modalities:
    - AMPLICON_16S
    sample_count: 2971
    bioproject_ids:
    - PRJNA733109
    - PRJNA733505
