  - name: Birch Effect Respiratory Response of Soil Microbiome
    pi: Kirsten Hofmockel
    description: Real-time and rapid respiratory response (90 seconds to 90 minutes) of the soil microbiome
      to moisture shifts. Published in Microorganisms 2023.
    data_modalities:
    - METABOLOMICS
    nmdc_ingest_target: true
    primary_reference_info:
      reference:
        id: doi:10.3390/microorganisms11112630
        title: Real-Time and Rapid Respiratory Response of the Soil Microbiome to Moisture Shifts
    study_design:
      design_types:
      - id: OBI:0500020
        label: time series design
      experimental_units:
      - rewetted soil incubations
      observational_units:
      - real-time respiration measurements
      - soil metabolite measurements
      sampling_strategy: Rapid time-series measurement of soil microbiome respiration from 90 seconds to
        90 minutes after moisture shifts.
      notes: Variable catalog entry based on study description and primary publication.
    variables:
    - name: moisture shift treatment
      description: Drying or rewetting moisture perturbation applied to soil microbiome incubations.
      roles:
