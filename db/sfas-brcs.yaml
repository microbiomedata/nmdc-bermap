- id: nmdc_sfas_brcs:monet
  name: Molecular Observation Network
  acronym: MONet
  program_type: OTHER_INITIATIVE
  initiative_name: MONet
  lead_institution: Pacific Northwest National Laboratory
  established: 2023
  start_date: '2023'
  principal_investigators:
  - name: John Bargar
    role: Principal Investigator
    affiliation: Pacific Northwest National Laboratory
  - name: Emily B. Graham
    role: Co-Investigator
    affiliation: Pacific Northwest National Laboratory
  - name: Odeta Qafoku
    role: Co-Investigator
    affiliation: Pacific Northwest National Laboratory
  funding:
    agency: DOE BER
    program: Environmental Molecular Sciences Laboratory
  websites:
    main: https://www.emsl.pnnl.gov/monet
    data_portal: https://sc-data.emsl.pnnl.gov/
  description: >
    MONet (Molecular Observation Network) is an open science network developed by EMSL to build a
    continental-scale database of standardized molecular and microstructural soil data. The initiative
    aims to advance understanding and prediction of microbially and root-driven inputs in soil ecosystems
    and terrestrial aerosol processes. MONet collects thousands of soil samples across US ecoregions
    to develop a comprehensive FAIR database of molecular and microscale information on soil composition,
    structure, water characteristics, microbial communities, and biogenic emissions. Data is publicly
    available on EMSL Science Central without embargo. First capability launched February 2023 with
    the Soil Function soil core solicitation.
  scientific_questions:
  - How do molecular and microscale processes determine whether soil carbon enters the atmosphere or remains sequestered?
  - What drives microbially and root-driven carbon inputs in soil ecosystems?
  - How can molecular-scale soil data be integrated into Earth system models?
  keywords:
  - SOIL_CARBON
  - SOIL_MICROBIOME
  - SOIL_ORGANIC_MATTER
  - METAGENOMICS
  - CARBON_CYCLING
  - DECOMPOSITION
  data_types:
  - METABOLOMICS
  - METAGENOMICS
  - IMAGING_DATA
  - BIOGEOCHEMICAL_DATA
  - SOIL_MICROBIOME_DATA
  data_collection_modalities:
  - MASS_SPECTROMETRY
  - METAGENOMICS
  - IMAGING
  - FIELD_EXPERIMENTS
  - LABORATORY_EXPERIMENTS
  studies:
  - name: 1000 Soils Pilot
    pi: Emily B. Graham
    description: >
      Pilot study collecting standardized soil samples across US ecoregions to develop continental-scale
      molecular and microstructural soil database. Samples analyzed using FTICR-MS for organic matter
      composition, X-ray computed tomography for 3D pore structure, and metagenomics via JGI partnership.
      Includes geochemistry, texture, respiration, enzyme activities, and microbial biomass measurements.
    data_modalities:
    - METABOLOMICS
    - METAGENOMICS
    - IMAGING_DATA
    - BIOGEOCHEMICAL_DATA
    keywords:
    - SOIL_CARBON
    - SOIL_ORGANIC_MATTER
    - CARBON_CYCLING
    primary_reference_info:
      reference:
        id: doi:10.3389/fsoil.2023.1120425
        title: One thousand soils for molecular understanding of belowground carbon cycling
        findings:
        - statement: >
            MONet pilot collected standardized soil samples using FTICR-MS and X-ray computed
            tomography to advance understanding of belowground carbon cycling.
        - statement: >
            Wildfire results in oxidation of SOM and structural changes to soil pore networks
            that persist into deeper soils.
    study_design:
      design_types:
      - id: OBI:0500000
        label: study design
      observational_units:
      - standardized soil cores
      - soil molecular composition profiles
      - soil pore structure measurements
      sampling_strategy: Standardized soil sampling across US ecoregions with coordinated FTICR-MS, X-ray
        computed tomography, metagenomics, geochemistry, texture, respiration, enzyme activity, and
        microbial biomass measurements.
      notes: Variable catalog entry based on MONet pilot description and primary publication.
    variables:
    - name: sampling ecoregion
      description: US ecoregion or site context represented by the standardized soil sample.
      roles:
      - SPATIAL_INDEX
      - GROUPING
      value_type: CATEGORICAL
      measured_entity: soil sampling site
      material_or_matrix: soil
      source_field_names:
      - ecoregion
      - site
      - sampling_location
      mixs_terms:
      - id: MIXS:0000012
        label: broad-scale environmental context
      - id: MIXS:0000013
        label: local environmental context
    - name: soil core depth
      description: Depth interval represented by a standardized soil core or subsample.
      roles:
      - SPATIAL_INDEX
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: NUMERIC
      units: centimeter
      measured_entity: soil core
      material_or_matrix: soil
      source_field_names:
      - depth
      - soil_depth
      - core_depth
      mixs_terms:
      - id: MIXS:0000018
        label: depth
    - name: soil organic matter molecular composition
      description: Organic matter molecular features measured by FTICR-MS.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: soil organic matter
      material_or_matrix: soil
      method: FTICR-MS
      source_field_names:
      - fticr_feature
      - organic_matter_composition
      - molecular_formula
    - name: soil pore network structure
      description: Three-dimensional pore structure metrics measured by X-ray computed tomography.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: soil pore network
      material_or_matrix: soil core
      method: X-ray computed tomography
      source_field_names:
      - pore_network_metric
      - xray_ct_metric
      - pore_structure
    - name: soil metagenome profile
      description: Metagenomic sequence and annotation profile generated through the JGI partnership.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: soil microbial community
      material_or_matrix: soil
      method: metagenomic sequencing
      source_field_names:
      - metagenome_profile
      - taxonomic_profile
      - functional_profile
      mixs_terms:
      - id: MIXS:0000014
        label: environmental medium
    - name: soil water characteristic
      description: Soil water-related measurement included in MONet physical and hydraulic characterization.
      roles:
      - MEASURED_VARIABLE
      - COVARIATE
      value_type: NUMERIC
      measured_entity: soil water content
      material_or_matrix: soil
      bervo_term:
        id: BERVO:0000301
        label: total soil water content
      source_field_names:
      - soil_water_content
      - water_content
      - hydraulic_property
      mixs_terms:
      - id: MIXS:0000185
        label: water content
    - name: soil pH
      description: Soil pH measurement included in MONet geochemical characterization.
      roles:
      - MEASURED_VARIABLE
      - COVARIATE
      value_type: NUMERIC
      measured_entity: soil acidity
      material_or_matrix: soil
      bervo_term:
        id: BERVO:0000882
        label: soil pH
      source_field_names:
      - soil_pH
      - ph
      - pH
    - name: microbial biomass carbon
      description: Microbial biomass carbon measured as part of MONet soil biological characterization.
      roles:
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      measured_entity: soil microbial biomass
      material_or_matrix: soil
      bervo_term:
        id: BERVO:0000995
        label: microbial biomass chemical element
      source_field_names:
      - microbial_biomass_C
      - microbial_biomass_carbon
      - biomass_C
      notes: BERVO has a generic microbial biomass chemical element term but no carbon-specific
        microbial biomass term.
    - name: soil respiration
      description: Soil respiration measurement included in MONet biogeochemical characterization.
      roles:
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      measured_entity: soil respiration
      material_or_matrix: soil
      source_field_names:
      - respiration
      - soil_respiration
      - CO2_flux
      notes: Left without a BERVO primary mapping because available BERVO respiration terms are broader
        or model-specific and not an exact fit for the measured MONet assay.
