- id: nmdc_sfas_brcs:brave_4d_epigenomics
  name: Decoding Host-Pathogen Dynamics with 4D (Epi)Genomics
  acronym: 4D-EpiGen
  program_type: BIOPREPAREDNESS_INITIATIVE
  initiative_name: BRaVE
  funding_period: 2023-2026
