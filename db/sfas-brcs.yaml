    in sorghum rhizosphere microbiomes. The program uses genome editing, high-throughput functional
    genomics, synthetic communities, laboratory and field rhizosphere experiments, and predictive modeling
    to increase persistence near target plants while reducing persistence in bulk soil or plant-detritus
    environments.
