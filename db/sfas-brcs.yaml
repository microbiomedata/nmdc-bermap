  datasets:
  - name: JBEI ICE (Inventory of Composable Elements)
    description: Registry of standard biological parts for synthetic biology
    url: https://github.com/jbei
    data_type: synthetic biology parts
  - name: ART (Automated Recommendation Tool)
    description: Machine learning tool for active learning-guided optimization of metabolic engineering. Successfully used for pathway design, downregulation target selection, media optimization, and CRISPR guide RNA design.
    url: https://github.com/JBEI/ART
    data_type: computational tool
  - name: bioPKS
    description: Computational tool for recommending pathways to synthesize desired molecules via retrobiosynthesis
    data_type: computational tool
  - name: ClusterCAD
    description: Updated computational platform for chimeric type I polyketide synthase and nonribosomal peptide synthetase design
    url: https://clustercad.jbei.org
    data_type: computational tool
  - name: Macaw
    description: Accessible tool for molecular embedding and inverse molecular design, predicting properties of prospective molecular targets
    data_type: computational tool
  - name: GenSLM
    description: Genome-scale language model for DNA sequence analysis and generation, used for synthetic biology part design
    data_type: computational tool
  - name: OpenFold3-PPI
    description: Next-generation protein-protein interaction model under development with Columbia University for de novo enzyme design
    data_type: computational tool
  - name: HTME (High-Throughput Microfluidic Electroporation)
    description: Microfluidic platform capable of electroporating 384 wells in under one minute with individual control of each well. Eliminates key bottleneck for high-throughput strain construction enabling ML-guided metabolic engineering.
    data_type: automation infrastructure
  - name: Echo 550 Acoustic Liquid Handler
    description: Acoustic liquid handler for precise, low-volume liquid transfers without tips. Enables accurate dispensing for high-throughput strain construction and media optimization.
    data_type: automation infrastructure
  - name: BioLector Cultivation System
    description: Microbioreactor system for highly repeatable culture conditions ensuring generation of high-quality data for machine learning. Supports parallel cultivation with real-time monitoring.
    data_type: automation infrastructure
