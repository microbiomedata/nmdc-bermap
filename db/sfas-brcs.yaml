    role: Principal Investigator
    affiliation: Lawrence Livermore National Laboratory
  - name: Annie B. Kersting
    role: Former PI / Director of University Relations
    affiliation: Lawrence Livermore National Laboratory
    expertise: Isotope geochemistry, actinide chemistry, colloid-facilitated transport
  funding:
