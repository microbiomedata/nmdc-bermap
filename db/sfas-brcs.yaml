  datasets:
  - name: Lattice Microbe Prochlorococcus Whole-Cell Model Integration Workflow
    doi: 10.5281/zenodo.18025765
    url: https://zenodo.org/records/18025765
    repository: Zenodo
    description: >
      Computational workflow simulating the 4D intracellular environment of Prochlorococcus
      marinus MED4 (CCMP1986). Includes cell boundary, thylakoid, ribosomes, DNA structures,
      genome-scale metabolic network, spatially resolved transcription/translation/diffusion
      for 15 key genes, and light-driven post-translational modification of CBC enzymes
      controlling dark complex formation. PNNL-SA-219756.
