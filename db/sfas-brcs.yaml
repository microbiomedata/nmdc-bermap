  field_site_ids:
  - nmdc_sfas_brcs:site_east_fork_poplar_creek
  description: >
    The Mercury SFA provides foundational insight on exchange and feedback processes at critical interfaces
    controlling mercury fate and transformation. Research elucidates mechanisms by which inorganic mercury
    transforms into methylmercury at the sediment-water interface.
  scientific_questions:
  - What mechanisms control mercury transformation to methylmercury?
  - How do sediment-water interfaces mediate mercury cycling?
  - What microorganisms are responsible for mercury methylation?
  - How does mercury fate interact with carbon and nutrient cycling?
  keywords:
  - MERCURY
  - METHYLMERCURY
  - BIOGEOCHEMISTRY
  - SEDIMENT_WATER_INTERFACE
  - MERCURY_METHYLATION
  - HGCA
  - HGCB
  data_types:
  - WATER_CHEMISTRY
  - HYDROLOGICAL_DATA
  - GENOMICS
  - MERCURY_SPECIATION
  datasets:
  - name: East Fork Poplar Creek Discharge Data
    description: Multi-year discharge records at Kilometer 5.4
    years: 2012-2016
    doi_examples:
    - 10.12769/1489524
    - 10.12769/1490223
    - 10.12769/1489825
    - 10.12769/1489828
    - 10.12769/1489830
  - name: ORNL Compiled Mercury Methylator Database
    description: >
      Custom reference database of hgcA and hgcB genes from mercury-methylating microorganisms (301 hgcA,
      239 hgcB sequences)
    repository: DOE Data Explorer
    doi: dataset/1569274
  - name: Hg-MATE-Db
    description: >
      Hg-cycling Microorganisms in Aquatic and Terrestrial Ecosystems Database for identifying mercury-cycling
      microbes
    repository: Smithsonian Institution
    doi: 10.25573/serc.13105370.v1
    version: v1.01142021
