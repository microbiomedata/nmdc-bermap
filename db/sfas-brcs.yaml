  description: The BioSecure SFA develops evolutionarily robust containment strategies for engineered
    environmental microorganisms, with emphasis on rhizosphere deployment. The program combines sequence
    entanglement, cellular controls, population-level coordination, high-throughput gene editing, and
    machine learning to keep engineered functions active only where and when they are intended.
  scientific_questions:
  - How do we deploy beneficial microbes safely in the rhizosphere?
  - What biocontainment mechanisms are evolutionarily stable?
  - How can machine learning improve sequence design for containment?
  - What population coordination strategies enhance containment?
  - How do we prevent potential negative ecological consequences of GEM persistence?
  keywords:
  - PLANT_GROWTH_PROMOTING_BACTERIA
  - RHIZOSPHERE
  - BIOCONTAINMENT
  - SHEWANELLA
  - MACHINE_LEARNING
  - SYNTHETIC_BIOLOGY
