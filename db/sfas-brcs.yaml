  start_date: '2023'
  end_date: '2026'
  participating_offices:
  - BER
  - ASCR
  lead_institution: Pacific Northwest National Laboratory
  partner_institutions:
  - Oak Ridge National Laboratory
  - Argonne National Laboratory
  - University of Colorado Anschutz Medical Campus
