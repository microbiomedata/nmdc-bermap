  - name: 4D Whole-Cell Model of Prochlorococcus marinus MED4
    pi: Margaret S. Cheung
    description: >
      Spatiotemporal 4D (3D + time) whole-cell model of Prochlorococcus marinus MED4 representing
      the spatial organization of enzymatic and molecular processes in central carbon metabolism
      under light perturbation. Uses cryo-ET at 10 nm resolution as structural constraints.
      Demonstrates that redox-dependent post-translational modifications regulate the structural
      assembly of the "dark complex" (a protein megacomplex of Gap, CP12, and Prk), modulating
      metabolic flux at a conserved regulatory node of the Calvin-Benson cycle. Built using the
      Lattice Microbes platform. First spatiotemporal simulation of a photosynthetic autotroph.
    organism: Prochlorococcus marinus MED4
    data_modalities:
    - IMAGING_DATA
    - PROTEOMICS
    - STRUCTURAL_BIOLOGY
    primary_reference_info:
      reference:
        id: doi:10.64898/2026.01.21.700212
        title: >
          Spatiotemporal 4D Whole-cell Modeling of a Minimal Autotroph Reveals Central Carbon
          Metabolism Regulated Locally by Protein Megacomplexes via Post-translational Modifications
          under Light Disturbance
    study_design:
      design_types:
      - id: OBI:0500020
        label: time series design
      observational_units:
      - simulated whole-cell model states
      - cryo-ET structural constraints
      - metabolic flux predictions
      sampling_strategy: Spatiotemporal whole-cell simulation constrained by cryo-ET and proteomic data
        to model Prochlorococcus carbon metabolism under light perturbation.
      notes: Variable catalog entry based on study description and primary reference.
    variables:
    - name: light perturbation
