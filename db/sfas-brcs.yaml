    description: Developing and testing multilayered containment strategies for engineered microbes including
      sequence entanglement, kill-switches, environmental-cue controls, and population-level coordination.
    organism: engineered environmental microorganisms
    data_modalities:
    - GENOMICS
    - TRANSCRIPTOMICS
    nmdc_ingest_priority: LOW
    source_reference:
