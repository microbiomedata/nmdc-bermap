  key_publications:
  - id: doi:10.1007/s12155-015-9660-8
    title: 'The DOE Bioenergy Research Centers: History, Operations, and Scientific Output'
    findings:
    - statement: The four BRCs have produced over 1,800 peer-reviewed publications since 2007
    - statement: Cross-center collaborations have enabled genome-to-field integration approaches
  - id: doi:10.1038/s41586-020-03127-1
    title: Genomic mechanisms of climate adaptation in polyploid bioenergy switchgrass
    findings:
    - statement: High-quality genome assembly of 732 switchgrass genotypes reveals extensive genomic evidence
        of climate adaptation across 10 common gardens spanning 1,800 km latitude
      reference: doi:10.1038/s41586-020-03127-1
      supporting_text: Analysis of biomass and survival among 732 resequenced genotypes, which were grown
        across 10 common gardens that span 1,800 km of latitude, jointly revealed extensive genomic evidence
        of climate adaptation.
    - statement: Gene flow accelerated climate adaptation during postglacial colonization through introgression
        between divergent ecotypes
      reference: doi:10.1038/s41586-020-03127-1
      supporting_text: gene flow accelerated climate adaptation during the postglacial colonization of
        northern habitats through introgression of alleles from a pre-adapted northern gene pool
    - statement: Polyploidy enhanced adaptive potential through fractionation of duplicated gene functions
        between upland and lowland ecotypes
      reference: doi:10.1038/s41586-020-03127-1
      supporting_text: The polyploid nature of switchgrass also enhanced adaptive potential through the
        fractionation of gene function
    - statement: Collaboration across all four DOE Bioenergy Research Centers
  - id: doi:10.1094/PBIOMES-07-20-0051-R
    findings:
    - statement: Strong temporal patterns in epiphytic microbial composition across growing season
    - statement: Fungi-bacteria network associations were much more common than bacteria-bacteria associations
    - statement: Identified core fungal taxa persistent throughout the growing season
  - id: doi:10.3390/agronomy13051294
    title: Genome-Resolved Metagenomics of Nitrogen Transformations in the Switchgrass Rhizosphere Microbiome
      on Marginal Lands
    findings:
    - statement: Resolved 29 metagenome-assembled genomes from switchgrass rhizosphere on marginal lands
    - statement: Rhizosphere microbiome may provide associative nitrogen fixation via novel diazotroph
        Janthinobacterium
    - statement: Taxa from Verrucomicrobia, Acidobacteria, and Planctomycetes dominate nitrogen cycling
        in switchgrass rhizosphere
  - id: doi:10.1038/s42003-023-05290-3
    findings:
    - statement: Switchgrass produces bioactive terpenoids with antifungal properties
    - statement: Ecotype-specific terpenoid profiles may shape distinct microbiome compositions
  - id: doi:10.1111/gcbb.13094
    title: A 30% reduction in switchgrass rhizome reserves did not decrease biomass yield
    findings:
    - statement: Switchgrass can tolerate significant rhizome reserve reduction without yield loss
    - statement: Findings support potential for late-season harvest management
  - id: doi:10.1111/nph.70313
    findings:
    - statement: Evidence for local adaptation in switchgrass-rust pathogen interactions
  - id: doi:10.1111/gcbb.70051
    findings:
    - statement: Prior agricultural management practices have lasting effects on switchgrass establishment
        and growth
  - id: pmid:40693769
    title: Using DNA affinity purification sequencing (DAP-seq) to identify in vitro binding sites of
      potential Novosphingobium aromaticivorans DSM12444 transcription factors.
    findings:
    - statement: DAP-seq was used to identify in vitro binding sites of potential transcription factors
        in Novosphingobium aromaticivorans DSM12444.
      reference: pmid:40693769
    - statement: The linked BioProject describes the study objective as identifying putative transcriptional
        regulators of aromatic metabolism in Novosphingobium aromaticivorans.
      reference: https://www.ncbi.nlm.nih.gov/bioproject/PRJNA1228656
      supporting_text: DNA affinity purification sequencing (DAP-seq) to identify putative transcriptional
        regulators of aromatic metabolism in Novosphingobium aromaticivorans
  - id: doi:10.1039/C8GC03504K
    title: Funneling aromatic products of chemically depolymerized lignin into 2-pyrone-4-6-dicarboxylic
      acid with<i>Novosphingobium aromaticivorans</i>
    findings:
    - statement: Engineered N. aromaticivorans DSM12444 funnels heterogeneous lignin-derived aromatics
        into a single product, 2-pyrone-4,6-dicarboxylic acid (PDC), a precursor for polyesters and
        epoxy adhesives
      reference: doi:10.1039/C8GC03504K
    - statement: Biological funneling exploits converging catabolic pathways in N. aromaticivorans that
        simultaneously metabolize G, S, and H lignin-derived monomers and oligomers
      reference: doi:10.1039/C8GC03504K
  - id: doi:10.1128/mbio.01718-24
    title: Catabolism of β-5 linked aromatics by <i>Novosphingobium aromaticivorans</i>
    findings:
    - statement: N. aromaticivorans catabolizes beta-5 linked lignin dimers, expanding the range of
        lignin depolymerization products that can be funneled into valuable chemicals
      reference: doi:10.1128/mbio.01718-24
  - id: doi:10.1039/D4GC01975J
    title: Achieving high productivity of 2-pyrone-4,6-dicarboxylic acid from aqueous aromatic streams
      with <i>Novosphingobium aromaticivorans</i>
    findings:
    - statement: Demonstrated high-productivity PDC production from aqueous aromatic streams, advancing
        N. aromaticivorans toward industrial-scale lignin valorization
      reference: doi:10.1039/D4GC01975J
  - id: doi:10.1128/aem.02081-24
    title: Laboratory evolution in <i>Novosphingobium aromaticivorans</i> enables rapid catabolism
      of a model lignin-derived aromatic dimer
    findings:
    - statement: Adaptive laboratory evolution generated N. aromaticivorans strains with improved catabolism
        of guaiacylglycerol-beta-guaiacyl ether (GGE), a model lignin dimer with a beta-O-4 linkage
      reference: doi:10.1128/aem.02081-24
    - statement: Identified causal mutation in an uncharacterized gene that doubled growth yield on GGE,
        with the encoded enzyme oxidizing beta-hydroxypropiovanillone to vanilloyl acetaldehyde
      reference: doi:10.1128/aem.02081-24
  - id: doi:10.3390/metabo12040366
    title: 'iNovo479: Metabolic Modeling Provides a Roadmap to Optimize Bioproduct Yield from Deconstructed
      Lignin Aromatics by Novosphingobium aromaticivorans'
    findings:
    - statement: Genome-scale metabolic model iNovo479 predicts product yields from single or multiple
        lignin-derived aromatics and guides engineering of N. aromaticivorans for lignin valorization
      reference: doi:10.3390/metabo12040366
  - id: doi:10.1128/aem.01268-23
    title: Production of carotenoids from aromatics and pretreated lignocellulosic biomass by
      <i>Novosphingobium aromaticivorans</i>
    findings:
    - statement: Engineered N. aromaticivorans produces carotenoids (beta-carotene, zeaxanthin, astaxanthin)
        concurrently with PDC from alkaline pretreated lignocellulosic biomass
      reference: doi:10.1128/aem.01268-23
