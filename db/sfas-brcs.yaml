  - nmdc_study_id: nmdc:sty-11-r2h77870
    name: Bio-Scales - Integrated Metagenomic, Metabolomic and Transcriptomic Survey of Populus
    pi: Mitchel J. Doktycz
    description: 'Bio-Scales pilot project (PIs: Doktycz, Schadt, Mayes, Muchero, Weston) understanding
      how plant traits modify the microbiome and how the coupled plant-soil-microbial system influences
      nitrogen transformation. Integrated dataset of 318 metagenomes, 98 transcriptomes, and 314 metabolomic
      profiles from 27 P. trichocarpa genotypes across Oregon field sites. Largest publicly available
      metagenomics repository on tree endosphere.'
