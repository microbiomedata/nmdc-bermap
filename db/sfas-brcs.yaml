- id: nmdc_sfas_brcs:compass_fme
  name: Coastal Observations, Mechanisms, and Predictions Across Systems and Scales - Field, Measurements, and Experiments
  acronym: COMPASS-FME
  program_type: OTHER_INITIATIVE
  initiative_name: COMPASS
  participating_offices:
