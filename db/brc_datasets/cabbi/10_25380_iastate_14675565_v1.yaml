description: This dataset includes field measurement and model simulation data focusing
  on the simulation of biomass sorghum (Sorghum bicolor L. Moench) in the state of
  Iowa. Measured field data are provided in CSV file format for 2019 &amp; 2020. Model
  output files are provided as NetCDF file format for the state of Iowa (1998-2007)
  &amp; the larger US region (1969-2018).
