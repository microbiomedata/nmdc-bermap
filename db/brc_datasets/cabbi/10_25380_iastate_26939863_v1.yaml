description: This eddy covariance (EC) gap-filled and partitioned flux dataset for
  Miscanthus from the SABR and UIEF farms was collected to evaluate carbon fluxes
  during the establishment phase of Miscanthus. The goal of this research is to quantify
  net carbon exchange using the EC technique at two sites and assess how carbon uptake
  varies with different planting densities. The dataset is contains two .csv files.
