description: 'This dataset contains estimated gross primary productivity (GPP), photosynthetically
  active radiation (PAR), soil adjusted near infrared reflectance of vegetation (SANIRv),
  the fraction of C4 crops in vegetation (fC4), and their uncertainties for the conterminous
  United States (CONUS) from 2000 to 2019. The daily estimates are SatelLite Only
  Photosynthesis Estimation (SLOPE) products at 250-m resolution. There are three
  distinct features of the GPP estimation algorithm: (1) SLOPE couples machine learning
  models with MODIS atmosphere and land products to accurately estimate PAR, (2) SLOPE
  couples gap-filling and filtering algorithms with surface reflectance acquired by
  both Terra and Aqua MODIS satellites to derive a soil-adjusted NIRv (SANIRv) dataset,
  and (3) SLOPE couples a temporal pattern recognition approach with a long-term Crop
  Data Layer (CDL) product to predict dynamic C4 crop fraction. PAR, SANIRv and C4
  fraction are used to drive a parsimonious model with only two parameters to estimate
  GPP, along with a quantitative uncertainty, on a per-pixel and daily basis. The
  slope GPP product has an R2 = 0.84 and a root-mean-square error (RMSE) of 1.65 gC
  m-2 d-1.'
