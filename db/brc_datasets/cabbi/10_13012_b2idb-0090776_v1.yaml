description: Conversion of corn fiber to ethanol in the dry grind process could increase
  ethanol yields, reduce downstream processing costs and improve overall process profitability.
  This work investigates the in-situ conversion of corn fiber into ethanol (cellulase
  addition during simultaneous saccharification and fermentation) during dry grind
  process. Addition of 30 FPU/g fiber cellulase resulted in 4.6% increase in ethanol
  yield compared to the conventional process. Use of excess cellulase (120 FPU/g fiber)
  resulted in incomplete fermentation and lower ethanol yield compared to the conventional
  process. Multiple factors including high concentrations of ethanol and phenolic
  compounds were responsible for yeast stress and incomplete fermentation in excess
  cellulase experiments.
