description: These data were collected in 2018 and 2019 at the University of Illinois
  Energy Farm (N 40.063607, W 88.206926). During each growing season, bulk and rhizosphere
  soil were collected from replicate Sorghum bicolor nitrogen use efficiency trial
  plots at three separate time points (approximately July 1, Aug. 1, and Sept. 1).
  We measured soil moisture, pH, soil nitrate and ammonium, potential nitrification,
  potential denitrification, and extracted and sequenced the V4 region of the 16S
  rRNA gene for microbial community analysis.
