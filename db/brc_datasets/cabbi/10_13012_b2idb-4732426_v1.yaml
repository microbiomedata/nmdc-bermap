description: Yarrowia lipolytica was found natively to produce erythritol, mannitol,
  and arabitol during growth on glucose, fructose, mannose, and glycerol. Osmotic
  stress is known to increase sugar alcohol production, and was found to significantly
  increase erythritol production during growth on glycerol. To better understand erythritol
  production from glycerol, since it was the most promising sugar alcohol, we measured
  the expression of key genes and intracellular metabolites. Osmotic stress increased
  the expression of several key genes in the glycerol catabolic pathway and the pentose
  phosphate pathway. Analysis of intracellular metabolites revealed that amino acids,
  sugar alcohols, and polyamines are produced at higher levels in response to osmotic
  stress. Heterologous overexpression of the sugar alcohol phosphatase increased erythritol
  production and glycerol utilization in Y. lipolytica. We further increased erythritol
  production by increasing the expression of native glycerol kinase (GK), and transketolase
  (TKL). These data show the growth and titers produced.
