description: Enzymatic reduction of oxyanions such as sulfite (SO32−) requires the
  delivery of multiple electrons and protons, a feat accomplished by cofactors tailored
  for catalysis and electron transport. Replicating this strategy in protein scaffolds
  may expand the range of enzymes that can be designed de novo. Mirts et al. selected
  a scaffold protein containing a natural heme cofactor and then engineered a cavity
  suitable for binding a second cofactor—an iron-sulfur cluster (see the Perspective
  by Lancaster). The resulting designed enzyme was optimized through rational mutation
  into a catalyst with spectral characteristics and activity similar to that of natural
  sulfite reductases.
