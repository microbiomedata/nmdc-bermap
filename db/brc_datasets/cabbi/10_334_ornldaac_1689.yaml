description: This dataset provides a time series of visible-wavelength digital camera
  imagery collected through the PhenoCam Network at each of 393 sites predominantly
  in North America from 2000-2018. The raw imagery was used to derive information
  on phenology, including time series of vegetation color, canopy greenness, and phenology
  transition dates for the PhenoCam Dataset v2.0. The PhenoCam data are released under
  a CC-BY license.
