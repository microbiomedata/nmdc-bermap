description: This is a version of the CORPSE model (Carbon, Organisms, Rhizosphere
  and Protection in the Soil Environment, Sulman et al. 2014) that uses litter decomposition
  parameters derived from a modified Monte Carlo simulation using the LIDET litter
  decomposition dataset (Long-term Intersite Decomposition Experiment Team, Harmon
  2013). The code also includes the Baseline parameters, and the eight other best
  parameter sets identified in a modified Monte Carlo simulation.
