description: 'Research objectives were to study nitrogen (N) fertilization and age
  effect on Miscanthus x giganteus (mxg) yield and their interaction. In addition,
  we studied how establishment conditions affected mxg yield response to N fertilization.  This
  is the first repeated planting year experiment conducted on perennial bioenergy
  grasses. Data showed that mxg yield response to N fertilization was highly variable.
  Establishment effects were an important driver of this variability and caused significant
  changes on the magnitude and direction of one-year-old stands’ response to N fertilization.
  With repeated planting we compared yield gain from first to second year of growth
  of different single starts. Yield gain of each single start was different within
  and between sites. This site-specific response suggests that important biases could
  be introduced when comparing results across studies if repeated planting is not
  utilized. '
