description: Most native producers of ribosomally synthesized and post-translationally
  modified peptides (RiPPs) utilize N-terminal leader peptides to avoid potential
  cytotoxicity of mature products to the hosts. Unfortunately, the native machinery
  of leader peptide removal is often difficult to reconstitute in heterologous hosts.
  Here we devised a general method to produce bioactive lanthipeptides, a major class
  of RiPP molecules, in Escherichia coli colonies using synthetic biology principles,
  where leader peptide removal is programmed temporally by protease compartmentalization
  and inducible cell autolysis. We demonstrated the method for producing two lantibiotics,
  haloduracin and lacticin 481, and performed analog screening for haloduracin. This
  method enables facile, high throughput discovery, characterization, and engineering
  of RiPPs.
