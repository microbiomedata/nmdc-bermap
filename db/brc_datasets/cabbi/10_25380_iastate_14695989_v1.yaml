description: 'Research objectives were to compare whether miscanthus would leach less
  nitrogen (N) than continue maize and how soil net N mineralization (Nmin) may explain
  observed leaching. The experiment included three factors: 1) cropping system (maize,
  juvenile miscanthus = 1-2 y old, mature miscanthus = 3-4 y old); 2) N fertilization
  (0 and 224 kg N ha-1); and 3) environment (four site-years at two locations in Iowa,
  USA that differed in climate and soil fertility). During the 2017 and 2018 growing
  seasons a variety of soil measurements, including inorganic soil N (ammonium + nitrate),
  in situ Nmin, and N leaching were taken to better understand the differences in
  N cycling dynamics associated with each system.'
