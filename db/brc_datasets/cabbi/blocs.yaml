description: his module allows BioSTEAM users to consider the impacts of economic
  and environmental parameters that vary by location. Current location-specific data
  includes income, property, fuel producer, and sales tax rates; feedstock prices
  (corn, corn stover, and sugarcane); electricity prices; natural gas prices; location
  capital cost factors (LCCFs), and tax incentives (available as of February 2020)
  for all 50 states in the US.
