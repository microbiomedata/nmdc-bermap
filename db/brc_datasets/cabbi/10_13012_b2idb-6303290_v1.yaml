description: Sugarcane, a tropical C4 grass in the genus Saccharum (Poaceae), accounts
  for nearly 80% of sugar produced worldwide and is also an important feedstock for
  biofuel production. Generating transgenic sugarcane with predictable and stable
  transgene expression is critical for crop improvement. In this study, we generated
  a highly expressed single copy locus as landing pad for transgene stacking. Transgenic
  sugarcane lines with stable integration of a single copy nptII expression cassette
  flanked by insulators supported higher transgene expression along with reduced line
  to line variation when compared to single copy events without insulators by NPTII
  ELISA analysis. Subsequently, the nptII selectable marker gene was efficiently excised
  from the sugarcane genome by the FLPe/FRT site-specific recombination system to
  create selectable marker free plants. This study provides valuable resources for
  future gene stacking using site-specific recombination or genome editing tools.
