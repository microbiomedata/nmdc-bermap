description: The data provided includes the results of maximum water holding capacity
  using the funnel, filter paper, and drainage (FFPD) method, as well as soil water
  retention curves generated from the water desorption method (via pressure cells)
  for a full range of soil textures. It will also include data from sensitivity trials
  to test readily available materials and varying conditions the FFPD method could
  be expanded to use for more accessibility to community scientists. The format will
  be in data tables.
