description: 'Aging-related yield decline in Miscanthus × giganteus (miscanthus) remains
  a major constraint to sustainable biomass production. This study evaluated how nitrogen
  (N) management and soil fertility influence yield-component traits and productivity
  in aging miscanthus. Trials were conducted at two sites established in 2008 at the
  University of Illinois Energy Farm, Urbana, IL. (i) The Sun Grant trial received
  0, 60, and 120 kg N ha−1 annually until 2015. Starting 2021, half of each plot received
  60 or 120 kg N ha−1, resulting in six legacy-contemporary treatments: 0N–0N, 0N–120N,
  60N–0N, 60N–60N, 120N–0N, 120N–120N. (ii) The Energy Farm trial remained unfertilized
  until 2014, when one half of each plot received 56 kg N ha−1, forming two treatments:
  0N–0N, 0N–56N. Sun Grant trial results showed N fertilization increased tiller density
  (tillers m−2) and tiller weight (g tiller−1) in juvenile to early-mature miscanthus
  (2011–2015). After N withdrawal, both traits declined (20 % and 40 %), though legacy
  effects persisted in tiller weight in the aging stands (2020–2023). Contemporary
  N had little effect on tiller density but increased tiller weight by 34 %–77 %,
  resulting in 23 %–106 % higher machine-harvested biomass yield in 0–120N, 60-60N,
  and 120-120N plots. At the Energy Farm trial, 0N–56N plots yielded 59 %–108 % more
  biomass than 0N–0N. Soil total N increased (Sun Grant: 47 % by 2020; Energy Farm:
  58 % by 2023), while Mehlich-3 P (42 %–44 %) and K (21 %–46 %) declined. These findings
  identify tiller weight as a key determinant of biomass yield in aging miscanthus
  and highlight the need for P and K management for long-term productivity.'
