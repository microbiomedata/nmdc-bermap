description: The AmeriFlux version of the flux data taken in the southeast field at
  the SABR – Iowa State University site have been published on the AmeriFlux website.
  The data cover the years 2019-2024. The flux species measured include CO2, H, and
  H2O. The SE tower has a maize-soy-sorghum rotation with one crop planted in one
  of the fields each year. See the SABR Shiny site, https://sabr.shinyapps.io/appSABR/,
  for more information.
