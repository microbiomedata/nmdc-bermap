description: Over the past 15 years, soybean seed yield response to season-long elevated
  O3 concentrations [O3] and to year-to-year weather conditions was studied using
  free-air O3 concentration enrichment (O3-FACE) in the field at the SoyFACE facility
  in Central Illinois. Elevated [O3] significantly reduced seed yield across cultivars
  and years. However, our results quantitatively demonstrate that weather conditions,
  including soil water availability and air temperature, did not alter yield sensitivity
  to elevated [O3] in soybean.
