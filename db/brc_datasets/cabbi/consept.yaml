description: CoNSEPT is a tool to predict gene expression in various cis and trans
  contexts. Inputs to CoNSEPT are enhancer sequence, transcription factor levels in
  one or many trans conditions, TF motifs (PWMs), and any prior knowledge of TF-TF
  interactions.
