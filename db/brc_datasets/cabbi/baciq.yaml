description: Multiplexed proteomics has emerged as a powerful tool to measure relative
  protein expression levels across multiple conditions. The relative protein abundances
  are inferred by comparing the signals generated by isobaric tags, which encode the
  samples’ origins. Intuitively, the trust associated with a protein measurement depends
  on the similarity of ratios from the protein’s peptides and the signal-strength
  of these measurements. However, typically the average peptide ratio is reported
  as the estimate of relative protein abundance, which is only the most likely ratio
  with a very naive model. Moreover, there is no sense on the confidence in these
  measurements. Here, we present a mathematically rigorous approach that integrates
  peptide signal strengths and peptide-measurement agreement into an estimation of
  the true protein ratio and the associated confidence (BACIQ).
