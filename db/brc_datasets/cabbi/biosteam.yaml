description: BioSTEAM is a fast and flexible package for the design, simulation, and
  techno-economic analysis of biorefineries under uncertainty. BioSTEAM’s framework
  is built to streamline and automate early-stage technology evaluations and to enable
  rigorous sensitivity and uncertainty analyses. The long-term growth and maintenance
  of BioSTEAM is supported through both community-led development and the research
  institutions invested in BioSTEAM. Through the open-source and community-lead platform,
  BioSTEAM aims to foster communication and transparency within the biorefinery research
  community for an integrated effort to expedite the evaluation of candidate biofuels
  and bioproducts.
