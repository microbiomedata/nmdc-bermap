description: This dataset contains all data and supplementary materials from “Improving
  precision and accuracy of genetic mapping with genotyping-by-sequencing data in
  outcrossing species”. An Excel file a list of all QTLs and linkage group length
  (in cM) obtained with two different SNP-calling methods (Tassel-Uneak and Tassel-GBS),
  genetic map-construction method (linkage-only and reference order-corrected) and
  depth filters (12x, 20x, 30x and 40x) for genetic mapping of 18 biomass yield traits
  in a biparental Miscanthus sinensis population using RAD-Seq SNPs is provided as
  “Supplementary file 1”. A Perl script with the code for filtering VCF and HapMap-formatted
  data files is provided as “Supplementary file 2”. Phenotype data used for QTL mapping
  is provided as “Supplementary File 3”. A Perl script with the code for the simulation
  study is provided as “Supplementary file 4”.
