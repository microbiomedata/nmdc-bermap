description: This data set is related to the SoyFACE experiments, which are open-air
  agricultural climate change experiments that have been conducted since 2001. The
  fumigation experiments take place at the SoyFACE farm and facility in Champaign
  County, Illinois during the growing season of each year, typically between June
  and October.
