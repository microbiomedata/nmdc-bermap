description: Enhancing crop water use efficiency (WUE) is a key target trait for climatic
  resilience and expanding cultivation on marginal lands. Engineering lower stomatal
  density to reduce stomatal conductance (gs) has improved WUE in multiple C3 crop
  species. However, reducing gs in C3 species often reduces photosynthetic carbon
  gain. A different response is expected in C4 plants because they possess specialized
  anatomy and biochemistry which concentrates CO2 at the site of fixation. This modifies
  the photosynthesis (AN) relationship with intracellular CO2 concentration (ci) so
  that photosynthesis is CO2-saturated and reductions in gs are unlikely to limit
  AN. To test this hypothesis, genetic strategies were investigated to reduce stomatal
  density in the C4 crop sorghum. Constitutive expression of a synthetic epidermal
  patterning factor (EPF) transgenic allele in sorghum, led to reduced stomatal densities,
  reduced gs, reduced plant water use and avoidance of stress during a period of water
  deprivation. In addition, moderate reduction in stomatal density did not increase
  stomatal limitation to AN. However, these positive outcomes were associated with
  negative pleiotropic effects on reproductive development and photosynthetic capacity.
  Avoiding pleiotropy by targeting expression of the transgene to specific tissues
  could provide a pathway to improved agronomic outcomes.
