description: The aim of this study was to determine carbohydrate recovery from hemp
  for ethanol production and quantify biodiesel from TAG (triacylglycerol) present
  in hemp. The structural composition of five different hemp varieties (Seward County-SC,
  York County-YC, Loup County-LC, 19 m96136-19 m, and CBD Hemp-CBD) were analyzed.
  Concentration of glucan and xylan ranged between 32.63 to 44.52% and 10.62 to 15.48%
  respectively. The biomass was then pretreated with Liquid hot water followed by
  disk milling and then hydrolyzed enzymatically to yield monomeric sugars. High glucose
  (63-85%) and xylose (73-88%) recovery was achieved. Lipids were extracted from hemp
  using hexane and isopropanol and then transesterified to produce biodiesel. Approximately,
  50% of total fatty acids in SC, LC, and CBD hemp were linoleic acid. Palmitic acid
  was present between 32 to 50% in varieties YC and 19 m. Highest TAG concentration
  at 25% of total lipids was observed in CBD hemp. The analysis on lipid composition
  and high sugar recovery demonstrates hemp as a potential bioenergy crop for ethanol
  and biodiesel coproduction.
