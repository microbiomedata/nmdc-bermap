description: 'To identify and quantify any off-target mutations created during the
  NRT1.1 CRISPR/Cas9 experiment, genomic DNA was extracted from NRT1.1-E1 callus tissue
  for deep sequencing. Genomic library preparation was conducted using the Nextera
  DNA Flex Library Prep Kit (Illumina Cat #: 20018704) according to the manufacturers
  protocol and sequencing was performed on an Illumina NovaSeq6000.'
