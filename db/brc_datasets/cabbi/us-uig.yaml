description: Agricultural field planted with maize in a three year rotation with soy
  (maize-maize-soy) as a control site for Us-UiC when basalt began to be applied to
  Us-UiC in 2017. The first soy rotation was in 2019. This field is typically planted
  in May and harvested in October. This site is located at an experimental farm approximately
  2 miles south of the University of Illinois at Urbana Champaign and is colocated
  with (500-1000m distance) all other Us-Ui sites.
