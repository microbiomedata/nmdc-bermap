description: 'This data was used to assess the potential for improving water quality
  in this watershed when integrating miscanthus, a bioenergy perennial grass, on to
  areas of low profit under current corn-soybean management and areas of high nitrogen
  leaching under both current and future climate conditions. This dataset includes
  all observations (yield, streamflow, nitrogen loads) and model simulation data used
  from Dr. Kelsie Ferin’s (former PhD student with Dr. Andy VanLoocke, ISU Dept. of
  Agronomy) dissertation and publication in Global Change Biology – Bioenergy (DOI:
  10.1111/gcbb.13078). Modeled output included in this dataset includes corn, soybean,
  and miscanthus yields, nitrogen leaching rates, net mineralization rates, land use
  cover fractions with and without the inclusion of miscanthus, profitability maps,
  additional soil property maps, and simulated streamflow and nitrogen loads near
  the outlet of the Raccoon River Basin (Van Meter, Iowa) for both historical and
  future climate conditions. This dataset includes a mixture of netCDF, .tiff, .csv,
  and .xlsx files. See README.pdf for more information.  '
