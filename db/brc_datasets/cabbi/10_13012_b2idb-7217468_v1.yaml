description: The oleaginous yeast Rhodosporidium toruloides is considered a promising
  candidate for production of chemicals and biofuels thanks to its ability to grow
  on lignocellulosic biomass, and its high production of lipids and carotenoids. However,
  efforts to engineer this organism are hindered by a lack of suitable genetic tools.
  Here we report the development of a CRISPR/Cas9 system for genome editing in R.
  toruloides based on a fusion 5S rRNA–tRNA promoter for guide RNA (gRNA) expression,
  capable of greater than 95% gene knockout for various genetic targets. Additionally,
  multiplexed double‐gene knockout mutants were obtained using this method with an
  efficiency of 78%. This tool can be used to accelerate future metabolic engineering
  work in this yeast.
