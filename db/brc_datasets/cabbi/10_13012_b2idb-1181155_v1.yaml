description: We developed a new application of isotopic gas exchange which couples
  a tunable diode laser absorption spectroscope (TDL) with a leaf gas exchange system,
  analyzing leakiness through induction of C4 photosynthesis on dark to high-light
  transitions. The youngest fully expanded leaf was measured on 40-45 day-old maize(B73)
  and sorghum (Tx430).
