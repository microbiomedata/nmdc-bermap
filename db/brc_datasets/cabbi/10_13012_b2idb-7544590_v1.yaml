description: Miscanthus, a C4 member of the family Poaceae, is a promising perennial
  crop for bioenergy, renewable bioproducts, and carbon sequestration. Species of
  interest include nothospecies Miscanthus x giganteus and its parental species M.
  sacchariflorus and M. sinensis. Use of biotechnology-based procedures to genetically
  improve miscanthus, to date, have only included plant transformation procedures
  for introduction of exogenous genes into the host genome at random, non-targeted
  sites.
