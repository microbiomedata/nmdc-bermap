description: Sweet sorghum is typically cultivated for the food and fodder market.
  Recently, sweet sorghum varieties are being metabolically transitioned to enhance
  energy density by accumulating oil droplets in their vegetative tissues for bioenergy
  applications. Owing to the high biomass yield of sorghum, the transgenic lines can
  compete with oil-seed crops for biodiesel yield per unit area. In the initial phase
  of transgenic development, a high-throughput phenotyping method can bridge the gap
  between the production pipeline and analysis to improve the efficiency of the process.
  To meet the requirement, the present study extends the application of time-domain
  1H-NMR spectroscopy for rapid quantification and characterization of the total in-situ
  lipids of sweet sorghum ‘ramada’ to lay the groundwork for analyzing the upcoming
  large quantity of transgenic samples. NMR technology has been successfully established
  for analyzing lipid contents of vegetative tissues of non-transgenic variety. The
  multiexponential analysis of spin-lattice (T1) relaxation spectra obtained from
  TD-NMR aided the investigation of the dynamics of the free and bound lipid fraction
  with plant development. The total lipid concentration of bagasse and leaves of non-transgenic
  sweet sorghum remained unchanged throughout the plant development. Leaves displayed
  a higher percentage of bound lipids as compared to bagasse. A significant variation
  in the lipid concentration of juice was observed at the different growth stages
  with a maximum lipid accumulation of 1.21 ± 0.04% w/w at the boot stage that decreased
  with further maturity of the plant.
