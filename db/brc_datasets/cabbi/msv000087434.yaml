description: 'This dataset is associated with this manuscript: Metabolite discovery
  through global annotation of untargeted metabolomics data. Li Chen, Wenyun Lu, Lin
  Wang, Xi Xing, Xin Teng, Xianfeng Zeng, Antonio D Muscarella, Yihui Shen, Alexis
  Cowan, Melanie R McReynolds, Brandon Kennedy, Ashley M Lato, Shawn R Campagna, Mona
  Singh, Joshua Rabinowitz. The dataset has six main folders: (1) Yeast-MS1 (2) Yeast-labeling
  (3) Liver-MS1 (4) Liver-targeted-MS2 (separate folders for mzxml files and matched
  csv files used as the inclusion list to set up PRM targeted-MS2 runs) (5) Mouse-labeling
  (6) Glucosyl_taurine-liver-vs-synthesis. Please refer to README-raw-data-NetID-20210512.doc
  for more details.'
