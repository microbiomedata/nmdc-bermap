description: 'The dataset consists of two types of data: the estimate of land productivity
  (the maximum productivity, MP) and the estimate of land that has low productivity
  for any major crops planted in the Contiguous United States and then may be available
  for growing bioenergy crops (the marginal land, ML). All data items are in GeoTiff
  format, under the World Geodetic System (WGS) 84 project, and with a resolution
  of 0.0020810045 degree (~250 m).'
