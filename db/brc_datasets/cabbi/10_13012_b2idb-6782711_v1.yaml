title: Reactive Species and Reaction Pathways for the Oxidative Cleavage of 4-Octene
  and Oleic Acid with H2O2 over Tungsten Oxide Catalysts
creator:
- name: David W. Flaherty
  email: dflaherty3@gatech.edu
