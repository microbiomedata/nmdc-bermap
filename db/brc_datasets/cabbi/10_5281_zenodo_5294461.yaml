description: ECNet (evolutionary context-integrated neural network) is a deep learning
  model that guides protein engineering by predicting protein fitness from the sequence.
  It integrates local evolutionary context from homologous sequences that explicitly
  model residue-residue epistasis for the protein of interest with the global evolutionary
  context that encodes rich semantic and structural features from the enormous protein
  sequence universe.
