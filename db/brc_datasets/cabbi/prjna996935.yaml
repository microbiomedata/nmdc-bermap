description: Genome resequencing for mutation discovery in soybean short internode
  mutant. Whole-genome sequencing of the mutant revealed an 8.7kb deletion in the
  promoter of the Glyma.17g145200 gene, which encodes a member of the class III gibberellin
  2-oxidases. The mutation has a dominant effect, likely via increased expression
  of the GA 2-oxidase transcript observed in green tissue as a result of the deletion
  in the promoter of Glyma.17g145200. Levels of GA precursors are altered in the Compact
  mutant, supporting a role in gibberellin metabolism, and the mutant phenotype can
  be rescued with exogenous GA3.
