description: Sugar alcohols are commonly used as low-calorie sweeteners and can serve
  as potential building blocks for bio-based chemicals. Previous work has shown that
  the oleaginous yeast Rhodosporidium toruloides IFO0880 can natively produce arabitol
  from xylose at relatively high titers, suggesting that it may be a useful host for
  sugar alcohol production. In this work, we explored whether R. toruloides can produce
  additional sugar alcohols.
