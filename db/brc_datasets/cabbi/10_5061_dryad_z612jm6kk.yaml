description: Dataset contains end-of-season Dry biomass yield of Miscanthus × giganteus
  from two sites (Urbana and Pesotum) in Central Illinois. The Urbana and Pesotum
  yields are collected over 4 years (2018-2021) and 2 years (2020-2021) respectively.
  Dataset also contains yield component traits (tiller height, tiller density and
  tiller weight) obtained at harvest. Phenotypic traits (canopy height, Leaf area
  index (LAI) and Leaf Chlorophyll content (LCC)) measured during the growing season
  are also included.
