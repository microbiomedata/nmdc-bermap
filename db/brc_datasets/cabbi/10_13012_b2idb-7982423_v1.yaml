description: This dataset contains the data used for the publication Aboveground rather
  than belowground productivity drives variability in Miscanthus x giganteus net primary
  productivity. This dataset contains Miscanthus x giganteus biomass, carbon, and
  nitrogen tissue data for aboveground and belowground plant parts collected in 2021
  for three different sites in Iowa with three different nitrogen application rates.
  Data at the Iowa sites were collected via biometric hand harvesting, belowground
  excavations, and soil coring both in-clump and beside-clump. Data were collected
  at two collection timepoints to calculate the contributions of belowground parts
  to Miscanthus x giganteus net primary productivity. This dataset also includes Miscanthus
  x giganteus and Switchgrass soil coring and excavation data collected in 2012 at
  the University of Illinois Urbana-Champaign Energy Farm.
