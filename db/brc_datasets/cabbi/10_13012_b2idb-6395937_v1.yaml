description: The availability of economically marginal land for energy crops is identified
  using the Cropland Data Layer and other soil, wind, climate data resources. Permanent
  grassland, cropland and the estimated productivity are also identified. All data
  are recognized on a 30m spatial resolution across the contiguous United States.
