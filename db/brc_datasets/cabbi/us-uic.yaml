description: Agricultural field planted with maize in a three year rotation with soy
  (maize-maize-soy). The first soy rotation year was 2010. This field is typically
  planted in May and harvested in October. This site is located at an experimental
  farm approximately 2 miles south of the University of Illinois at Urbana Champaign
  and is colocated with (500-1000m distance) all other Us-Ui sites.
