description: Data were collected from agronomy fields in Urbana and Ewing, IL, during
  the 2022 and 2023 growing seasons. The dataset includes dry biomass yield, nitrogen,
  phosphorus, and potassium concentrations and removals, and chemical composition
  elements (cellulose, hemicellulose, lignin, and soluble fractions) for 13 high-biomass
  sorghum hybrids.
