description: In 2020, early-season extreme precipitation events occurred following
  the planting of Sorghum bicolor (L.) Moench and Zea mays L. in central Illinois
  that caused ponding. Following the first rainfall event 50m transects were established
  to assess the waterlogging effects on seedling emergence and crop yields. Soil moisture,
  emergence, stem and tiller count, LAI, and yield were measured at various points
  in the season along these transects.
