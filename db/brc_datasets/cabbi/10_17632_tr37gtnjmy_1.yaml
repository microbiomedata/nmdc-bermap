description: 'Perennial energy grasses are a fundamental component of the emerging
  bioeconomy. While their yield dynamics and environmental services are being widely
  studied, little attention has been given to how the physiological changes associated
  with perenniality (e.g., nutrient cycling) that underpin yield and environmental
  services, change as a function of age. Across species, perennial grasses show a
  photosynthetic decline as a function of stand age, however, the physiological drivers
  of this age-related decline are poorly understood. In this manuscript we ask: by
  how much does nitrogen dilution in larger older plants contribute to this photosynthetic
  decline? Our results support the hypothesis that nitrogen dilution did not limit
  photosynthesis in mature stands. Compared per unit of area-based leaf nitrogen,
  photosynthesis of fertilized mature stands was still 26% lower than unfertilized
  juvenile stands. We hypothesize that the lack of late-season carbohydrate sinks
  may instead drive the age-related decline in photosynthesis.'
