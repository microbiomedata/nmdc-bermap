description: Securing food production while safeguarding ecosystem stability and resilience
  remains a grand challenge in the Anthropocene. Sustainable agricultural intensification
  holds promise in achieving ecosystem service multifunctionality beyond food production,
  yet empirical evidence remains tenuous, especially regarding consequences for the
  metaecosystems (i.e., spatially coupled ecosystems connected by flows across ecosystem
  boundaries). Here we synthesized long-term datasets encompassing 53 physical, chemical,
  and biological indicators, comprising &gt;11,000 field measurements, to understand
  effects of land-use intensification on multiple ecosystem services of spatially
  connected grasslands and wetlands. The management practices applied to grasslands
  were not directly imposed on wetlands, except for grazing intensity. Our results
  revealed that intensification promoted high-quality forage and livestock production
  in both grasslands and wetlands, but at the expense of water quality regulation,
  methane mitigation, non-native species invasion resistance, and biodiversity, and
  further weakened relationships among ecosystem services. Such intensification effects
  on grasslands cascaded to alter multifunctionality of embedded natural wetlands
  within the metaecosystems to a similar extent. Our results highlight the need to
  integrate holistic and systematic perspectives into land-use intensification strategies
  to achieve multifunctional agricultural landscapes.
