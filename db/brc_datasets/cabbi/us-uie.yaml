description: Agricultural field planted with photoperiod-sensitive (energy) sorghum
  bicolor in a three year rotation with soy (sorghum-sorghum-soy). The first soy rotation
  was in 2019. This field is typically planted in May and harvested for biomass (sorghum)
  or grain (soy) in October. This site is located at an experimental farm approximately
  2 miles south of the University of Illinois at Urbana Champaign and is colocated
  with (500-1000m distance) all other Us-Ui sites.
