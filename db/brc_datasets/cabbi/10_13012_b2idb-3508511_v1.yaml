description: The coproduction of high-value anthocyanin extract in the cellulosic
  ethanol process would diversify the co-product market, increase revenue, and potentially
  improve the economics of the process. The high anthocyanin concentration in the
  cob and structural carbohydrates in residual stover make purple corn stover an attractive
  source for anthocyanin and ethanol coproduction. This study aimed to develop simulation
  models for processes integrating ethanol production and anthocyanin extraction using
  purple corn stover, to evaluate their techno-economic feasibility, and to compare
  their performance with the conventional ethanol production process using corn stover.
  The annual ethanol production for plants processing 2000 MT dry feedstock / day
  was 148.6 million L/year for the integrated processes compared with 222.6 million
  L/year for the conventional process. Anthocyanin production in the modified processes
  using dilute acid-based and water-based anthocyanin extraction processes was 1779
  and 1099 MT/year, respectively. Capital investments for the integrated processes
  ($448.1 to $443.8 million) were higher than the conventional process ($371.9 million).
  Due to high revenue from anthocyanin extract, the ethanol production cost for the
  integrated process using acid-based anthocyanin extraction ($0.36/L) was 34.5% lower
  than conventional ethanol production ($0.55/L). The ethanol production cost for
  the integrated process using water-based anthocyanin extraction ($0.68/L) was higher
  than conventional ethanol production due to low ethanol and anthocyanin yields.
  The minimum ethanol selling price for the integrated process using acid-based anthocyanin
  extraction ($0.65/L) was also lower than the conventional process ($0.72/L), indicating
  an improvement in economic performance.
