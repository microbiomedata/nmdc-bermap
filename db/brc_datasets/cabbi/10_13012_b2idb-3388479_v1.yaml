description: Total nitrogen leaching rates were calculated over the Mississippi Atchafalaya
  River Basin (MARB) using an integrated economic-biophysical modeling approach. Land
  allocation for corn production and total nitrogen application rates were calculated
  for crop reporting districts using the Biofuel and Environmental Policy Analysis
  Model (BEPAM) for 5 RFS2 policy scenarios. These were used as input in the Integrated
  BIosphere Simulator-Agricultural Version (Agro-IBIS) and the Terrestrial Hydrologic
  Model with Biogeochemistry (THMB) to calculate the nitrogen loss.
