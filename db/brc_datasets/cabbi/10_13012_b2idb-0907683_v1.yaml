description: The use of potentially beneficial microorganisms in agriculture (microbial
  inoculants) has rapidly accelerated in recent years. For microbial inoculants to
  be effective as agricultural tools, these organisms must be able to survive and
  persist in novel environments while not destabilizing the resident community or
  spilling over into adjacent natural ecosystems. Here, we adapt a macroecological
  propagule pressure model to a microbial scale and present an experimental approach
  for testing the role of propagule pressure in microbial inoculant introductions.
  We experimentally determined the risk-release relationship for an IAA-expressing
  Pseudomonas simiae inoculant in a model monocot system. We then used this relationship
  to simulate establishment outcomes under a range of application frequencies (propagule
  number) and inoculant concentrations (propagule size). Our simulations show that
  repeated inoculant applications may increase establishment, even when increased
  inoculant concentration does not alter establishment probabilities.
