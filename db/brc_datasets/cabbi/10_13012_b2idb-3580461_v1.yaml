description: The compiled datasets include plot level observations of energy crops
  (miscanthus and switchgrass) from recent experimental field trials in the US including
  dry biomass yield, location, state, region, harvest year, growing season degree
  days (GDD), winter season heating degree days (HDD), growing season cumulative precipitation,
  annual nitrogen application rate, age of the pant when harvested, National Commodity
  Crop Productivity Index (NCCPI) values, and cultivar type (switchgrass) from various
  published and unpublished sources.
