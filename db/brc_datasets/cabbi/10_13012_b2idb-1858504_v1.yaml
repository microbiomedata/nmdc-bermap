description: DNAzymes have been widely used in many sensing and imaging applications
  but have rarely been used for genetic engineering since their discovery in 1994,
  because their substrate scope is mostly limited to single-stranded DNA or RNA, whereas
  genetic information is stored mostly in double-stranded DNA (dsDNA). To overcome
  this major limitation, we herein report peptide nucleic acid (PNA)-assisted double-stranded
  DNA nicking by DNAzymes (PANDA) as the first example to expand DNAzyme activity
  toward dsDNA. We show that PANDA is programmable in efficiently nicking or causing
  double strand breaks on target dsDNA, which mimics protein nucleases and can act
  as restriction enzymes in molecular cloning. In addition to being much smaller than
  protein enzymes, PANDA has a higher sequence fidelity compared with CRISPR/Cas under
  the condition we tested, demonstrating its potential as a novel alternative tool
  for genetic engineering and other biochemical applications.
