description: Agricultural field planted with miscanthus x giganteus perennial C4 bioenergy
  feedstock as a control site for Us-UiB when basalt began to be applied to Us-UiB
  in 2017. This field is typically harvested in Febraury or March. This site is located
  at an experimental farm approximately 2 miles south of the University of Illinois
  at Urbana Champaign and is colocated with (500-1000m distance) all other Us-Ui sites.
