description: Plants produce many high-value oleochemical molecules. While oil-crop
  agriculture is performed at industrial scales, suitable land is not available to
  meet global oleochemical demand. Worse, establishing new oil-crop farms often comes
  with the environmental cost of tropical deforestation. The field of metabolic engineering
  offers tools to transplant oleochemical metabolism into tractable hosts while simultaneously
  providing access to molecules produced by non-agricultural plants. Here, we evaluate
  strategies for rewiring metabolism in the oleaginous yeast Yarrowia lipolytica to
  synthesize a foreign lipid, 3-acetyl-1,2-diacyl-sn-glycerol (acTAG). Oils made up
  of acTAG have a reduced viscosity and melting point relative to traditional triacylglycerol
  oils making them attractive as low-grade diesels, lubricants, and emulsifiers. This
  manuscript describes a metabolic engineering study that established acTAG production
  at g/L scale, exploration of the impact of lipid bodies on acTAG titer, and a techno-economic
  analysis that establishes the performance benchmarks required for microbial acTAG
  production to be economically feasible.
