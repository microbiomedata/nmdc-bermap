description: This dataset comprises 15 plasmids engineered for the microbial production
  of the biofuel isopentenol. The plasmids express genes for the mevalonate (MVA)
  pathway, utilizing components from different source organisms (*S. aureus*, *M.
  mazei*) and codon optimization. A key feature is the systematic tuning of expression
  for the terminal synthesis step, which was explored using an idi1-nudB gene fusion
  and a library of ribosome binding site (RBS) variants.
