description: This dataset provides two expression plasmids for metabolic engineering
  in the oleaginous yeast *Rhodosporidium toruloides*. The plasmids contain genes
  for bisabolene synthase (BIS) and amorphadiene synthase (ADS), enabling the production
  of the valuable sesquiterpenes bisabolene and amorphadiene. Both synthase genes
  have been codon-optimized to ensure efficient heterologous expression in the yeast
  host.
