description: This dataset contains nine expression plasmids encoding engineered variants
  of Terminal deoxynucleotidyl Transferase (TdT) for protein production and analysis.
  The collection features wild-type, truncated, and cysteine-deficient mutants designed
  to probe enzyme structure and function. Several constructs also include fusions
  with His-MBP tags for purification or with a BRCT domain.
