description: This dataset provides 21 plasmids for the metabolic engineering of *Corynebacterium
  glutamicum*. The collection includes pk18mobsacB-based suicide vectors for targeted
  deletion of native genes, such as reductases and alcohol dehydrogenases, to create
  an optimized host. It also contains a series of expression plasmids that harbor
  heterologous mevalonate pathways and various terpene synthases for the production
  of monoterpenoids like geraniol, isoprenol, and linalool.
