dataset_url: https://public-registry.jbei.org/folders/421
description: This dataset comprises 20 plasmids designed for the metabolic engineering
  of terpene and isoprenoid biosynthesis in *E. coli*. The collection features individual
  enzymes and multi-gene operons for the mevalonate (MVA) pathway, farnesyl pyrophosphate
  (FPP) synthases, and various terpene synthases to produce molecules like epi-isozizaene
  and humulene. Key genes are sourced from diverse organisms including insects, plants,
  and bacteria, and are frequently codon-optimized and cloned into IPTG-inducible
  pET vectors with affinity tags for purification.
