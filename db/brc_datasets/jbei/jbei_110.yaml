description: This dataset contains 112 expression plasmids, each carrying a unique
  transcription factor from rice (*Oryza sativa*). These constructs were used in a
  large-scale, gain-of-function screen to identify genes that enhance plant growth
  and improve tolerance to abiotic stresses like drought, salt, and cold. The collection
  represents a valuable resource of candidate genes for engineering desirable traits
  in bioenergy and agricultural crops.
