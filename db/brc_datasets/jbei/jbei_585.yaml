description: This dataset provides four plasmids for genetic engineering of the fungus
  *Thermoascus aurantiacus* via *Agrobacterium tumefaciens*-mediated transformation.
  The collection includes two CRISPR-Cas9 vectors designed for targeted knockout of
  the *pyrG* gene. The remaining two plasmids are Golden Gate cloning vectors containing
  a GFP reporter cassette, enabling the construction of expression libraries for high-throughput
  screening.
