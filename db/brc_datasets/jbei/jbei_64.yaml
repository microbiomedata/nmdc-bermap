description: This dataset provides a set of three plasmids for engineering fatty acid
  metabolism in a broad range of bacterial hosts. All constructs utilize the pBBR1-MCS2
  vector and an arabinose-inducible BAD promoter for controlled gene expression. The
  primary plasmid co-expresses a four-gene pathway from *E. coli* and *M. luteus*,
  while two additional plasmids expressing *E. coli* 'tesA alone or the GFP reporter
  serve as experimental controls.
