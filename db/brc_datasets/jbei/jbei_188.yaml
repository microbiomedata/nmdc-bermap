description: This dataset contains two plasmids for engineering the mevalonate (MVA)
  pathway for isoprenoid production. The constructs are designed to improve pathway
  efficiency using distinct strategies. One plasmid expresses phosphomevalonate decarboxylase
  (PMD) with a NudB pyrophosphatase to improve enzyme function, while the other utilizes
  an MK-PMK enzyme fusion to enhance flux through the middle of the pathway.
