description: This dataset provides six plasmids for expressing enzymes involved in
  polyketide biosynthesis. The collection features multiple Type III polyketide synthases
  (PKSs), including full-length and truncated RppA from *Streptomyces coelicolor*
  and curcuminoid synthase (CUS) from *Oryza sativa*. A coumaryl CoA-ligase plasmid
  is also included, enabling the study and engineering of secondary metabolite pathways
  from both bacterial and plant origins.
