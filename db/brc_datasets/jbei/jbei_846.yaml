description: This dataset provides a collection of 59 plasmids for a modular, transient
  gene expression assay to screen for transcriptional activator domains in planta.
  The vectors are designed for Agrobacterium-mediated transformation and utilize Golden
  Gate assembly for cloning. The core of the dataset is a library of effector constructs
  expressing synthetic transcription factors, each a fusion of the GAL4 DNA-binding
  domain to a candidate activator tile, enabling functional characterization via a
  reporter system.
