description: This dataset contains 29 plasmids designed for metabolic engineering
  of an isopropanol production pathway in *E. coli*. The collection systematically
  explores the expression of key enzymes, including alcohol dehydrogenases, thiolases,
  and CoA ligases, sourced from a wide range of organisms. Plasmids were constructed
  using various expression vectors, promoters, and codon optimization strategies to
  test different genetic configurations and optimize pathway performance.
