description: This dataset provides 38 plasmids for metabolic engineering in *Saccharomyces
  cerevisiae*, with a focus on reconstituting specialized metabolic pathways. The
  collection enables the screening of diverse cytochrome P450 (CYP) enzymes and their
  reductase (CPR) partners from various organisms, particularly for sterol and brassinosteroid
  biosynthesis. The set also includes constructs for engineering the native yeast
  ergosterol pathway and a CRISPR/Cas9 plasmid for genome editing.
