description: This dataset provides a three-plasmid system for stable genomic engineering
  in hosts such as *Pseudomonas putida*, likely for experiments related to flaviolin
  production. The system utilizes PhiC31-mediated integration, comprising plasmids
  to create a genomic attB landing site, express the integrase, and deliver a gene
  of interest via an attP-carrying vector. This toolkit enables the creation of engineered
  strains for bioproduction studies.
