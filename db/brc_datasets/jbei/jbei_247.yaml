description: This collection of 11 plasmids is designed for engineering *E. coli*
  for biofuel and bioproduct synthesis from lignocellulose. The primary focus is on
  enabling cellulose utilization by expressing various cellulases and a beta-glucosidase,
  with constructs featuring an OsmY export tag for secretion. The dataset also includes
  a plasmid for limonene production, vectors for expressing transport-related proteins,
  and a FLP recombinase plasmid for genome engineering.
