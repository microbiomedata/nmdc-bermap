  description: "Plasmid bearing an exportable cellulase (Cel fused to OsmY) and a\
    \ beta-glucosidase, both under control of native E coli promoters, enabling growth\
    \ of E coli on cellulose as a sole carbon source when inoculated from an overnight\
    \ of LB medium.\r\n\r\nBEWARE, this plasmid will make your cells pretty sick when\
    \ you grow them in LB, as the cspD promoter, which drives expression of the OsmY-Cel7\
    \ promoter, acts like a constitutive promoter in LB. If you want better cell density,\
    \ for instance, to do a miniprep, growing the cells in M9/glucose will make the\
    \ cells happier but you'll get lower cellulase expression."
  selection_markers:
  - Amp
