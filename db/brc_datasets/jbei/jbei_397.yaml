description: This dataset contains five plasmids for the functional analysis of the
  *E. coli* cydDC operon, which is essential for cytochrome *bd* oxidase assembly.
  The constructs enable overexpression of the operon, complementation of a ∆cydC mutant,
  and site-directed mutagenesis of the CydC protein. Specifically, two plasmids feature
  variants at residue D86 (D86G and D86V) to probe its functional importance.
