description: This dataset comprises 19 plasmids designed for the metabolic engineering
  and optimization of the mevalonate (MVA) pathway. The collection systematically
  explores strategies to improve pathway flux, including codon optimization of key
  enzymes (HMGS, HMGR, PMK, MK), variations in gene order, and tuning expression with
  different promoters (T7, trc). Several constructs also incorporate the NudB phosphatase,
  likely to mitigate the toxicity of pathway intermediates and improve final product
  titers.
