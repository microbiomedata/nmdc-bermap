description: This dataset provides 26 plasmids for the metabolic engineering of monoterpene
  production, such as cineole and limonene. The collection includes expression constructs
  for various heterologous mevalonate (MVA) pathways and terpene synthases, as well
  as knockout plasmids designed to optimize precursor supply by modifying central
  carbon metabolism.
