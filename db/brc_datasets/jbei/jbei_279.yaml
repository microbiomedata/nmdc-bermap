description: This dataset contains a plasmid designed for metabolic engineering to
  enhance the cytoplasmic pool of acetyl-CoA. The plasmid facilitates the heterologous
  co-expression of both subunits (a and b) of ATP citrate lyase (ACL) from the fungus
  *Aspergillus nidulans*. This construct is notable for the removal of a terpene synthase
  gene, making it a foundational tool for boosting precursor supply to non-terpenoid
  pathways or for use as an experimental control.
