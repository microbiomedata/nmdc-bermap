description: This dataset provides a plasmid construct containing the *Arabidopsis
  thaliana* gene AT2G33570, a member of the Glycosyltransferase family 92 (GT92) implicated
  in cell wall biosynthesis. The gene's coding sequence was cloned into the Gateway
  entry vector pDONR-223. The native TGA stop codon has been removed to enable the
  creation of C-terminal protein fusions for further study.
