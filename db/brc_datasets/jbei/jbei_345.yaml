description: This dataset provides 24 plasmids designed to engineer a functional 1-deoxy-D-xylulose
  5-phosphate (DXP) pathway in *Saccharomyces cerevisiae*. The constructs feature
  bacterial DXP pathway genes, such as `ispG` and `ispD`, expressed from various yeast
  promoters. Key engineering strategies explored include the mitochondrial targeting
  of enzymes and the co-expression of auxiliary genes involved in iron-sulfur cluster
  assembly (`fldA`, `suf` genes) and oxidative stress mitigation (`SOD1`).
