description: This collection of 21 plasmids was developed to study and engineer the
  lignin biosynthesis pathway for bioenergy applications. The constructs contain various
  orthologs of hydroxycinnamoyl-CoA:shikimate hydroxycinnamoyl transferase (HCT) from
  diverse plant species, as well as genes like `pobA` and `ubiC` for lignin modification.
  These plasmids are designed for enzyme characterization and for creating transgenic
  plants with altered lignin composition to improve biomass deconstruction.
