description: This dataset provides three plasmids designed for CRISPR interference
  (CRISPRi) to repress the `crc` gene. The plasmids express distinct single guide
  RNAs (sgRNAs) that direct dCas9 to the `crc` gene for transcriptional knockdown.
  Notably, the pRGPspdCas9bad plasmid allows for arabinose-inducible control over
  dCas9 expression, enabling precise regulation of gene repression.
