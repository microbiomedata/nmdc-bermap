description: This dataset provides a collection of nine expression plasmids created
  to investigate the structure-function relationship of the O-demethylase LigM, an
  enzyme relevant to lignin valorization. The set includes wild-type LigM, a catalytic
  site mutant, and seven distinct vanillate-binding site mutants, all cloned into
  a modified pCDF-Duet-1 vector. These constructs are designed for the functional
  characterization of LigM, enabling comparative studies of its catalytic mechanism
  and substrate specificity.
