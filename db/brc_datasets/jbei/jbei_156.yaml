description: This dataset contains 18 plasmids designed to express synthetic proteins
  for use as internal standards in quantitative proteomics of *E. coli*. The synthetic
  proteins are composed of concatenated peptides derived from either highly abundant
  cellular proteins or from enzymes in key metabolic pathways. Targeted pathways include
  central carbon metabolism (glycolysis, TCA cycle), amino acid and nucleotide biosynthesis,
  and fermentation, providing broad coverage of cellular functions.
