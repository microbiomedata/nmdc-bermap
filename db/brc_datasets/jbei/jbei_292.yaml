description: This dataset contains 32 plant expression vectors designed to develop
  and test a Csy4-based system for predictable gene regulation. The plasmids feature
  the CRISPR-associated Csy4 ribonuclease for RNA processing, along with various reporter
  genes (GFP, RFP, Luciferase) and selectable markers. These constructs employ a range
  of constitutive (p35S), tissue-specific (pC4H), and inducible promoters to control
  gene expression, enabling the engineering of complex traits for bioenergy applications.
