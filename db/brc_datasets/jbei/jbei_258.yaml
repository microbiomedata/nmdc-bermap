description: This dataset provides a collection of eight plasmids for the metabolic
  engineering of *Saccharomyces cerevisiae*, focusing on enhanced xylose utilization
  and sugar transport. It includes constructs for expressing key xylose metabolism
  enzymes, such as xylose isomerase and xylulokinase, under the control of a strong
  constitutive promoter. The collection also contains low-copy plasmids carrying wild-type
  and mutant versions of the Hxt7 hexose transporter to investigate and engineer sugar
  uptake.
