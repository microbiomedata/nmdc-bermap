description: This dataset provides a collection of 30 plasmids for the metabolic engineering
  of the mevalonate (MVA) pathway. The primary focus is on the protein engineering
  of phosphomevalonate decarboxylase from *Saccharomyces cerevisiae* (PMDsc), featuring
  an extensive library of single and combinatorial point mutants. The collection also
  includes several multi-gene constructs for assembling different MVA pathway configurations,
  incorporating enzymes from *E. coli*, *S. cerevisiae*, and archaea for isoprenoid
  biosynthesis.
