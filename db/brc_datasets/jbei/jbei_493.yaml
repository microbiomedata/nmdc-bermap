description: This dataset contains 17 expression plasmids for metabolic engineering
  of the mevalonate (MVA) pathway, a key route for isoprenoid biosynthesis. The collection
  enables pathway optimization by expressing various orthologs of enzymes such as
  HMG-CoA reductase (HMGR) and mevalonate kinase (MK) from diverse microbial sources.
  Furthermore, the set includes several engineered variants of phosphomevalonate decarboxylase
  (PMD), created to investigate and improve catalytic function.
