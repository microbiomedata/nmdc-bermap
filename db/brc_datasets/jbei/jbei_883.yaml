description: This dataset provides plasmids for the metabolic engineering of diacid
  production in the host strain ABZR87. The collection includes two knockout vectors
  targeting native genes (ABZR87_RS15805 and ABZR87_RS07470). A third plasmid enables
  the constitutive expression of the key pathway enzyme BpsA_sfp.
