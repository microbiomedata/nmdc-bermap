description: This dataset contains plasmids designed to engineer polyketide synthase
  (PKS) modularity by swapping acyltransferase (AT) domains between different systems.
  The collection focuses on replacing the native AT domain of DEBS Module 6 with an
  AT from the epothilone PKS to alter its substrate specificity. Key constructs include
  a library with randomized domain junctions to optimize function, specific boundary
  variants, and mCherry reporter fusions for expression analysis.
