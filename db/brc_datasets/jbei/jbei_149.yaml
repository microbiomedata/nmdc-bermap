description: This dataset contains four yeast expression plasmids for producing the
  biofuel precursor bisabolene. The key components are two variants of a bisabolene
  synthase (BIS) gene with recoded 3' coding sequences, which increase specific production
  by up to 32% without altering the protein sequence. The collection also includes
  the parent plasmid (pRS425Leu2d-BISopt) used as a benchmark for the production improvements.
