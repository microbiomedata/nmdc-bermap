plasmid_features:
- backbone: pRSLeu2d-BIS-91
  promoters: []
  description: This variant (pRSLeu2d-BIS-91) has the 3' end of the cds recoded (the
    BIS protein sequence is the same). See reference below for description. Specific
    bisabolene production is 32% higher than with the wt pRSleu2d-BISopt plasmid when
    expressed in EPY300.
  selection_markers:
  - Amp
- backbone: pRSLeu2d-BIS-71
  promoters: []
  description: This variant (pRSLeu2d-BIS-71) has the 3' end of the cds recoded (the
    BIS protein sequence is the same). See reference below for description. Specific
    bisabolene production is 20% higher than with the wt pRSleu2d-BISopt plasmid when
    expressed in EPY300.
  selection_markers:
  - Amp
