description: This dataset comprises 47 plasmids constructed for the metabolic engineering
  of polyketide biosynthesis in *Streptomyces*. The collection primarily focuses on
  modifying the rimocidin polyketide synthase (PKS) pathway through promoter engineering
  and the expression of various pathway genes. A key feature is the inclusion of a
  diverse library of heterologous reductases, transaminases, and thioesterases intended
  to generate novel polyketide derivatives.
