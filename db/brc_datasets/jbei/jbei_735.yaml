description: This dataset contains 10 plasmids designed for the metabolic engineering
  of *Cupriavidus necator H16* for biopolymer production. The collection features
  modular expression vectors that constitutively express a beta-alanine utilization
  pathway alongside various CoA-transferases/ligases and polyhydroxyalkanoate (PHA)
  polymerases from different bacterial sources. It also includes sacB-based deletion
  vectors for knocking out the host's native PHA synthesis genes.
