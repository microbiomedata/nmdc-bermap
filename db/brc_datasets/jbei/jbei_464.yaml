description: This dataset provides plasmids for the targeted knockout of the *dgc*
  operon (PP_0308-0313). This operon encodes diguanylate cyclases, enzymes central
  to the c-di-GMP signaling pathway that regulates bacterial processes like biofilm
  formation. The collection includes the specific knockout plasmid as well as the
  parent knockout vector.
