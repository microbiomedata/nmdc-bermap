description: This dataset comprises a collection of 40 plasmids designed for the metabolic
  engineering of *E. coli* for pinene production. The plasmids feature pinene synthase
  (PS) and geranyl diphosphate synthase (GPPS) genes from several conifer species,
  which have been systematically engineered as single enzymes or fusion proteins with
  varied linkers, truncations, and codon optimization. The collection also includes
  a plasmid incorporating upstream mevalonate pathway genes to enhance the supply
  of precursors for monoterpene biosynthesis.
