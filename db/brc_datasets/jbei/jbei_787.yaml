description: This dataset provides expression and integration plasmids for metabolic
  engineering in *E. coli* and *Streptomyces*. The collection features vectors for
  expressing wild-type and evolved P450/CYP enzymes, as well as constructs for integrating
  styrene biosynthesis pathways into the *S. albus* genome using the VWB integrase
  system. A plasmid containing the azaserine biosynthetic gene cluster from *S. fragilis*
  is also included for heterologous expression.
