identifier: jbei:folder:00109
repository: ICE
datasetName: Lao et al. 2014 A
datasetType: GD
dataset_url: https://public-registry.jbei.org/folders/109
description: This dataset comprises a collection of 434 Gateway entry clones, each
  containing a unique glycosyltransferase (GT) gene from *Arabidopsis thaliana*. These
  enzymes represent a wide range of families involved in the biosynthesis of plant
  cell wall polysaccharides, a key target for bioenergy applications. Constructed
  in the pDONR223 vector without their native stop codons, these clones provide a
  comprehensive resource for high-throughput functional characterization of this important
  gene superfamily.
