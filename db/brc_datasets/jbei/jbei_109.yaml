    Hansen SF, Stonebloom S, Adams PD, Ronald PC, Hillson NJ, Hadi MZ, Vega-Sánchez
    ME, Loqué D, Scheller HV, Heazlewood JL. The plant glycosyltransferase clone collection
    for functional genomics. Plant J. 2014 Aug;79(3):517-29. doi: 10.1111/tpj.12577.
    Epub 2014 Jul 9. PubMed PMID: 24905498.'
