description: This dataset provides a set of six plasmids for the metabolic engineering
  of *Pseudomonas putida* for the biosynthesis of valerolactam. The collection features
  the core pathway plasmid for valerolactam production, multiple knockout (KO) vectors
  for host genome modification, and a plasmid for the complementation of *oplBA*.
  These genetic tools are designed to establish and optimize a heterologous production
  pathway in *P. putida*.
