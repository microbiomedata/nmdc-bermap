description: This collection comprises 10 plasmids designed for the metabolic engineering
  and biosynthesis of isopentanol and other terpenes. The plasmids feature several
  strategies, including a novel isopentanol pathway utilizing an isopentenyl-CoA intermediate,
  alternate AibC genes with modified expression, and a two-plasmid system for producing
  alpha-humulene. The dataset also includes foundational BioBrick expression vectors
  and pathway variants with different copy numbers and antibiotic markers.
