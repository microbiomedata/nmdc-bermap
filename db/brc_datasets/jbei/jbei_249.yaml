description: This dataset provides six plasmids for the metabolic engineering of amorphadiene,
  a precursor to the antimalarial drug artemisinin. The constructs establish a heterologous
  mevalonate pathway using genes from *S. cerevisiae* and *E. coli* to supply the
  isoprenoid precursor farnesyl pyrophosphate (FPP). A key plasmid in the set contains
  a codon-optimized amorphadiene synthase from *Artemisia annua* to convert FPP into
  the final product.
