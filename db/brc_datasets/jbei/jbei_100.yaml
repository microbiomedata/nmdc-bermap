description: The Goldberg et al. 2014 dataset consists of two bacterial expression
  plasmids designed for reporter gene studies. These vectors enable the IPTG-inducible
  expression of either Green Fluorescent Protein (GFP) or Red Fluorescent Protein
  (RFP) from the pTac promoter. Both plasmids also carry a Kanamycin resistance gene
  for antibiotic selection of transformants.
