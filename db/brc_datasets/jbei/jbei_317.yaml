description: This dataset contains nine yeast expression plasmids for studying the
  transcription factors Mga2 and Spt23, key regulators of fatty acid metabolism. The
  collection enables the expression of full-length, truncated (p90), and mutated forms
  of Mga2 and Spt23, often with C-terminal myc tags for detection. Expression is driven
  by a variety of native, constitutive (TEF1), and doxycycline-repressible promoters
  on both low-copy (CEN/ARS) and high-copy (2u) vectors, alongside a plasmid for repressible
  OLE1 expression.
