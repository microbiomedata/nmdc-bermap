description: This dataset provides three expression plasmids for producing cellulase
  enzymes relevant to bioenergy research. The constructs utilize the pEU_HSBC_SmaI
  vector to express the cellulases CelEcc, CelKcc, and CelAcc. Two of these enzymes
  are engineered with a CBM3 carbohydrate-binding module, a key feature designed to
  enhance their binding and degradation of cellulosic biomass.
