dataset_url: https://public-registry.jbei.org/folders/782
description: This dataset contains a collection of 62 plant binary vectors designed
  to characterize a library of constitutive promoters (PCONS), including the pCH,
  pCL, and pCM series. These expression vectors systematically drive various reporter
  genes (GFP, mScarlet, RUBY), a transcriptional activator (Gal4VP16), and a specific
  transgene (2828). All plasmids share a common backbone featuring a 35S-driven kanamycin
  resistance cassette for selection in plants.
