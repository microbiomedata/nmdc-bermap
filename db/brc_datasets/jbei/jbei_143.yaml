description: This dataset provides a collection of 14 plasmids containing engineered
  mutations in the AcrB multidrug efflux pump. The plasmids feature single and combinatorial
  point mutations, including A279T, Q584R, F617L, L822P, F927S, and F1033Y. This resource
  was generated to systematically investigate the functional impact of these specific
  amino acid substitutions on AcrB-mediated transport, particularly in the context
  of biofuel tolerance.
