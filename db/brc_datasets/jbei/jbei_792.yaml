description: This dataset provides a collection of 44 plasmids for the genetic manipulation
  of *Pseudomonas putida*. It features reporter plasmids for characterizing promoter
  activity, expression vectors for studying enzymes like Alcohol Acyltransferases
  (ATFs) under inducible control, and vectors for gene knockouts and site-directed
  mutagenesis. These genetic tools were developed to investigate gene regulation and
  protein function related to ester biosynthesis pathways.
