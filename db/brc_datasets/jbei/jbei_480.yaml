description: This dataset provides five plasmids for the heterologous expression of
  4-coumarate-CoA ligase 5 (4CL5) and HDT1 in different microbial chassis. The collection
  features Gateway-compatible vectors and codon-optimized gene sequences for expression
  in *Lactococcus lactis* and *Saccharomyces cerevisiae*. A key construct is an operon
  designed for the co-expression of both enzymes in *L. lactis*, enabling metabolic
  engineering strategies.
