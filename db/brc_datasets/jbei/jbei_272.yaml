description: This dataset contains three pET39b(+) expression plasmids for producing
  cellulase enzymes from 'Candidatus Reconcilibacillus cellulovorans' in *E. coli*.
  The plasmids carry the genes `celA`, `celB`, and `celC`, with the former two being
  codon-optimized for the expression host. All constructs are designed for IPTG-inducible
  expression and include a C-terminal TEV site and 6xHis tag to facilitate protein
  purification.
