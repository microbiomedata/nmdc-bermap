description: 'This dataset comprises three plasmids designed for the heterologous
  expression of a phenolic acid decarboxylase from *Bacillus amyloliquefaciens*. The
  constructs facilitate expression in three distinct bacterial hosts: *Bacillus subtilis*,
  *Escherichia coli*, and *Corynebacterium glutamicum*. To enhance protein production,
  the gene sequences were codon-optimized for the *E. coli* and *C. glutamicum* expression
  systems.'
