description: This collection comprises six plasmids designed as reporter constructs
  for monitoring gene expression in various microbial systems. The plasmids utilize
  a range of fluorescent proteins, including GFP, mCherry, and BFP2, driven by diverse
  promoters for expression in bacteria, yeast, and fungi. These constructs are suitable
  for applications such as colony screening, expression tuning, and developing synthetic
  biology tools.
