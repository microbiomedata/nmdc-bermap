description: This dataset provides a toolkit of 12 plasmids designed for the recombinant
  expression of an ATP-dependent lactam synthase (CaiC/ORF27) in *E. coli*. The synthase
  gene is supplied in various BioBrick expression vectors, including constructs with
  an N-terminal MBP solubility tag to improve expression. To further aid in proper
  protein folding, the collection is supplemented with a comprehensive suite of chaperone
  co-expression plasmids carrying genes such as *groES-groEL*, *tig*, and *dnaK-dnaJ-grpE*.
