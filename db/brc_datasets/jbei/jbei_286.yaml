description: This dataset contains seven plasmids designed for the metabolic engineering
  of *E. coli* for bioenergy applications. The constructs focus on modifying central
  carbon metabolism by expressing native and hybrid components of the Phosphotransferase
  System (PTS) and the alternative GalP-Glk glucose uptake pathway. A key plasmid
  expresses the CoA/ACP-reductase Maqu2220 from *Marinobacter aquaeolei*, enabling
  a pathway for biofuel production.
