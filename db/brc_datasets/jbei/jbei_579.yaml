description: This dataset comprises a collection of 160 plasmids designed as a modular
  synthetic biology toolkit for programmable gene expression in plants. The collection
  features extensive libraries of synthetic promoters and synthetic transcription
  factors, including defined activator and repressor constructs. These components
  are used to build genetic circuits that regulate the expression of key plant developmental
  genes, such as *WUSCHEL*, *PISTILLATA*, and *SHORTROOT*, for studying and engineering
  plant systems.
