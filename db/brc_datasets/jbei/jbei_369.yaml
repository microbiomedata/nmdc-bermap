description: This dataset contains two plasmids engineered for the microbial production
  of the biofuel isopentenol. The constructs carry genes encoding a synthetic mevalonate
  (MVA) pathway, including MevTsa, MK, PMK, and PMD. The pathway is completed by a
  NudB phosphatase, featuring an optimized ribosome binding site (RBS) variant, to
  convert MVA pathway intermediates into the final isopentenol product.
