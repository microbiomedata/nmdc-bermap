description: This dataset contains 47 plasmids designed for the combinatorial biosynthesis
  of novel polyketides through synthetic biology approaches. The plasmids encode engineered
  hybrid polyketide synthases (PKSs) created by swapping catalytic domains and modules
  from various natural product pathways, including those for lipomycin, erythromycin
  (Debs), and pikromycin. These constructs, featuring specific mutations and designed
  for expression in hosts like *E. coli* and *Streptomyces*, aim to generate new molecular
  structures by reprogramming PKS assembly lines.
