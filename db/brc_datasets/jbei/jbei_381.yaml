description: This dataset comprises 12 plasmids for the heterologous expression and
  engineering of the LipPks1 polyketide synthase (PKS). Key modifications explored
  in these constructs include acyltransferase (AT) domain swaps, N-terminal deletions,
  and site-directed mutagenesis to alter PKS function and its resulting product. The
  collection utilizes various promoters (gapdhp, ermE*p) and integration systems (C31,
  VWB) for expression, and includes an mCherry reporter plasmid as a control.
