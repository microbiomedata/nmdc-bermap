description: The pGinger Suite is a modular collection of 50 plasmids designed for
  controlled gene expression across a wide range of bacteria. This toolkit systematically
  combines broad-host-range origins of replication (BBR1 and RK2) with a diverse set
  of inducible systems (e.g., Cumate, IPTG, Salicylate) and constitutive Anderson
  promoters. Plasmids are equipped with Kanamycin, Gentamicin, or Spectinomycin resistance,
  creating a versatile resource for metabolic engineering and synthetic biology.
