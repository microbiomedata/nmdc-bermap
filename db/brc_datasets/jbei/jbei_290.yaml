description: This dataset contains the plasmid pJP5603-hrpA1, which was used to generate
  a gene knockout mutant in the rice pathogen *Xanthomonas oryzae* pv. *oryzae* strain
  PXO99. The plasmid targets the `hrpA1` gene, which encodes a key structural component
  of the Type III secretion system (T3SS) pilus. This genetic tool is therefore valuable
  for investigating the molecular mechanisms of bacterial pathogenicity and T3SS function.
