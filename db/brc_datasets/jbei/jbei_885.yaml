description: This collection of 29 plasmids is designed for the metabolic engineering
  of polyketide biosynthesis in *Streptomyces*. The dataset primarily features integration
  plasmids for expressing the rimocidin polyketide synthase (PKS) pathway. It is complemented
  by a suite of expression vectors carrying various aldehyde dehydrogenases and reductases
  under the constitutive Pgapdh promoter to modify host metabolism.
