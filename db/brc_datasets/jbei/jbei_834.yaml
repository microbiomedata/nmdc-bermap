description: This collection of 39 plasmids provides a comprehensive toolkit for genetic
  engineering in the fungus *Aspergillus oryzae*. The vectors are designed to evaluate
  native and synthetic promoter systems, including a Bm3R1-VP16 synthetic transcription
  factor, and enable stable gene integration at numerous validated neutral chromosomal
  loci. These tools are applied to metabolic engineering for the expression of heme
  and ergothioneine biosynthetic pathways, as well as soy leghemoglobin.
