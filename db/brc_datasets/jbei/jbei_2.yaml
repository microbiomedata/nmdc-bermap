description: This dataset comprises a suite of 11 plasmids for protein expression
  and genome engineering in *E. coli*. The collection features a series of arabinose-inducible
  (PBAD) GFPuv reporter constructs designed to systematically test the effects of
  different signal peptides, linker lengths, and degradation tags on protein localization
  and stability. Additionally, the dataset includes a template plasmid for lambda
  red-mediated chromosomal recombination, containing KanR and sacB markers for selection.
