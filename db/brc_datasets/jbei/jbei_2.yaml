  description: A plasmid PCR template for generating linear DNA fragments containing
    the KanR and sacB genes, as well as an I-SceI recognition site, to be flanked
    by E. coli homologous sequences to direct the chromosomal recombination in coordination
    with the lamda red and I-SceI systems carried on the pREDI plasmid. Note, this
    is not the original pSKI published, but was derived from pSCI. However, it essentially
    has the same functionality of the original pSKI.
