description: This dataset contains seven plasmids designed for metabolic engineering
  of fatty acid synthesis pathways for biofuel production. The collection enables
  the comparative expression of 3-ketoacyl-ACP reductase (FabG) orthologs from diverse
  bacterial species. Key constructs also incorporate a Rex/P_adhE redox-sensing circuit
  to provide dynamic, NADH-dependent control over gene expression and optimize pathway
  flux.
