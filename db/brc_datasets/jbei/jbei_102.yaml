description: This dataset provides a collection of 36 plasmids for genetic engineering
  of the thermoacidophilic archaeon *Sulfolobus acidocaldarius*. The collection features
  a suicide vector designed to knock out the glcSTUV glucose transporter gene cluster.
  The remaining plasmids are pRN1/pBluescript-based shuttle vectors, enabling gene
  manipulation and expression studies in both *Sulfolobus* and *E. coli*.
