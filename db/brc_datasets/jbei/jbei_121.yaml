description: This dataset provides 10 plasmids for the metabolic engineering of methyl
  ketone production. The constructs establish the core methyl ketone pathway, including
  a codon-optimized acyl-CoA oxidase (aco), and enhance the precursor malonyl-CoA
  supply via acetyl-CoA carboxylase overexpression. The collection also features plasmids
  designed to engineer fatty acid metabolism by manipulating key regulators (FadR)
  and enzymes (FadD, FadM) to improve substrate flux.
