description: This dataset consists of a molecular toolkit of 31 plasmids designed
  for genetic engineering. The collection is primarily composed of 28 expression vectors,
  supplemented by 3 vectors for targeted gene knockouts. These tools are suitable
  for applications in functional genomics and metabolic engineering, enabling the
  overexpression or deletion of specific genes.
