description: This dataset contains 16 expression plasmids designed for the metabolic
  engineering of isoprenoid-derived esters in a microbial host. The constructs feature
  key genes for the mevalonate pathway (e.g., IDI1, PMD), precursor supply (ACS),
  and final product synthesis via alcohol acetyltransferases (SAAT, ATF1). The collection
  enables pathway optimization by systematically varying gene order, ribosome binding
  site strengths, and enzyme orthologs.
