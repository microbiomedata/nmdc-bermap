datasetName: Opgenorth et al. 2019
datasetType: GD
dataset_url: https://public-registry.jbei.org/folders/385
description: This dataset comprises 127 plasmids designed for the metabolic engineering
  of *E. coli*, with a primary focus on producing the biofuel dodecanol. The collection
  systematically explores the optimization of biosynthetic pathways by expressing
  key enzymes, such as thioesterases and reductases (e.g., `fatB`, `Maqu_2220`), under
  the control of varied ribosome binding sites (RBS). These constructs represent a
  modular toolkit, including many Level 0 and Level 1 parts, for assembling and fine-tuning
  gene expression to improve biochemical production.
