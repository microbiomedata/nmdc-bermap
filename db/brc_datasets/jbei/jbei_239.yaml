plasmid_features:
- backbone: pLigE-CPDv4
  promoters: []
  description: Modification of pVP16 such that gene of interest is fused at the C-terminal
    side to a inducible protease (CPD) that cleaves after a leucine located in-between
    the domains. Versions (e.g. v3, v4) refer to successive mutations to remove leucines
    found in the C-terminal tag and at the C-terminal end of CPD itself.
  selection_markers:
