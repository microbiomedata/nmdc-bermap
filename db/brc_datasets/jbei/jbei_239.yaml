description: This dataset provides plasmids for protein expression and structural
  analysis. It includes two expression vectors featuring a C-terminal inducible protease
  (CPD) fusion system designed for controlled, tag-free protein production via cleavage
  after a specific leucine residue. The collection also contains a C-terminally truncated
  LigE construct that was engineered to facilitate protein crystallization.
