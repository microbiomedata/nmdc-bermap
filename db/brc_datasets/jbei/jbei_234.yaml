description: This dataset contains 28 plasmids designed to investigate the subcellular
  localization of 14 different *Arabidopsis thaliana* proteins. Each gene is cloned
  into a pBullet plasma membrane-targeting vector system as two separate constructs,
  allowing for the expression of both N-terminal and C-terminal fusions. These constructs
  are suitable for determining the membrane topology and localization of proteins
  potentially involved in cell wall biosynthesis and transport processes relevant
  to bioenergy.
