description: This dataset contains 12 plasmids for advanced bacterial genome engineering
  using CRISPR Optimized MAGE Recombineering (CRMAGE) and CRISPR-mediated integration.
  The collection features an inducible CRMAGE system with sgRNAs designed to select
  against wildtype glnA and T7 promoters, enabling efficient promoter engineering.
  Additionally, it includes CRISPR plasmids for the genomic integration of key metabolic
  engineering genes, bpsA and sfp, into defined loci.
