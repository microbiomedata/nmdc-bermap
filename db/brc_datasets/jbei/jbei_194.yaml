description: This dataset provides eight plasmids for the metabolic engineering of
  *Saccharomyces cerevisiae* to produce fatty acid-derived oleochemicals. The collection
  features yeast expression vectors containing key genes for fatty acid biosynthesis
  (ACC1, FAS1/FAS2), modification ('TesA, Atfa), and conversion to fatty alcohols
  (mFAR), primarily driven by inducible GAL promoters. A utility plasmid for constructing
  genomic promoter replacements using a URA3 selectable marker is also included.
