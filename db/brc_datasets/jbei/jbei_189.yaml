description: This dataset comprises four expression plasmids for studying natural
  product biosynthesis in E. coli. The collection focuses on components of the yersiniabactin
  siderophore pathway, including the Non-Ribosomal Peptide Synthetase (NRPS) HMWP2
  and a Polyketide Synthase (PKS) module. A plasmid containing a module from the epothilone
  PKS is also included, providing tools for the heterologous production and characterization
  of key enzymes from PKS and NRPS assembly lines.
