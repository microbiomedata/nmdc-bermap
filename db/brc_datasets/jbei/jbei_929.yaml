description: This dataset contains 34 plasmids designed for plant synthetic biology
  and metabolic engineering. The collection features a systematic series of constructs
  for testing and optimizing the Ruby visual reporter system by varying gene orientation
  and regulatory elements. It also includes vectors for bioenergy applications, expressing
  key enzymes for modifying the lignin and shikimate pathways, such as LigA/B/C and
  a feedback-resistant aroG.
