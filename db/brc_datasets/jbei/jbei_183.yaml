description: This dataset contains three plasmids used to engineer tolerance to oxidized
  limonene, featuring an *E. coli* AhpC(L177Q) mutant that confers high resistance.
  The collection includes this key mutant, a wild-type AhpC control, and the BioBrick
  Berkeley expression vector used for cloning. Expression of both AhpC variants is
  driven by a tetracycline-inducible (tet) promoter.
