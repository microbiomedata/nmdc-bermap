    Bendall ML, Sczyrba A, Thompson J, Feldman T, Guenther JM, Gladden JM, Cheng JF,
    Adams PD, Rubin EM, Simmons BA, Sale KL, Northen TR, &amp; S., D. (2014). “Phylogenomically
    Guided Identification of Industrially Relevant GH1 β-Glucosidases through DNA
    Synthesis and Nanostructure-Initiator Mass Spectrometry”. ACS. doi, 10.1021/cb500244v
