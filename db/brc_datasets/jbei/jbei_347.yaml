description: This dataset contains two engineered plasmids derived from the pEG1675
  vector for metabolic engineering applications. One plasmid features a deletion of
  the `araC` regulatory gene to alter gene expression control. The second plasmid
  enables the overexpression of `maeB`, a malic enzyme used to enhance NADPH supply
  and redirect metabolic flux for bioproduction.
