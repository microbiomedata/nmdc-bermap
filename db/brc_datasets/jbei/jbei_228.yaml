description: 'This dataset contains a plasmid designed for the biosynthesis of specialized
  secondary metabolites. The plasmid co-expresses two key enzymes: 4-coumaroyl:CoA
  ligase (4CL5) from *Arabidopsis thaliana* and hydroxycinnamoyl/benzoyl-CoA:anthranilate
  N-hydroxycinnamoyl/benzoyltransferase (HCBT). In this engineered two-step pathway,
  4CL5 generates various CoA esters which are subsequently coupled to anthranilate
  by HCBT.'
