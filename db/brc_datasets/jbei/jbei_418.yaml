description: This dataset comprises 28 plasmids for expressing the fatty acid monooxygenase
  P450BM3 from *Bacillus megaterium*. The collection features N-terminally His-tagged
  wild-type P450BM3 and an extensive library of variants with single or double mutations
  at active site residues F87 and A328. Several plasmids are designed for high-titer
  expression, and a GFP control plasmid is included for reference.
