description: This dataset provides five plasmids based on the pVP16 vector, engineered
  for controlled protein expression and purification. These plasmids enable the C-terminal
  fusion of a gene of interest to an inducible protease tag (CPD). Upon induction,
  the CPD protease facilitates cleavage at a specific leucine residue, allowing for
  the removal of the fusion tag. The different plasmid versions contain successive
  mutations to eliminate off-target leucine cleavage sites, thereby improving the
  specificity of the system.
