description: This dataset provides genetic tools for the metabolic engineering of
  *Pseudomonas putida* to control fatty acid and polyhydroxyalkanoate (PHA) production.
  The collection includes suicide plasmids for deleting key genes in PHA metabolism
  (`phaC1`, `phaZ`, `phaC2`) and fatty acid beta-oxidation (`FadAB`). A broad-host-range
  expression vector is also provided to express a heterologous fatty acid pathway
  using genes such as *'tesA*, *fadB*, and *fadM*.
