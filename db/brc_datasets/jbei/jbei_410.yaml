description: This dataset contains 89 plasmids designed for CRISPR interference (CRISPRi)-based
  gene repression in *E. coli*, enabling metabolic engineering and system characterization.
  The collection systematically varies dCas9 expression using engineered, wild-type,
  and constitutive promoters, with gRNAs targeting a diverse set of metabolic genes
  or reporter genes (RFP, GFP) to quantify repression efficiency.
