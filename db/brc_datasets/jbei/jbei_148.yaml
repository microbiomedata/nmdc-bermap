description: This dataset provides a set of six plasmids created to evaluate different
  promoters for driving expression of the `eilA` efflux pump gene. The constructs
  place `eilA` under the control of the `marR`, `placUV5`, `ydfO`, `pBAD`, and `ydfA`
  promoters, with a promoterless version included as a negative control. This collection
  allows for the systematic comparison of promoter strength for applications in engineering
  microbial tolerance.
