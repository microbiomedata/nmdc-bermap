description: This dataset provides a Gateway entry clone for the *Arabidopsis thaliana*
  gene AT2G22900, which encodes a member of the Glycosyltransferase family 34 (GT34)
  involved in plant cell wall biosynthesis. The coding sequence was cloned into the
  pDONR-223 vector without its native stop codon. This construct is designed to facilitate
  C-terminal protein fusions for downstream functional characterization.
