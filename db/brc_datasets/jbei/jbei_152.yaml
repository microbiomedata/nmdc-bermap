description: This dataset contains 14 BioBrick plasmids designed for the metabolic
  engineering of the mevalonate (MVA) pathway for amorphadiene production. The plasmids
  express amorphadiene synthase (ADS) and various MVA pathway enzymes, featuring different
  gene variants such as codon-optimized and heterologous versions. The collection
  enables pathway optimization by providing constructs with single genes, multiple
  enzymes, and the complete MVA pathway on a single vector.
