description: 'This dataset provides four expression plasmids for engineering a biosynthetic
  pathway to convert L-lysine into valuable chemical precursors. The collection features
  genes for an Acyl-CoA Ligase (ORF26) from *Streptomyces aizunensis* and two key
  enzymes of the lysine degradation pathway from *Pseudomonas putida*: L-lysine monooxygenase
  (davB) and 5-aminovaleramide amidohydrolase (davA). These components are central
  to the microbial production of bio-based chemicals and polymers.'
