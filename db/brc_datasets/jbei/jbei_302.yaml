description: This dataset comprises 14 plasmids for the metabolic engineering of *E.
  coli* to produce monoterpenes, including cineole, linalool, and pinene. The constructs
  feature various terpene synthases from bacterial and fungal sources, often co-expressed
  with geranyl pyrophosphate synthase (GPPS). These plasmids represent diverse strategies
  to optimize precursor supply, such as engineering the native MEP pathway via an
  ispA mutation or introducing the heterologous mevalonate pathway.
