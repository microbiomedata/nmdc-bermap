description: This dataset provides 10 plasmids for the metabolic engineering of *E.
  coli* to produce the terpenes limonene and bisabolene. The collection features codon-optimized
  mevalonate (Mev) pathway genes and various terpene synthases, assembled into high-copy
  expression vectors. These constructs were designed using modular cloning strategies
  to create high-titer production strains for advanced biofuels.
