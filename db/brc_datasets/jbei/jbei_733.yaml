description: This dataset provides a comprehensive synthetic biology toolkit of 128
  plasmids for genetic engineering in *Pseudomonas* species, particularly *P. putida*.
  Key components include systematically characterized inducible promoters and ribosome
  binding sites, and an extensive set of dual-inducible CRISPRi vectors for targeted
  gene repression using dCas9 from *S. pyogenes* and *S. pasteurianus*. The collection
  is built upon versatile *E. coli-P. putida* shuttle vectors and includes plasmids
  for genomic integration and the production of bioproducts such as indigodine and
  methyl ketones.
