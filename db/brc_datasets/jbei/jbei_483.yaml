description: This dataset contains 11 expression plasmids for characterizing enzymes
  involved in acyl-CoA metabolism and polyketide biosynthesis. The collection primarily
  features wild-type and a series of site-directed mutants of the *Streptomyces tsukubensis*
  polyketide synthase proteins TcsA and TcsD, designed to probe enzyme function. It
  also includes plasmids expressing acyl-CoA dehydrogenases from *Pseudomonas putida*
  and *Nocardia mexicana* and an acyl carrier protein.
