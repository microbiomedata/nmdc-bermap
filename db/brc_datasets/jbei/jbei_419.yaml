description: This dataset contains the Pgem 335 plasmid, designed for *Agrobacterium
  tumefaciens*-mediated transformation (ATMT) of the oleaginous yeast *Rhodotorula
  toruloides*. The plasmid carries codon-optimized genes encoding the phosphopantetheinyl
  transferase *sfp* and the indigoidine synthetase *bpsA*. Expression of this construct
  enables the production of the blue pigment indigoidine, which serves as a visual
  reporter for evaluating heterologous pathway function in the engineered yeast.
