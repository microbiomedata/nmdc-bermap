description: This dataset provides five jSTACK-based plant transformation vectors
  designed to engineer cell wall composition. The plasmids contain various combinations
  of genes involved in hemicellulose and pectin biosynthesis, including `GALS1`, `UGE2`,
  and `URGT1`. Gene expression is driven by a suite of constitutive and secondary
  cell wall-specific promoters to systematically test metabolic engineering strategies
  for modifying plant biomass.
