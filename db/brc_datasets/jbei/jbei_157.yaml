description: This dataset contains 10 plasmids for engineering *E. coli* to produce
  the monoterpene limonene and its derivative, perillyl alcohol. The constructs establish
  a heterologous mevalonate pathway using genes from *S. cerevisiae* and *E. coli*
  to supply isoprenoid precursors. Key plasmids feature various optimized and truncated
  versions of geranyl pyrophosphate synthase (GPPS) and limonene synthase (LS), as
  well as a P450 system for the oxidation of limonene.
