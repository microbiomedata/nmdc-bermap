description: This dataset provides five expression plasmids for engineering isoprenoid
  biosynthesis and formate oxidation pathways in *Escherichia coli*. The constructs
  enable expression of a heterologous mevalonate (MVA) pathway using genes from multiple
  organisms and formate dehydrogenase (FDH) enzymes from *Cupriavidus necator* and
  *Pseudomonas sp. 101*. The collection includes plasmids for the complete and partial
  MVA pathway, as well as an FDH variant with a mutated operator for altered expression
  control.
