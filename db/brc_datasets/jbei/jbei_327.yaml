  description: 'pCMSYSH47Tef1p: pSH47 with its GAL1 promoter replaced with a TEF1
    promoter. pSH47 was digested with SacI and XbaI, gel extracted, and cloned into
    yeast along with a double stranded Tef1p cassette with overhangs homologous to
    the cut ends of the plasmid. This was miniprepped (w/ bead beating protocol),
    transformed into E. coli, miniprepped again, and sequence verified.'
