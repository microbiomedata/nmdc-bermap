description: This dataset contains two plasmids, including a YC-type (centromeric)
  shuttle vector for stable, low-copy expression in yeast. The key construct, pCMSYSH47Tef1p,
  was engineered by replacing the inducible GAL1 promoter with a constitutive TEF1
  promoter. This modification enables continuous gene expression, making the vector
  suitable for applications where consistent protein levels are required.
