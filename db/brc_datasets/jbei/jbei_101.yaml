description: This dataset contains 33 plasmids for synthetic biology and metabolic
  engineering applications. The collection is centered around a combinatorial library
  of various promoters and bicistronic design (BCD) elements fused to a GFP reporter
  for quantifying gene expression strength. It also includes expression plasmids for
  producing the bioproducts amorphadiene and isopentenol, alongside specific gene
  mutants and cloning vectors.
