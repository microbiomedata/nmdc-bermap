description: 'This dataset provides a collection of four plasmids designed for CRISPR-based
  gene regulation in *Pseudomonas putida*. Each plasmid encodes a unique guide RNA
  (gRNA) sequence targeting a specific gene locus: PP_0424, PP_4264, PP_2037, or PP_0988.
  These genetic tools are intended for metabolic engineering applications to investigate
  or modify pathways related to acetate utilization.'
