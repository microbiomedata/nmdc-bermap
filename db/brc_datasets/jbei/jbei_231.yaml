description: This collection of 26 plasmids was developed for the metabolic engineering
  of the mevalonate (MVA) pathway in *Escherichia coli* to improve isoprenoid production.
  The dataset includes various expression constructs containing MVA pathway genes
  from *Saccharomyces cerevisiae*, featuring codon-optimized variants, multi-gene
  operons, and site-directed mutations in phosphomevalonate decarboxylase (PMD) to
  enhance enzyme function.
