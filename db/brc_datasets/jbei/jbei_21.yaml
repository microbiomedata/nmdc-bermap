description: This dataset contains five plasmids designed for synthetic biology and
  metabolic engineering. The collection features the pJM1 broad host range plasmid
  backbone, which is compatible with IncP and IncQ origins of replication. A key construct,
  pJM-pBAD-RFP, provides a tool for controlled gene expression using an arabinose-inducible
  promoter and a red fluorescent protein reporter.
