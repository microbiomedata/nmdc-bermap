description: This dataset provides 37 plasmids centered on the "Jungle Express" system,
  a set of broad-host-range vectors for crystal violet-inducible gene expression.
  The collection features a family of EilR-regulated promoters with varying strengths,
  demonstrated through RFP reporter constructs and vectors for expressing specific
  genes like *pleC*. It also includes several standard BioBrick and BglBrick vector
  backbones for general synthetic biology applications.
