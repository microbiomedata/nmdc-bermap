description: This dataset contains 17 expression plasmids designed for the metabolic
  engineering of amorphadiene production in *E. coli*. The constructs, built on a
  pTrc99a backbone, co-express amorphadiene synthase (ADS) with various engineered
  mevalonate pathway operons (MBIS1-8). The plasmid library systematically explores
  pathway optimization by varying the upstream operon and tuning expression levels
  using a library of ribosome binding sites (RBS) with different strengths.
