description: This dataset comprises 54 plasmids designed for the combinatorial biosynthesis
  of polyketides by engineering polyketide synthase (PKS) pathways. The collection
  primarily features the systematic swapping of ketoreductase (KR) domains from diverse
  PKSs into an engineered lipomycin-like synthase (LIPS1) scaffold to alter product
  stereochemistry. Additional constructs explore the exchange of larger multi-domain
  fragments and the assembly of novel PKS modules to generate new polyketide structures
  in a *Streptomyces* expression system.
