description: This dataset provides two plasmids designed for metabolic engineering
  of the mevalonate pathway for the production of isoprenoids. The constructs contain
  genes encoding key pathway enzymes, including MevT, mevalonate kinase (MK), phosphomevalonate
  kinase (PMK), and phosphomevalonate decarboxylase (PMD). One plasmid also incorporates
  the NudB pyrophosphatase, a feature intended to enhance pathway flux and overall
  product yield.
