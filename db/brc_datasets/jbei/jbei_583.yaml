description: This dataset comprises 30 plasmids for engineering the biosynthesis of
  oxygenated terpenes. The collection features a systematic library of fusion proteins
  that link terpene synthases (LS, EizS, CS) to cytochrome P450 monooxygenases (CYP153A6,
  CYP170A1, P450cin) using a series of glycine-serine linkers. The dataset also includes
  corresponding non-fusion controls, individual enzymes, and necessary P450 reductase
  partners for in vivo functional characterization.
