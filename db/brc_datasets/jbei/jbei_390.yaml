description: This dataset from Thompson et al. (2018) contains eight plasmids for
  the construction and validation of whole-cell glutarate biosensors. The collection
  features multiple reporter plasmids designed to detect glutarate, alongside vectors
  for protein purification. A gene knockout (KO) plasmid is also provided, likely
  for engineering the host strain to optimize sensor performance or pathway analysis.
