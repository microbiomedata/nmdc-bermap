description: This dataset contains a set of six plasmids for a dual-inducible duet-expression
  system in *P. putida* and *E. coli*. Based on the pRGPDuo2 vector, the system utilizes
  the orthogonal pTac and ptetR/tetA promoters to achieve independent, tunable expression
  of two genes. The included plasmids demonstrate this functionality by controlling
  the expression of sfGFP and RFP fluorescent reporters.
