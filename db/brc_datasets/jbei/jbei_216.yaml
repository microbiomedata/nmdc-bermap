description: This dataset contains six plasmids for the functional characterization
  of the rice cellulose synthase-like gene *OsCslF6* (Os08g06380). The collection
  includes Gateway entry clones and expression vectors designed to drive *CslF6* expression
  in Arabidopsis using either the constitutive 35S promoter or the vessel-specific
  IRX5 promoter. These constructs were used to investigate the gene's role in cell
  wall biosynthesis, revealing that constitutive expression causes severe growth and
  developmental defects in the heterologous host.
