description: This dataset contains a collection of 122 plasmids designed for the metabolic
  engineering of *E. coli* for amorphadiene production. The collection features a
  large promoter library systematically characterized using a Red Fluorescent Protein
  (RFP) reporter. These promoters were subsequently used to tune the expression of
  amorphadiene synthase (ADS) and upstream mevalonate pathway genes, providing a toolkit
  for optimizing sesquiterpene biosynthesis.
