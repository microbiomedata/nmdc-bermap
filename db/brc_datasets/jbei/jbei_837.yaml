description: This dataset provides a set of five plasmids for advanced plant genetic
  engineering. It features multiplex CRISPR/Cas9 vectors using PcoCAS9 to target the
  RCKT1 and GMT1 genes, enabling efficient genome editing. The collection is completed
  by a Gateway destination vector for plant-based gene expression and two modified
  ampicillin-resistant cloning backbones.
