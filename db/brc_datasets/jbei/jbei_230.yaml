description: This dataset provides a plasmid containing the gene for the terminal
  reductase (R) domain from the MxaA non-ribosomal peptide synthetase (NRPS). This
  domain is a key component of the biosynthetic machinery responsible for producing
  the secondary metabolite myxalamid. The terminal reductase specifically catalyzes
  the final step, the reductive release of the completed natural product from the
  NRPS assembly line.
