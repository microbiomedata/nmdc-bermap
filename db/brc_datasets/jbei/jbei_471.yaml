description: This dataset provides a plasmid for producing the biofuel precursor bisabolene
  in the oleaginous yeast *Rhodosporidium toruloides*. The plasmid contains a bisabolene
  synthase (BIS) gene that has been codon-optimized for efficient expression in this
  non-conventional host. This genetic part enables the metabolic engineering of *R.
  toruloides* for the synthesis of sesquiterpene-based biofuels.
