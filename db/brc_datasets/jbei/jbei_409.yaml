description: This dataset provides 31 expression plasmids containing geranylgeranyl
  reductase (GGR) genes sourced from a phylogenetically diverse set of 25 organisms,
  including extremophilic archaea, bacteria, and a plant. This library was created
  to explore the functional diversity of GGRs, which are key enzymes in isoprenoid
  biosynthesis. The characterization of these enzymes is critical for metabolic engineering
  efforts aimed at producing saturated isoprenoids for advanced biofuels and other
  bioproducts.
