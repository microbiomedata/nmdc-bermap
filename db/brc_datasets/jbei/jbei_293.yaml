description: This dataset provides two plasmids for metabolic engineering and gene
  expression studies in *E. coli*. The primary construct is designed to overexpress
  the Entner-Doudoroff (ED) pathway, containing the `eda` and `edd` genes from *E.
  coli* MG1655. A second plasmid serves as a reporter, featuring a BioBrick-compatible
  Yellow Fluorescent Protein (YFP) regulated by the lacUV5 promoter.
