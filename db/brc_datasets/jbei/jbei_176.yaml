description: This dataset comprises 12 plasmids designed to investigate the `eilA`/`eilR`
  efflux pump system responsible for ionic liquid tolerance in *Enterobacter lignolyticus*.
  The collection includes various constructs of the `eilA` pump, its `eilR` repressor,
  and upstream regulatory regions, including promoter deletions and GFP reporter fusions,
  to characterize the system's genetic regulation and function in conferring EMIM-Cl
  tolerance.
