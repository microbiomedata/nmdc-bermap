description: This dataset comprises 15 plasmids designed for combinatorial biosynthesis
  by engineering polyketide synthase (PKS) modules. The collection focuses on modifying
  the lipomycin (Lip) PKS backbone by swapping reductive loop domains from various
  donor systems, including monensin, nanchangmycin, and aureothin. These engineered
  constructs target specific inter-modular junctions to systematically alter the reduction
  state of the polyketide chain, enabling the generation of novel chemical structures.
