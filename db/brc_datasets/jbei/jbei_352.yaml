description: This dataset provides 10 plasmids for expressing key enzymes involved
  in natural product biosynthesis, with a primary focus on the fluvirucin B2 pathway.
  The plasmids encode essential biosynthetic machinery, including acyl transferases,
  adenylation domains, and acyl carrier proteins responsible for precursor selection
  and loading. The collection also includes homologous enzymes from the vicenistatin
  and sceliphrolactam biosynthetic pathways, enabling comparative functional studies.
