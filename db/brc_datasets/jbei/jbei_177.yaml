description: This dataset provides six expression plasmids for studying the Yersiniabactin
  Polyketide Synthase (PKS). The collection includes the PKS gene and several variants
  containing single and multiple point mutations (H640A, S641A, H741A) targeting conserved
  residues in the Acyltransferase (AT) domain. These constructs were created to probe
  the roles of key catalytic residues in the biosynthesis of the siderophore yersiniabactin.
