description: This dataset provides four plasmids for the metabolic engineering of
  *Corynebacterium glutamicum* to produce isopropanol. It features an expression plasmid,
  pECXK99E-AKIP-bypass, which introduces a synthetic pathway to convert acetyl-CoA
  to isopropanol. The collection also includes deletion cassettes for the `ldhA`,
  `poxB`, and `idsA` genes, designed to block competing metabolic pathways and improve
  product yield.
