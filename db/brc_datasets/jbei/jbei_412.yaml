description: This dataset contains 13 plasmids for studying and engineering polyketide
  synthase (PKS) dehydratase (DH) domains. The collection features wild-type DH domains
  from the DEBS, Borrelidin, and Fluvirucin synthases, alongside chimeric versions
  created through "loop swapping" to alter function. It also includes an inactivated
  DH mutant created via site-directed mutagenesis and a set of *Streptomyces* expression
  vectors.
