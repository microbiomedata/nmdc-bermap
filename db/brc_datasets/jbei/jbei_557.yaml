description: This dataset contains four plasmids designed for the combinatorial biosynthesis
  of polyketides by engineering polyketide synthase (PKS) assembly lines. The constructs
  enable the creation of novel polyketides through strategies such as building hybrid
  modules from the lipomycin and nanchangmycin pathways. Key modifications include
  an acyltransferase (AT) domain swap from the borrelidin synthase to alter substrate
  specificity and a ketoreductase (KR) domain knockout to control the polyketide's
  reduction state.
