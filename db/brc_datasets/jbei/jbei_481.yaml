description: This dataset contains a plasmid with a bisabolene synthase (BIS) gene,
  codon-optimized for expression in the oleaginous yeast *Rhodosporidium toruloides*.
  The plasmid is designed to engineer this host for the microbial production of bisabolene,
  a sesquiterpene with applications as a potential biofuel. This genetic tool enables
  the heterologous production of a valuable bioproduct in a non-conventional yeast
  platform.
