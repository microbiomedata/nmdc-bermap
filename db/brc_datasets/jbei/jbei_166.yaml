description: This dataset comprises 45 plasmids designed for biosensor-based metabolic
  engineering and directed evolution. The collection features a variety of transcription
  factor-based sensors for aromatic amino acid and isoprenoid pathway metabolites,
  coupled to fluorescent reporters like RFP and YFP. Key constructs incorporate the
  `mutD`/`mutD5` gene to enable continuous *in vivo* evolution of biosynthetic pathways
  in both *E. coli* and yeast.
