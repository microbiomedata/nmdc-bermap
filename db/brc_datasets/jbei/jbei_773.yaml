description: This dataset provides 23 plasmids for engineering the 6-deoxyerythronolide
  B synthase (DEBS) polyketide synthase. The collection features a series of constructs
  for swapping the acyltransferase (AT) domain of DEBS Module 6 with various heterologous
  ATs to alter substrate specificity. Additional plasmids introduce point mutations
  into the ketosynthase (KS) domain or modify the MatB transacylase, providing a toolkit
  for studying PKS function and producing novel polyketides.
