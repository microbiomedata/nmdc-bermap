description: This dataset contains 39 all-in-one CRISPR-Cas9 plasmids designed for
  genome editing in the oleaginous yeast *Rhodosporidium toruloides*. The collection
  was developed to systematically optimize sgRNA expression by testing various RNA
  polymerase III promoters from different yeast species. These plasmids target the
  endogenous *URA3* and *CAR2* genes and explore different sgRNA processing strategies,
  including the use of flanking ribozymes.
