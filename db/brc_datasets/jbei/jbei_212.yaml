description: This dataset provides two expression plasmids for biocatalytic enzymes
  relevant to synthetic biology and bioenergy applications. The first plasmid encodes
  Benzaldehyde Lyase, a carboligase for carbon-carbon bond formation, in a pET 29
  vector. The second plasmid contains an engineered formolase variant (L90T) that
  catalyzes the conversion of formaldehyde into a C3 sugar, a key reaction for valorizing
  C1 feedstocks.
