description: This dataset comprises 17 plasmids designed for the metabolic engineering
  of fatty acid pathways in *E. coli*. The collection features a variety of 3-ketoacyl-ACP
  reductase (fabG) orthologs from diverse bacterial sources, intended for screening
  enzyme performance. Key constructs combine thioesterase ('tesA) and fatty acid degradation
  enzymes (fadM) to enable the production of valuable biochemicals, such as methyl
  ketones and beta-ketoacyl CoA.
