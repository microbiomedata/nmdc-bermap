description: This dataset provides expression plasmids for the functional and structural
  characterization of the BorB type II thioesterase from the borrelidin biosynthetic
  pathway. The collection includes constructs for wild-type BorB, an S96A point mutant,
  and chimeras with swapped lid loops from heterologous thioesterases to investigate
  enzyme mechanism. A plasmid for expressing the partner acyl carrier protein, ACP5,
  is also included.
