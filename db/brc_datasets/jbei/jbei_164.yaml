description: This dataset provides three expression plasmids for the production and
  purification of the polyketide synthase LipPks1 from *Lipomyces starkeyi*. The constructs
  were designed to investigate the function of the C-terminal thioesterase (TE) domain
  by enabling comparison of the full-length enzyme against a TE-truncated version.
  A third plasmid variant allows for the study of a modified linker region, facilitating
  detailed biochemical characterization of this lipid-producing enzyme.
