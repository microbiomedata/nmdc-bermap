description: This dataset contains two conjugation plasmids designed for targeted
  genetic modification of the bacterium *Pseudomonas putida* KT2440. The plasmids
  target the *emrE* and *PP_5350* genes, respectively, both of which encode for efflux
  pumps. These genetic tools can be used to investigate or engineer cellular transport
  and tolerance mechanisms in this industrially relevant microbial chassis.
