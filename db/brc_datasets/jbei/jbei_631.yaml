description: This dataset contains a collection of 28 plasmids constituting a versatile
  toolkit for tunable gene regulation in *E. coli* and *P. putida*. The plasmids include
  a dual-inducible CRISPR interference (CRISPRi) system targeting key metabolic and
  essential genes, as well as a series of 'duet' expression vectors. These tools utilize
  various inducible promoters (pBAD, pTac, pTet) and are characterized with sfGFP
  and RFP reporters, enabling sophisticated control for synthetic biology and metabolic
  engineering.
