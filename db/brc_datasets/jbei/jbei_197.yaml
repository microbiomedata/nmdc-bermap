description: This dataset of 54 plasmids documents the engineering of isopentenol
  tolerance in *E. coli*. The collection primarily consists of a library of plasmids
  for overexpressing individual stress response genes, highlighting a final, refined
  set of eight genes that most effectively confer tolerance, including *yqhD*, *soxS*,
  and *ibpA*. The dataset also contains constructs for engineering the mevalonate
  production pathway and general-purpose expression vectors.
