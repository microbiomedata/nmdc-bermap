description: This collection comprises 34 plasmids for genome engineering in *Saccharomyces
  cerevisiae*, primarily for metabolic engineering of the mevalonate pathway. The
  dataset includes plasmids for integrating key pathway genes (e.g., `ERG12`, `mvaS`,
  `crtE`) and a large suite of all-in-one CRISPR/Cas9 vectors. These CRISPR plasmids
  contain guide RNAs targeting a wide array of genomic loci, providing a versatile
  toolkit for targeted gene integration across the yeast genome.
