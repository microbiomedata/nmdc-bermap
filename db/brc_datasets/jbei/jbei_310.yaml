description: 'This dataset provides four expression vectors designed to enhance fatty
  acid biosynthesis for biofuel applications. The plasmids enable the expression of
  thioesterase A (tesA) from *M. marinum* and the biotin synthesis gene (bioC) from
  three diverse bacterial sources: *Kurthia* sp., *B. cereus*, and *P. putida*. These
  genes are key targets for metabolic engineering, as tesA is involved in terminating
  fatty acid synthesis and bioC increases the availability of the essential cofactor
  biotin.'
