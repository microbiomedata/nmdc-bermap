description: This dataset contains 58 dual-reporter plasmids designed to screen for
  and characterize the activity of putative promoter elements. The plasmids incorporate
  various intergenic and upstream genomic regions, with most cloned in both forward
  (FW) and reverse (RV) orientations to systematically test for bidirectional promoter
  function. The collection includes a known GAPDH promoter as a control, enabling
  a comprehensive analysis of gene regulation.
