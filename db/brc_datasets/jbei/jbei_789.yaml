description: This dataset contains 16 plasmids for engineering polyketide biosynthesis,
  with a primary focus on the LipPKS/LipM1+DEBSM6TE hybrid polyketide synthase. The
  collection includes codon-optimized and wildtype gene variants, a methylmalonyl-CoA
  precursor pathway from *Sorangium cellulosum*, and various vectors for controlled
  expression and genomic integration. These tools include salicylate-inducible systems,
  knock-in plasmids, and BxB1/MR11 integration vectors for host engineering.
