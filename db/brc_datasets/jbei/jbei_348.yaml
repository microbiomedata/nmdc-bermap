description: This dataset contains four expression plasmids developed to characterize
  the PhdA and PhdB subunits of a novel dehydratase enzyme from a sewage metagenome.
  The vectors are designed for heterologous protein expression and purification, featuring
  N-terminal His6 and MBP tags. The collection includes constructs for expressing
  the codon-optimized wild-type proteins as well as a site-directed mutant of PhdB
  (G815A) for functional analysis.
