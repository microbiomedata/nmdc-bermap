description: This dataset contains 13 plasmids for the metabolic engineering of *Pseudomonas
  putida* for lysine-related studies. The collection includes constructs for creating
  targeted gene knockouts, such as for loci PP_2088 and PP_2910, to manipulate metabolic
  pathways. Additionally, it provides vectors designed for the purification and characterization
  of key biosynthetic enzymes.
