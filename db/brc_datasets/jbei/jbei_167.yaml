description: This dataset provides expression plasmids for producing key enzymes of
  the mevalonate pathway, Mevalonate Kinase (MK) and Phosphomevalonate Kinase (PMK),
  in *E. coli*. The collection features codon-optimized genes cloned into pET expression
  vectors, incorporating His-tags for simplified protein purification. These constructs
  are designed for engineering isoprenoid biosynthesis, a critical metabolic route
  for producing advanced biofuels and other bioproducts.
