- title: 'Bi, C., Su, P., Müller, J., Yeh, Y.C., Chhabra, S.R., Beller, H.R., Singer,
    S.W., and Hillson, N.J. (2013) Development of a broad-host synthetic biology toolbox
    for ralstonia eutropha and its application to engineering hydrocarbon biofuel
    production. Microbial Cell Factories 12:107. DOI: 10.1186/1475-2859-12-107.'
