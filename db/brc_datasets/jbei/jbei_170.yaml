description: This dataset contains a replicative plasmid designed for the heterologous
  production of the biofuel precursor bisabolene in *Streptomyces*. The pUWL-oriT
  derivative vector utilizes the strong, constitutive ermE* promoter to drive high-level
  expression of a bisabolene synthase gene. This construct is a tool for the metabolic
  engineering of *Streptomyces* for advanced biofuel synthesis.
