  description: The pETBlue vectors are designed to identify recombinants by traditional
    blue/white screening while also allowing T7lac promoter based expression of target
    genes. Screening is independent of expression because the T7lac expression promoter
    is in an opposed orientation relative to the E. coli promoter that mediates blue/white
    screening. The EcoR V cloning site is appropriately spaced down- stream of an
    E. coli ribosome binding site.
  selection_markers:
