description: This dataset comprises 29 plasmids designed for systematically tuning
  gene expression in *E. coli* and yeast. It features a combinatorial library of promoters
  and bicistronic design (BCD) elements controlling GFP expression, enabling a graduated
  range of protein production levels. The collection also contains constructs for
  metabolic engineering, including components of the mevalonate pathway, for bioenergy
  and bioproduct applications.
