description: This collection of 23 plasmids was developed for the metabolic engineering
  of isoprenoid production in *E. coli*. The constructs focus on optimizing the native
  MEP pathway through protein fusions and mutant enzymes, including a novel DXP-producing
  RibB variant. The dataset also contains plasmids for expressing the heterologous
  mevalonate (MVA) pathway and the final product enzyme, amorphadiene synthase, to
  enable terpenoid synthesis.
