description: This dataset contains two plasmids engineered for the microbial biosynthesis
  of sesquiterpenes, valuable biofuel precursors. The first plasmid features a dynamic
  regulatory system, utilizing an FPP-responsive `rstA` promoter to control a codon-optimized
  β-isocomene synthase. The second plasmid enables the production of epi-isozizaene
  by expressing the corresponding synthase (EIZS) from *Streptomyces coelicolor* in
  a pTrc99a backbone.
