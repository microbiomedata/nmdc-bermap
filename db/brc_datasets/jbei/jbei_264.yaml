description: This dataset provides four plasmids designed to investigate the function
  and localization of the *Arabidopsis thaliana* gene PAGR (At3g26370). The collection
  includes constructs for expressing PAGR as C-terminal fusions with YFP and CFP fluorescent
  proteins for subcellular localization studies. It also contains a silencing vector
  for functional analysis via knockdown in *Nicotiana benthamiana* and the corresponding
  pENTR cloning intermediate.
