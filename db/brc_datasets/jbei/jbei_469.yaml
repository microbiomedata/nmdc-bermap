description: This dataset provides 11 plasmids for the construction and characterization
  of a lactam biosensor system. The collection features multiple plasmids encoding
  the lactam sensor components. It also includes expression plasmids for an Acyl-CoA
  ligase (ORF26 homolog) responsible for lactam synthesis, which is engineered with
  a C-terminal His-tag.
