description: This dataset contains 16 plasmids created to investigate the engineering
  of polyketide synthases (PKSs). The collection focuses on swapping acyltransferase
  (AT) domains in the LipPks1 and DEBS Module 6 systems to alter substrate specificity
  and generate novel polyketides. It also includes variants that systematically test
  the effect of different docking domain boundaries on chimeric PKS function and the
  impact of ketoreductase (KR) domain inactivation.
