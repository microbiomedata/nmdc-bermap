description: This collection of 17 plasmids documents the engineering of the Borrelidin
  Polyketide Synthase (PKS) extension module, BorA2. The constructs feature systematic
  domain swaps to explore PKS modularity, including the exchange of reductive loops
  from four different synthases and the replacement of the native dehydratase (DH)
  domain. These modifications aim to alter the catalytic function of the module for
  producing novel bioactive compounds.
