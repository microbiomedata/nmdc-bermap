description: This collection comprises 11 plasmids designed for CRISPR-based genome
  engineering in *Pseudomonas*. The vectors utilize both active Cpf1 (aCpf1) for targeted
  gene knockouts and deactivated Cpf1 (dCpf1) for multiplexed CRISPR interference
  (CRISPRi). The set includes tools for metabolic engineering, featuring plasmids
  for indigoidine production and a growth-coupled design for synthesizing p-coumaric
  acid (pCA).
