description: This dataset provides a collection of plasmids for the metabolic engineering
  of *E. coli* to produce bisabolene. It features a modular set of KIKO vectors for
  the stable chromosomal integration of the complete mevalonate pathway. The collection
  also includes a plasmid containing a bisabolene synthase driven by an FPP-responsive
  promoter and a vector for engineering sucrose utilization.
