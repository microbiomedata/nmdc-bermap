plasmid_features:
- backbone: pMev_AtoB-mvaS-mvaA
  promoters:
  - PLacUV5
  description: A plasmid that has mevalonate top pathway genes (AtoB, mvaS, and mvaA)
    under lacUV5 promoter in p15a ori. Resistance marker is Kanamycin
  selection_markers:
  - Kan
- backbone: pPIACE_Sp_GFP
  promoters: []
  description: PIACE_Sp_GFP plasmid which can only propagate in S17 strain has R6K
    ori and is constructed for the chromosomal integration into DH1 cells. It has
    GFP under LacUV5 promoter and Spectinomycin resistance marker
  selection_markers:
  - spectinomycin
- backbone: pPIACE_Cm_PMK-MK
  promoters: []
  description: DH10B
  selection_markers:
  - Chloremphenicol
- backbone: pPIACE_Cm_RFP
  promoters: []
  description: This plasmid contains RFP under the control of lacUV5 promoter and
    Chloremphenicol marker. It has R6K vector backbone which can't be propagated into
    DH1 cells. This plasmid is generated for chromosomal integration at intA site
    in Ecoli DH1
  selection_markers:
  - Cm
- backbone: pPIACE_Gent_AtoB-mvaS-mvaA
  promoters: []
  description: PIR strain for plasmid replication.
  selection_markers:
  - Kan, Gent
- backbone: pPIACE_Sp_NudB-PMD
  promoters: []
  description: DH10B
  selection_markers:
  - Spectinomycin
- backbone: pCICHE_Spec_GFP
  promoters: []
  description: A plasmid containing CICHE_Spec with GFP gene for integration at fdhF
    locus in E.coli chromosome
  selection_markers:
  - Amp
  - Spectinomycin
- ori: p15A
  backbone: pMTSA
  promoters:
  - lacUV5
  description: A plasmid that includes upper portion of mevalonate pathway with HMGR
    gene from Staphylococcus aureus.
  selection_markers:
  - Chloramphenicol
- backbone: pKWG0012
  promoters: []
  description: 'Golden Gate assembly - Control #2.  No ribozyme.  PMK (CO, fixed)
    followed by MK (CO).'
  selection_markers: []
- backbone: pREDI2RecA
  promoters: []
  description: pREDI2RecA is a curable plasmid which bears lamba-red integration system
    as well as RecA under the control of rhamnose inducible promoter which eliminates
    the need for deleting RecA post integration
  selection_markers: []
- ori: RK2
  backbone: pCM62-Prha-T7SL-RFP
  promoters:
  - rhamnose
  description: The pCM62 backbone contains the modified, minimal replication region
    from the broad host range (low copy) RK2 (IncP) replicon.  pCM62-Prha-T7SL-RFP
    contains the rhamnose promoter from pREDI in front of RFP as well a mRNA leader
    sequence from T7 phage that creates a 5' stem-loop stabilizing the mRNA transcript
    and increasing expression.
  selection_markers:
  - Tetracycline
- ori: oriR101
  backbone: pKD46
  promoters:
  - Arabinose
  description: Plasmid used for the generation of knockout insertions using PCR products
    by the lambda red recombination pathway.
  selection_markers:
  - Ampicillin
- ori: R6K
  backbone: pAH143
  promoters: []
  description: ''
  selection_markers:
  - Gentamicin
- ori: pSC101ts
  backbone: pREDI
  promoters:
  - Arabinose
  - Rhamnose
  description: A plasmid bearing the lambda-red recombinase system under the control
    of arabinose, and the I-SceI endonuclease under the control of rhamnose. The origin
    is temperature-senstive, allowing for temperature-curing of the plasmid.
  selection_markers:
  - Ampicillin
- backbone: pTrc99A-NudB-PMD
  promoters: []
  description: PMD cloned downstream of Howard's NudB construct
  selection_markers:
  - Carb
- ori: pMB1, RK2
  backbone: pMCS-4
  promoters: []
  description: A plasmid bearing the Gentamycin resistance gene aacC1. Used for integrating
    DNA into the chromosome of Caulobacter crescentus, but replicates in E. coli.
  selection_markers:
  - Gentamicin
  - aacCI
- ori: p15A
  backbone: pBbA5k-RFP
  promoters:
  - lacUV5
  description: BioBrick Berkeley formatted expression vector
  selection_markers:
  - Kanamycin
- ori: ColE1
  backbone: pBbE5c-RFP
  promoters:
  - lacUV5
  description: BioBrick Berkeley formatted expression vector
  selection_markers:
  - Chloramphenicol
