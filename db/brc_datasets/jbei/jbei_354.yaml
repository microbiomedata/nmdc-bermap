description: This dataset provides a collection of plasmids and bacterial strains
  for advanced genetic engineering and metabolic pathway construction in *E. coli*.
  The materials are designed for applications such as expressing mevalonate pathway
  genes for isoprenoid synthesis and performing chromosomal integration. Key molecular
  tools include lambda-red recombination systems, various inducible promoters (lacUV5,
  rhamnose), multiple antibiotic resistance markers, and fluorescent reporters (GFP,
  RFP).
