description: This dataset provides seven E. coli plasmids for studying and engineering
  cellular physiology, with a focus on membrane composition and stress response. The
  plasmids enable the synthesis of branched-chain and unsaturated fatty acids, expression
  of the cytochrome oxidase cyoABCD, and fluorescent monitoring of the heat shock
  response. Additional plasmids allow for visualizing the localization of the AcrB
  efflux pump and the periplasmic protein MBP.
