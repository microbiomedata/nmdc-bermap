description: This dataset contains 12 plasmids for the metabolic engineering of isoprenoid
  production in *E. coli*. The plasmids feature various configurations of the mevalonate
  (Mev) pathway, utilizing strategies such as codon optimization, BioBrick assembly,
  and different operon structures. Key constructs include synthases from *Mentha spicata*
  and *Abies grandis* for the targeted production of the valuable terpenoids limonene
  and bisabolene.
