description: This collection contains 16 plasmids designed for the metabolic engineering
  of the phenylpropanoid pathway in yeast. The dataset features Gateway-compatible
  and pDRf1-based vectors for the constitutive expression of key biosynthetic enzymes,
  including various transferases (HCT, HQT), lyases (TAL), and ligases (4CL). These
  constructs carry genes from diverse plant and microbial sources and are intended
  for modifying lignin-related metabolic pathways.
