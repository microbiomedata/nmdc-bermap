description: This dataset provides two plasmids for constructing a novel one-carbon
  (C1) assimilation pathway. One plasmid contains the complete pathway driven by a
  pTrc promoter for controlled expression. The other plasmid encodes a formolase enzyme
  with an L90T mutation, a key component engineered for efficient C1 conversion. These
  constructs are designed for engineering a microbial host to utilize C1 feedstocks.
