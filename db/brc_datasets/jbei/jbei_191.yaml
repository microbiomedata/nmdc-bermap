plasmid_features:
- ori: pBR322
  backbone: pPhatty-W2
  promoters:
  - lacUV5
  description: leaderless 'TesA, bFabH2, and the Bkd operon cloned into B5K as a single
    operon. FadR constitutively expressed under Kanr promoter. Allows for production
    of branched fatty acids in E.coli.
  selection_markers:
  - Kanamycin
- ori: BBR
  backbone: pHatty
  promoters:
  - lacUV5
  description: B5K with lTesa in BB site, and fadR under the control of the KanR promoter
  selection_markers:
  - Kan
- ori: pSC101
  backbone: pCS49
  promoters:
  - lacO1
  description: Gift from the lab of Prof. James C. Liao. Expresses the threonine biosynthetic
    operon ThrABC using lacO1 promoter.
  selection_markers: []
- ori: colE1
  backbone: pIlvGMCDA
  promoters:
  - LacO1
  description: Expresses the genes IlvGMCDA as a single operon. IlvG and is from S.
    typhimurium, IlvA from C. glutamicum. For prodcution of anteiso-branched fatty
    acids in E.coli
  selection_markers:
  - Ampicillin
- ori: p15A
  backbone: pIlvC.28utr-bFabH2-p15a
  promoters:
  - pIlvC.28utr
  description: bFabH2 expression dynamically regulated by pIlvC.28utr. Promoter is
    the native promoter for the gene ilvC up to the RBS, then the same as pET28 from
    the RBS to the start codon of bFabH2. Expression is induced by acetohydroxy acids,
    intermediates in isoleucine and valine biosynthesis.
  selection_markers:
  - Chlorampenicol
- ori: BR332
  backbone: pPhatty bkd
  promoters:
  - LacUV5
  description: '''TesA and the four genes of the B. subtilis bkd operon driven by
    lacUV5 as a single operon. FadR constitutively expressed in an operon with kan
    marker.'
  selection_markers:
  - kanamycin
- ori: BR322
  backbone: pPhatty.W1
  promoters:
  - LacUV5
  description: Plasmid encoding 'tesA, bFabH1, and the four genes of the B. subtilis
    bkd operon. Expressed as a single operon.
  selection_markers:
  - kanamycin
- ori: p15A
  backbone: pBbA5c-RFP
  promoters:
  - lacUV5
  description: BioBrick Berkeley formatted expression vector
  selection_markers:
  - Chloramphenicol
