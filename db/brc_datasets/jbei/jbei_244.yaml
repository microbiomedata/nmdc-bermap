description: This dataset provides a collection of 120 plasmids designed for plant
  synthetic biology using a Golden Gate modular cloning framework. The library contains
  a comprehensive toolkit of genetic parts, including promoters, coding sequences,
  and terminators, primarily from *Arabidopsis thaliana*. These components are involved
  in diverse biological processes such as nutrient transport, cell wall biosynthesis,
  and metabolic engineering, facilitating the rapid construction of complex genetic
  circuits for expression in plants.
