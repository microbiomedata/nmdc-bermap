description: This dataset contains plasmids for cloning and expressing the *Sorghum
  bicolor* Caffeic acid O-methyltransferase (COMT, Sb07g003860), a key enzyme in the
  lignin biosynthesis pathway. The collection includes a Gateway entry clone of *SbCOMT*
  in pDONR221 and an expression vector for producing a His-tagged version of the protein.
  These resources enable the functional characterization of a critical gene for improving
  biomass properties for bioenergy.
