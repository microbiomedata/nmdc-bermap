description: This dataset provides four pFILB expression plasmids containing cellulolytic
  enzyme genes from the thermophilic bacterium *Thermobispora bispora* DSM 43833.
  The collection enables the study of cellulose hydrolysis by providing genes for
  a cellobiosidase (GH6 exo) and various endoglucanases (GH6 endo, GH12, GH48). These
  plasmids serve as genetic tools for expressing and characterizing key enzymes for
  biomass deconstruction.
