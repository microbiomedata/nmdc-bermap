description: This dataset comprises a collection of 461 plasmids designed for studying
  and engineering gene regulatory networks in plants. The constructs include binary
  vectors for the constitutive overexpression of *Arabidopsis thaliana* transcription
  factors and for reporter gene assays using native and synthetic promoters. A key
  feature of this collection is the inclusion of advanced tools for CRISPR-based transcriptional
  activation, utilizing dCas9-effector fusions to target specific promoters.
