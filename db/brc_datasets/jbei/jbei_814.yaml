description: The Thompson et al 2023 dataset provides a comprehensive toolkit of 222
  plasmids for studying and engineering *Agrobacterium tumefaciens* virulence. This
  collection enables functional genomics through a large set of vectors designed for
  the systematic knockout and expression of key virulence (vir) genes. The dataset
  also includes modular cloning vectors for construct assembly and a binary vector
  for assessing agrobacterium-mediated plant transformation.
