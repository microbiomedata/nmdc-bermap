description: This dataset comprises 67 plasmids developed for metabolic engineering
  and synthetic biology applications in broad-host-range bacteria. The collection
  features constructs for the combinatorial assembly and optimization of a multi-enzyme
  biosynthetic pathway involving DDGS, OMT, ATP grasp ligase, and NRPS components.
  It also includes an inducible CRISPRi system for targeted gene knockdown and a toolkit
  of reporter plasmids with varied promoters and ribosome binding sites for characterizing
  gene expression control.
