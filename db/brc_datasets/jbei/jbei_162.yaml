description: This dataset provides three plasmids for the heterologous expression
  of the Borrelidin biosynthesis pathway in *E. coli*. The plasmids contain *E. coli*
  codon-optimized genes from *Streptomyces parvulus* encoding key components of the
  Borrelidin polyketide synthase (PKS). These components include the loading module's
  acyl carrier protein (ACP) and the first two extension modules (BorA1 and BorA2),
  which are essential for initiating the assembly of this polyketide natural product.
