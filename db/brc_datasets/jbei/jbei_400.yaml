description: This dataset contains a single plasmid construct designed for the constitutive
  RNAi-mediated silencing of the GONST3 gene. The construct, built on the pHellsgate12
  vector, targets a putative Golgi-localized nucleotide sugar transporter (GONST).
  This reagent is intended for functional studies investigating the role of GONST3
  in plant cell wall biosynthesis.
