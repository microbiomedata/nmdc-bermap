description: This dataset comprises nine plasmids for engineering fatty acid metabolism
  and producing advanced biofuels. The collection centers on the expression of diverse,
  large type I fatty acid synthases (FAS) from various bacterial sources, including
  *Corynebacterium glutamicum* and *Nocardia farcinica*. These plasmids enable the
  construction of synthetic pathways for producing intermediates like acyl-CoAs and
  final products such as methyl ketones.
