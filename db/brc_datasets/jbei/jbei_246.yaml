description: This dataset provides two expression plasmids designed to optimize the
  mevalonate (MVA) pathway for isoprenoid biosynthesis. The constructs express key
  MVA pathway enzymes (MevTsa, MK, PMK, PMD) and feature the recombinant nudix hydrolase
  rNudB to improve metabolic flux by degrading inhibitory pyrophosphate intermediates.
  One plasmid, pTrc99a-rNudB-PMD, is a modified construct derived from the JBEI-4087
  vector.
