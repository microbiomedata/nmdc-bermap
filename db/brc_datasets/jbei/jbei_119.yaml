description: This dataset provides four expression plasmids for studying natural product
  biosynthesis, with a focus on the yersiniabactin pathway. The collection includes
  constructs to express a standalone adenylation domain, the first non-ribosomal peptide
  synthetase (NRPS), and a polyketide synthase (PKS) fragment from the yersiniabactin
  cluster. A fourth plasmid expresses the epothilone M8 PKS, enabling the functional
  characterization of key enzymes in siderophore and polyketide synthesis.
