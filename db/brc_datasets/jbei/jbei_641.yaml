description: This dataset provides a collection of six plasmids for gene knockout
  (KO) studies from Thompson et al. (2020). The set includes five distinct constructs
  designed for targeted gene disruption and the corresponding empty KO vector. These
  genetic tools are suitable for functional genomics and genetic engineering to investigate
  the role of specific genes.
