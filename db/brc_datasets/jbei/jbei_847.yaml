description: This dataset contains 93 plasmids designed to investigate the function
  of broad-host-range origins of replication (ORIs), specifically pVS1, pSa, RK2,
  and BBR1. The collection features a systematic library of wild-type and mutant ORI-associated
  proteins to assess the impact of specific amino acid changes on plasmid copy number.
  These plasmids are constructed as binary vectors containing fluorescent reporters
  (eGFP, sfGFP) or as selection vectors for use in quantitative assays.
