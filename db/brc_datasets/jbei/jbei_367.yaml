description: This dataset provides a collection of 12 Gateway-compatible plasmids
  designed for the metabolic engineering of plant lignocellulosic pathways. The vectors
  include entry clones and expression constructs containing genes such as `aroG`,
  `nahG`, and `catA` for modifying aromatic compound metabolism. Key constructs utilize
  cell wall-specific promoters like `pIRX5` and `pIRX8` and feature plastid-targeting
  signals to compartmentalize the engineered enzymes.
