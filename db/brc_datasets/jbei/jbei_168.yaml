description: This dataset provides 41 expression plasmids created to investigate the
  structure-function relationships of geranylgeranyl reductase from *Sulfolobus acidocaldarius*
  (SaGGR). The collection features an extensive library of SaGGR variants with single
  and double amino acid substitutions generated via site-directed mutagenesis. Most
  constructs are in a pSKB3 vector and encode N-terminally His-tagged proteins, facilitating
  studies of this key enzyme in isoprenoid biosynthesis.
