description: This dataset provides four *E. coli* expression plasmids for studying
  the thermostable cellulase Cel5A from *Thermotoga maritima*. The collection includes
  constructs for the wild-type enzyme, as well as single (H138R, N236D) and double
  (H138R N236D) mutants designed to investigate structure-function relationships.
  Each pFIL-B vector adds a C-terminal TEV cleavage site, Strep-tag, and 6xHis-tag
  to facilitate protein purification.
