description: This dataset provides a Level 1 expression plasmid, pPMS028, designed
  for metabolic engineering in bioenergy research. The plasmid contains a single transcriptional
  unit to express the qsuB gene from the yeast *Scheffersomyces lignosus*, a putative
  sugar transporter critical for substrate utilization. Expression of the qsuB coding
  sequence is driven by the pBE5 promoter and terminated by the tNOS terminator, and
  the backbone includes a kanamycin resistance marker for selection.
