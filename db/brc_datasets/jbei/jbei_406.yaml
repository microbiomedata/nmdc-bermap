description: This dataset provides plasmids for expressing and engineering components
  of the Borrelidin polyketide synthase (PKS) in *E. coli*. The collection features
  codon-optimized PKS modules (BorA4, BorA5) and a chimeric module created by swapping
  an acyltransferase (AT) domain from the Epothilone pathway. Essential accessory
  plasmids for PKS activation (Sfp phosphopantetheinyl transferase) and protein purification
  (TEV protease) are also included, supporting the study of PKS function and biosynthetic
  engineering.
