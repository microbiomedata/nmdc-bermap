description: This collection of 97 plasmids was created to identify and characterize
  genes involved in the biosynthesis of ladderane lipids. The set includes constructs
  for the synthesis of candidate genes, the expression of individual proteins for
  biochemical analysis, and the assembly of multi-gene operons to reconstitute the
  pathway. Key plasmids were also designed for in vivo functional characterization,
  such as testing for desaturase activity in a lycopene-producing host.
