description: This dataset provides baculovirus expression vectors for producing a
  secreted fusion protein. The constructs encode the extracellular domain of the rice
  receptor-like kinase OsSERK2 (residues 32-173) fused to a hagfish VLR B.61 domain,
  likely to enhance expression or solubility. This design, which includes dual Strep-Tactin
  II and 6xHis tags, facilitates the purification of the OsSERK2 fragment for structural
  or functional studies.
