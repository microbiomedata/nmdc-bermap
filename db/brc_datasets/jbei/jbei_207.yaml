description: This dataset contains plasmids for studying *OsIRX10*, a rice gene involved
  in xylan biosynthesis and secondary cell wall development. The constructs include
  the *OsIRX10* gene with its native promoter in a binary vector for plant transformation,
  and a coding sequence without a stop codon for generating fusion proteins. These
  resources enable the functional characterization of *OsIRX10* in planta and its
  use in protein studies.
