description: This dataset contains seven plasmid constructs designed to investigate
  the signaling pathway of the rice receptor kinase Xa21 and its co-receptor OsSERK2.
  The collection features catalytically inactive mutants, tagged protein domains,
  and full-length proteins in various vectors for studying protein-protein interactions,
  kinase function, and gene silencing. These constructs are suitable for use in protein
  pull-down assays, yeast two-hybrid systems, and RNAi-based functional analysis in
  plants.
