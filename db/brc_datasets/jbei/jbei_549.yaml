description: This collection of five plasmids provides tools for plant genome engineering
  and expression studies. The dataset features a CRISPR/Cas9 system, including a vector
  with a specific gRNA (PTC_gRNA) and a corresponding non-targeting gRNA control for
  precise gene editing. The plasmids also utilize multiple fluorescent reporters (GFP,
  RFP, DsRed) and selection markers for monitoring transformation and gene expression.
