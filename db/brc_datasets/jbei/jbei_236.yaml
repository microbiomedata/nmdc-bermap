description: This dataset provides a toolkit of 20 plasmids for inducible gene expression
  in plants, focused on studying plant-pathogen interactions. The collection contains
  Gateway-compatible entry and expression vectors designed to express and secrete
  various tagged proteins, including the pathogen effectors AvrBs2 and ATR1. The expression
  system is controlled by a dexamethasone-inducible GVG-UAS system, and final constructs
  include a DsRed fluorescent marker for easy identification of transformed plant
  tissue.
