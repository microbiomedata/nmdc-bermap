description: This dataset contains a single plasmid designed for constitutive gene
  expression in rice. The vector expresses the rice immune receptor XA21 as a fusion
  protein with a nuclear localization signal (nls) and a soluble-modified green fluorescent
  protein (smGFP) tag. Driven by the strong maize ubiquitin promoter, this construct
  is intended for visualizing the subcellular localization and function of the XA21
  protein within the nucleus.
