description: This dataset contains three plasmids that constitute a fluorescent reporter
  system designed to characterize the interaction between the ChnR transcription factor
  and the *Acinetobacter sp. chnB* promoter (Pb). The system utilizes a plasmid for
  arabinose-inducible expression of ChnR, which in turn activates a reporter plasmid
  where the Pb promoter drives expression of the mCherry fluorescent protein. This
  enables the quantitative study of this specific regulatory interaction.
