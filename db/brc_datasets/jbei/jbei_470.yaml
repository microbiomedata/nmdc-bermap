plasmid_features:
- backbone: pFC330
  promoters: []
  description: 'Plasmid used to express Cas9 into Aspergillus Niger, using the PyrG
    fungal marker.

    Plasmid containing Cas9 cassette codon optimized for Aspergillus niger derived
    from S. pyogenes. AmpR for replication into DH10b, ori replication origin. AMA1
    element for Aspergillus. Aspergillus nidulans tef1 promoter. SV40 nulear localization
    signal. Aspergillus nidulans tef1 terminator. Fungal marker: PyrG.'
  selection_markers:
