description: This dataset provides a collection of six plasmids for CRISPR-Cas9-based
  genome engineering in the industrial fungus *Aspergillus niger*. The tools include
  Cas9 expression vectors utilizing either *pyrG* or *hph* selection markers and donor
  DNA templates for the deletion, disruption, or replacement of key genes such as
  *glaA*, *mstC*, and *albA*. These resources enable advanced strain development for
  industrial biotechnology and bioenergy applications.
