description: This dataset provides plasmids for biocatalysis and engineered biosynthesis
  in *E. coli*. Two plasmids encode an IPTG-inducible *Cupriavidus necator* hydrogenase
  system for regenerating NADH from molecular hydrogen. A third plasmid contains an
  arabinose-inducible type III polyketide synthase (RppA) for the production of flaviolin.
