plasmid_features:
- ori: P15A
  backbone: HYD (Kan:P15A)
  promoters:
  - T5 promoter
  description: 'Encodes C. necator hydrogenase heterotetramer (HoxFUYH) and maturation
    proteins (HoxWI and HypA2B2C2DEFX), as described in Bertrand et al. 2024a [Manuscript
    in preparation] and Bertrand et al. 2024b [Manuscript in preparation]. Codon optimized
    for E. coli and IPTG-inducible. Performs the following reaction when expressed
    in E. coli: H2 + NAD = H + NADH  Additional customization is enabled by KpnI-NotI
    cloning site. Plasmid is contained within Stellar E. coli (Takara) cloning strain.
    Plasmid miniprep and transformation into end-user’s desired strain of bacteria
    will be required to achieve the described application.'
  selection_markers: []
