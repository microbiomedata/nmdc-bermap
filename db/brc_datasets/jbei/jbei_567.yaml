description: This dataset provides a collection of pRGPDuo series plasmids, which
  are dual-inducible duet expression vectors designed for controlled gene expression
  in both *E. coli* and *Pseudomonas putida*. The plasmids are configured to express
  the fluorescent reporter proteins RFP and sfGFP, driven by various inducible promoters
  such as pBAD, pTac, and PtetR/tetA. This collection enables the characterization
  and modular use of these vectors for synthetic biology and metabolic engineering
  applications.
