description: This dataset provides a collection of 37 plasmids constituting a modular
  cloning toolkit for the metabolic engineering of lignin biosynthesis in plants.
  The vectors contain Level 0, 1, and 2 parts for assembling multigene constructs,
  including coding sequences for lignin modification (LigA/B/C, AroG*, QsuB). These
  constructs utilize vessel- and fiber-specific promoters (e.g., AtIRX5, AtCESA7)
  to target gene expression to secondary cell walls, aiming to produce more easily
  deconstructable biomass for bioenergy applications.
