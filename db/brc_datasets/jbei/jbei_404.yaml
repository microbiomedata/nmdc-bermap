description: This dataset contains two pET28a(+) expression vectors for producing
  versatile peroxidases from the white-rot fungus *Pleurotus ostreatus*. The plasmids
  carry genes for a native versatile peroxidase (VP1) and a variant (VP2.0) for heterologous
  expression in *E. coli*. These constructs enable the study of key lignin-degrading
  enzymes relevant to biomass conversion and the production of biofuels.
