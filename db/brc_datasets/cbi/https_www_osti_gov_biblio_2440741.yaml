description: Here we present a dataset of molecular weights of lignin from a woody
  energy crop (Populus trichocarpa) residues after a series of co-solvent enhanced
  lignocellulosic fractionation (CELF) pretreatment. The natural poplar variant GW-9947
  from the Center for Bioenergy Innovation (CBI) was used. The poplar was knife milled
  and passed through a 1 mm sieve and CELF pretreatment was performed in a Parr autoclave
  reactor with 7.5 wt % solids loading, 0.5 wt% H2SO4 as catalyst at 150°C with various
  time. Tetrahydrofuran was added in a 1:1 mass ratio with water as the pretreatment
  solvent. Lignin was isolated from the pretreated samples after ball-milling in a
  porcelain jar with ceramic balls via Retsch PM 200 at 580 rpm for 2.5 h followed
  by enzymatic hydrolysis in acetate buffer (pH 4.8, 50 °C) for 48 h. The solid residue
  was isolated by centrifugation and hydrolyzed again with freshly added buffer and
  enzymes for another 48 h. After filtration, the solid residue was extracted twice
  with 96% (v/v) 1,4-dioxane/water mixture at room temperature overnight. The extracts
  were combined, rotary evaporated, and freeze-dried to recover lignin. The lignin
  samples were then derivatized in an acetic anhydride/pyridine (1:1, v/v) mixture
  and stirred at room temperature for 24 h. Ethanol was added to the reaction mixture,
  left for 30 min and then removed with a rotary evaporator. The addition and removal
  of ethanol was repeated at least 3 times until all traces of acetic acid were removed.
  Acetylated lignin samples were then dissolved in tetrahydrofuran (THF) at a concentration
  of 1.0 mg/mL. The molecular weight of acetylated lignin was measured by a gel permeation
  chromatography (GPC) on a PSS-Polymer Standards Service (Warwick, RI, USA) GPC SECurity
  1200 system featuring Agilent HPLC 1200 components equipped with four Waters Styragel
  columns (HR1, HR2, HR4 and HR6) and an UV detector (270 nm). Tetrahydrofuran was
  used as the mobile phase and flow rate was 0.3 mL/min. The Polymer Standards Service
  WinGPC Unity software (Build 6807) was used for data processing for all the samples.
  The data provides information about the effects of CELF pretreatment time at 150
  ºC on lignin molecular weights.
