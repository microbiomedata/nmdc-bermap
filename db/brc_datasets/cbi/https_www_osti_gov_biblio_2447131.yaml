description: 'Here we present a curated dataset of two-dimensional heteronuclear single
  quantum coherence (HSQC) nuclear magnetic resonance (NMR) spectra of lignin isolated
  from stems of genetically engineered poplar through auxin signaling gene modification.
  The plants were grown in greenhouse with temperatures between 21 and 23 °C. Plants
  were harvested and the aboveground stems were cut off an approximately five-inch-long
  segment from the bottom end of the plant stem, debarked and air-dried for three
  weeks. The dried stem samples were Wiley milled (mesh size 20), Soxhlet-extracted
  with toluene/ethanol for 24 h to remove extractives. The extracted biomass was ball-milled
  in a Retsch PM100 planetary ball mill using a porcelain jar with ceramic balls at
  600 rpm for 2 h (in 5 min on and 5 min off cycles to avoid excessive sample heating).
  The ball-milled materials were then subjected to enzymatic hydrolysis for 48 h followed
  by centrifugation and washing with deionized water. The solid residue was freeze-dried
  to recover the lignin. The dry stem lignin samples were dissolved in deuterated
  dimethyl sulfoxide (d6) and transferred into a 5 mm tube. 13C–1H HSQC experiments
  were performed in a Bruker Avance III HD 500 MHz NMR spectrometer operating at a
  frequency of 125.12 MHz for the 13C nucleus using a standard Bruker pulse sequence
  on a Prodigy platform cryoprobe. The NMR spectra were acquired under the following
  acquisition conditions: 230 ppm spectral width in F1 (13C) dimension with 256 data
  points and 12 ppm spectral width in F2 (1H) dimension with 2048 data points, a 90°
  pulse, a one bond C–H coupling constant of 145 Hz, a 1.0 s pulse delay, and 64 scans.
  Spectra were processed using the Bruker TopSpin 3.6 software. Additional meta data
  is embedded in the raw spectra figures.'
