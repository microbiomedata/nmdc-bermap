description: A 33,298-member sgRNA library developed for Synechococus sp. PCC 7002
  was screened with two replicates across seven growth conditions and sequenced with
  Illumina NextSeq (paired end, 2x150 bp) for a total of ~700M reads. The original
  plasmid library and the library after transformation into a dCas9-containing and
  dCas9-absent strain were also sequenced as a reference for initial sgRNA abundance.
