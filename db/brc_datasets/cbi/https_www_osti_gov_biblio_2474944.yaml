description: Located at the University of Maryland Eastern Shore, an HBCU (Historically
  Black Colleges and Universities), this data set is composed of the geographic coordinates
  of four transgenic Populus tremula x alba INRA 717-IB4 lines (CHX20, XBAT35, EXO70,
  DIR18) as well as a wild type (WT), and Empty vector (EV)). Our site is monitored
  by an ATOMS 41 weather station, which collects solar radiation, air temperature,
  vapor and atmospheric pressure, precipitation, and other weather variables. We will
  assess a suite of variables reflecting growth and performance, focusing on root
  allocation and soil carbon sequestration.
