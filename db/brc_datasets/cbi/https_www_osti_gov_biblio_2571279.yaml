description: Sulfur is an essential macronutrient that supports plant growth, development,
  and responses to environmental stress. Sulfate is the predominant inorganic form
  of sulfur in soils, and its uptake by roots and translocation to shoots are facilitated
  by the sulfate transporter (SULTR) family of proteins. Although the first plant
  SULTR gene was identified nearly three decades ago, several subfamily members, particularly
  those in the expansive and angiosperm-specific SULTR3 group, remain poorly characterized.
  To support comprehensive phylogenetic and sequence-based analyses, we compiled a
  curated dataset of 262 SULTR protein sequences from 22 plant species spanning the
  evolutionary breadth of land plants. This collection includes representatives from
  two basal lineages, two early-divergent angiosperms, six monocots, and ten dicots.
  All sequences were extracted from genome assemblies available in Phytozome v13 (Joint
  Genome Institute) and manually curated, with cross-referencing to additional databases
  such as NCBI when needed. This dataset provides a valuable resource for reconstructing
  the evolutionary history of the SULTR family, with particular emphasis on the diversification
  of SULTR3 transporters in flowering plants. This resource may also support functional
  annotation, comparative genomics, and structural modeling of sulfate transport proteins.
