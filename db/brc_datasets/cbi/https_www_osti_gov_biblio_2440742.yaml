description: Here we present a dataset of cellulose molecular weights from corn stover
  after a cotreatment process. The corn stover sample was subjected to a combination
  of mechanical disruption (ball milling) and consolidated bioprocessing (CBP) process
  using the bacterium C. thermocellum at 60 grams/L solids loadings. Cellulose was
  isolated from control, no cotreatment control, and cotreatment corn stover. Cellulose
  was then derivatized using anhydrous pyridine and phenyl isocyanate over 48 h at
  70 ºC. The reaction was quenched by anhydrous methanol. Methanol and water mixture
  (7:3, v/v) was added dropwise to promote precipitation of the cellulose derivative.
  The solids were collected by filtration and thoroughly washed with the methanol
  and water mixture followed by water. The cellulose derivative was dried overnight
  under vacuum at 40°C. The obtained cellulose tricarbanilates was then dissolved
  in tetrahydrofuran (THF) at 1.0 mg/mL and the solution was filtered through a 0.45
  µm PTFE filter and placed in an auto-sampler vial. The molecular weight of cellulose
  was measured by Agilent GPC SECurity 1200 system equipped with four Waters Styragel
  columns (i.e., HR0.5, HR2, HR4, and HR6) and a UV detector (270 nm). THF was used
  as the mobile phase. Data collection and processing was performed by Polymer Standards
  Service WinGPC Unity software (Build 6807). The molecular weight was calculated
  relative to the polystyrene calibration curve. The data on molecular weights provided
  information about the effects of cotreatment on corn stover cellulose molecular
  changes.
