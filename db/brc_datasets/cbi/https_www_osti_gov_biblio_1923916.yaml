description: Clostridium thermocellum is an anaerobic thermophilic bacterium that
  natively ferments cellulose to ethanol and organic acids. This data set is a collection
  of whole genome resequencing data for several hundred strains of Clostridium thermocellum.
  It includes strains that have been engineered to increase ethanol production, strains
  that have been engineered to understand microbial physiology, and strains that have
  been adapted for desired phenotypes including increased ethanol tolerance. Resequencing
  data consists of paired Illumina reads, 100-150 bp on each end, with a ~500 bp insert
  size. One data file containing raw Illumina data (interleaved) is available for
  each strain. We also provide data describing the mutations identified in each strain,
  and distinguish between inherited and newly observed mutations. In addition to resequencing
  data, we also provide metadata describing the lineage of each strain, and any targeted
  genetic modifications.
