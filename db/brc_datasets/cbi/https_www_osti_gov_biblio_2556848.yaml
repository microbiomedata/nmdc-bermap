description: Trees are associated with a broad range of microorganisms colonising
  the diverse tissues of their host. However, the early dynamics of the microbiota
  assembly microbiota from the root to shoot axis and how it is linked to root exudates
  and metabolite contents of tissues remain unclear. Here, we characterised how fungal
  and bacterial communities are altering root exudates as well as root and shoot metabolomes
  in parallel with their establishment in poplar cuttings (Populus tremula x tremuloides
  clone T89) over 30 days of growth. Sterile poplar cuttings were planted in natural
  or gamma irradiated soils. Bulk and rhizospheric soils, root and shoot tissues were
  collected from day 1 to day 30 to track the dynamic changes of fungal and bacterial
  communities in the different habitats by DNA metabarcoding. Root exudates and root
  and shoot metabolites were analysed in parallel by gas chromatography-mass spectrometry.
