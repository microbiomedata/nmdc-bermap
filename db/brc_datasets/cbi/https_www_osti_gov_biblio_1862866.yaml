description: Unmanned aerial vehicles (UAVs) provide an intermediate scale of spatial
  and spectral data collection that yields increased accuracy and consistency in data
  collection for morphological and physiological traits than satellites and expanded
  flexibility and high-throughput compared to ground-based data collection. In this
  project, we used UAV-based multispectral imagery collected from MicaSense RedEdge-M
  on a DJI Matrice 600 Pro for automated phenotyping of field-grown switchgrass (Panicum
  virgatum), a leading bioenergy feedstock. The raw images were processed with Pix4D
  Mapper to create the reflectance data, and vegetation indices were calculated from
  a UAV-based multispectral camera. Statistical models were developed for rust disease
  caused by Puccinia novopanici, leaf chlorophyll, nitrogen, and lignin contents.
  For the first time, UAV remote sensing technology was used to explore the potential
  for multiple traits associated with sustainable production of switchgrass. One statistical
  model was developed for each individual trait based on the statistical correlation
  between vegetation indices and the corresponding trait.
