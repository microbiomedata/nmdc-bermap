description: The aim of this study was to identity variation in drought tolerance
  across genotypes of Populus deltoides, Populus trichocarpa, and hybrids of the two
  species. A panel of 102 Populus genotypes, comprising 37 genotypes of P. trichocarpa,
  37 of P. deltoides and 28 unique hybrid genotypes (P. trichocarpa x P. deltoides
  and P. deltoides x P. trichocarpa) were evaluated in the greenhouse under two treatments,
  well-watered (WW) and drought (DS). Plant physiological data were collected throughout
  the experiment once the drought treatment began. Throughout the experiment, we tracked
  soil volumetric water content, pot weight, stomatal conductance, quantum yield of
  photosystem II, and electron transport rate. In addition to those measurements,
  upon completion of the experiment, we assessed above and belowground plant biomass,
  plant height and stem diameter, leaf number, specific leaf area, relative water
  content, total protein, and total chlorophyll. We obtained hyperspectral signatures
  of one leaf from each plant at the end of the experiment. Columns BC – LL are hyperspectral
  averages for one leaf from each plant at each wavelength as described in the column
  header.
