description: Elemental profiling of fungal species as a phenotyping tool is an understudied
  topic and is typically performed to examine plant tissue or non-biological materials.
  Traditional analytical techniques such as inductively coupled plasma–optical emission
  spectroscopy (ICP-OES) and inductively coupled plasma–mass spectrometry (ICP-MS)
  have been used to identify elemental profiles of fungi; however, these techniques
  can be cumbersome due to the difficulty of preparing samples. Additionally, the
  instruments used for these techniques can be expensive to procure and operate. Laser-induced
  breakdown spectroscopy (LIBS) is an alternative elemental analytical technique—one
  that is sensitive across the periodic table, easy to use on various sample types,
  and is cost-effective in both procurement and operation. LIBS has not been used
  on axenic filamentous fungal isolates grown in substrate media. In this work, as
  a proof of concept, we used LIBS on two genetically distinct fungal species grown
  on a nutrient-rich and nutrient-poor substrate media to determine whether robust
  elemental profiles can be detected and whether differences between the fungal isolates
  can be identified. This data set contains the raw LIBS spectral data for the summarized
  results described inRush, et. al. 2024
