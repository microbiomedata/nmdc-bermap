description: 'Switchgrass yield, chemistry, technoeconomic assessment (TEA), and life
  cycle assessment (LCA) data referenced in the manuscript "Economics and Sustainability
  impacts of yield and composition variation in bioenergy crops: Panicum virgatum
  L.", Happs, et. al. (manuscript in revision at ACS Sustainable Chemistry &amp; Engineering).
  These results are based on analysis of yield data generated from a set of switchgrass
  common garden experiments established by the Center for Bioenergy Innovation (CBI;
  https://cbi.ornl.gov/). These data include estimates of commercial-scale yields
  and characterization of biomass chemistry (fermentable carbohydrate fraction) for
  84 different switchgrass variants from a genome-wide association study population,
  as well as estimates of minimum fuel selling price and various life-cycle footprint
  metrics for cellulosic ethanol produced from that switchgrass biomass.'
