description: 'Here we present a curated dataset of a series of two-dimensional heteronuclear
  single quantum coherence (HSQC) nuclear magnetic resonance (NMR) spectra of lignin
  isolated from a field grown transgenic poplar engineered with a monolignol 4-O-methyltransferase
  (MOMT4). The poplar was collected from a 2-year-old rotation trees within a three-year
  field trial experiment. The poplar was Soxhlet-extracted with toluene/ethanol and
  the extractives-free poplar was then ball-milled in a Retsch PM100 planetary ball
  mill using a porcelain jar with ceramic balls at 600 rpm for 2 h (in 5 min on and
  5 min off cycles to avoid excessive sample heating). The ball-milled materials were
  then subjected to enzymatic hydrolysis for 48 h followed by centrifugation and washing
  with deionized water. The solid residue was extracted twice with 96:4 (v/v) 1,4-dioxane/water
  mixture at room temperature overnight. The extracts were combined, rotary evaporated,
  and freeze-dried to recover the lignin. The dry lignin samples were dissolved in
  deuterated dimethyl sulfoxide for NMR experiments. 13C–1H HSQC experiments were
  performed in a Bruker Avance III HD 500 MHz NMR spectrometer operating at a frequency
  of 125.12 MHz for the 13C nucleus using a standard Bruker pulse sequence (hsqcetgpsisp2.2)
  on a Prodigy platform cryoprobe. The NMR spectra were acquired under the following
  acquisition conditions: 220 ppm spectral width in F1 (13C) dimension with 256 data
  points and 12 ppm spectral width in F2 (1H) dimension with 1024 data points, a 90°
  pulse, a one bond C–H coupling constant of 145 Hz, a 1.0 s pulse delay, and 64 scans.
  All the data was processed using the Bruker’s TopSpin 3.6 software. The NMR spectra
  provides structural characteristics information about lignin in field grown transgenic
  MOMT4 poplar. Additional meta data is embedded in the raw spectra figures.'
