description: Plant biodesign requires the knowledge of DNA parts (e.g., genes, promoters,
  terminators), along with their combinations (as gene constructs) linked to engineered
  traits. DNA parts with validated or predicted functions in plants have been deposited
  in various online databases. However, these existing databases focus on basic biological
  functions of individual DNA parts, leaving a gap between basic knowledge and bioengineering
  applications. To fill this knowledge gap, we have created a user-friendly, open-ended
  database as a knowledge graph linking DNA parts to gene constructs to traits. This
  database contains experimentally validated DNA parts and gene constructs documented
  in peer-reviewed publications. The DNA parts include 1) molecular components with
  biological functions, such as genes involved in various biological processes (e.g.,
  metabolic and signal transduction pathways) and 2) molecular components with technical
  functions, such as gene expression, genome engineering and sequence splicing. The
  gene constructs deposited in this database include both single-gene and multi-gene
  constructs. This database allows users to submit DNA parts and gene construct compositions
  linked to engineered traits described in peer-reviewed publications, providing a
  public digital repository for sharing the biodesign information among the researchers
  in the fields of plant biotechnology and plant synthetic biology.
