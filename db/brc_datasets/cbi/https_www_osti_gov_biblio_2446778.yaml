description: Here we present a dataset of lignin content from a woody energy crop
  (Populus trichocarpa) residues after a series of co-solvent enhanced lignocellulosic
  fractionation (CELF) pretreatment and consolidated bioprocessing (CBP) process.
  The natural poplar variant GW-9947 from the Center for Bioenergy Innovation (CBI)
  was used. The poplar was knife milled and passed through a 1 mm sieve and CELF pretreatment
  was performed in a Parr autoclave reactor with 7.5 wt % solids loading, 0.5 wt%
  H2SO4 as catalyst at 150°C with 5, 15, 25 and 30 minutes, respectively. Tetrahydrofuran
  was added in a 1:1 mass ratio with water as the pretreatment solvent. The residues
  from CELF pretreatment were then subjected to CBP using the bacterium C. thermocellum
  DSM 1313. CBP fermentations were performed at 60 °C in a shaker at 50, 75, and 100
  grams/L solids loadings. The Klason lignin was measured using a two-step acid hydrolysis
  process. In brief, the poplar samples were first hydrolyzed by 72 wt% sulfuric acid
  at 30 oC for an hour. The hydrolysates were then diluted to 4 wt% sulfuric acid
  using deionized water and subsequently autoclaved at 121 oC for 1 h. Upon the completion
  of the two-step hydrolysis, the resulting solution was cooled to room temperature
  and the precipitate was then filtered through a G8 glass fiber filter through a
  crucible, dried at oven for overnight, and weighed to get the Klason lignin content.
  The lignin data provides information about lignin content changes after CELF and
  C. thermocellum CBP process.
