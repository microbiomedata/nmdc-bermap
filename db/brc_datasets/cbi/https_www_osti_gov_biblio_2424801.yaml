description: A 6-year study in Sumter Co., SC, to determine crown and leaf attributes,
  supplemental water and fertilization effects on dry weight productivity, and clonal
  variation accounts in biomass traits. Eight commercially available clones -- ‘ST148’,
  ‘S2C20’, ‘3167’, ‘ST72’ ‘20WV’, ‘S7C1’, ‘ST70’, and ‘S7C15’, were studied. Drip
  irrigation rates were used to maintain soil tension of 33 kPa at 15% volumetric
  soil moisture or 1500 kPa at 10%. Application of macro- and micronutrients occurred
  via drip irrigation at a high and low rate. The high rate included an initial application
  of 85 kg elemental nitrogen ha-1, which increased to 182 kg ha-1 at age 3, which
  then was reduced to 135 kg ha-1 for remainder of the study. The low treatment received
  50% (w/v) of the high treatment. Individual tree measurements across time are provided
  in this dataset.
