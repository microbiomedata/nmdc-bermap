description: 'Collection of the underlying spatially explicit data for Available Land
  for Cellulosic Biofuel Production: A Supply Chain Centered Comparison. Includes
  raw biomass yield data and soil carbon sequestration potential data for three types
  of marginal land for the USA midwest at the field level including field areas. Collection
  also includes raw land rasters for the three types of marginal land, model parameters
  for the MILP model used in the study, and results used to generate the figures in
  the paper.'
