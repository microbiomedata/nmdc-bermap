description: 'RNA-seq and transcriptome analysis of 4 strains (BY4743, BC187, NCYC3290,
  and YPS128) that were grown in YPD+ 0.7M NaCl. For each strain, 3 samples were collected:
  T0 (unstressed cells), T30 (30 mins after cells placed in 0.7M NaCl), and T3h (3
  hours after cells placed in NaCl). These strains were collected in 3 biological
  replicates. The library for sample YPS128 Rep 3 T30 failed so this sample is missing
  and there are a total of 35 samples in the dataset.'
