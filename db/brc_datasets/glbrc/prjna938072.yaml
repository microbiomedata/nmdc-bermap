description: The goal of this study is to explore interactions between plant detritus
  and the micro-scale characteristics of physical micro-environments, that is, soil
  pores, and their influence on decomposition, on CO2 emission, and on composition
  of bacterial communities associated with the detritus. The study consisted of a
  series of soil incubation experiments with samples of contrasting pore characteristics
  with/without plant residue, accompanied by analyses of soil pores and phylogenetic
  analysis of microbial communities with rRNA genes via pyrosequencing.
