description: A long-standing question in perennial grass breeding and physiology is
  whether yield improvement strategies could compromise winter survival. Perennial
  grasses rely on the pool of carbohydrates accumulated in storage organs from the
  previous growing season for winter maintenance and spring regrowth. Yield improvement
  strategies could reduce winter survival if they increase biomass and grain yields
  at the expense of carbon allocation to storage. Therefore, it is crucial to better
  understand the dependence of regrowth on storage reserves. We experimentally depleted
  switchgrass (<i>Panicum virgatum</i> L.) rhizome reserves by storing rhizomes for
  two weeks at 5 °C (control treatment) and 25 °C (reserve-depleted treatment). 
