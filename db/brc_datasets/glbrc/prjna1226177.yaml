description: 'Novosphingobium aromaticivorans DSM12444 is a bacterium capable of catabolizing
  several lignin aromatics. A main degradation pathway for these compounds is the
  protocatechuate (PCA) meta-cleavage. Nevertheless, the transcriptional regulation
  of this pathway is still unknown. Immediately upstream of the genes encoding the
  enzymes for this pathway, the LysR-type transcription factor (LTTF) SARO_RS14285
  was identified. To evaluate the functionality of this LTTF, a deletion mutant was
  constructed. A transcriptomic analysis of the mutant strain cultured in several
  aromatic compounds is included in this report. Overall design: RNA-seq profiling
  of the WT and the deletion mutant cultured in minimal medium with glucose and one
  of the following aromatics: protocatechuic acid (PCA), 4-coumaric acid (4-CA), vanillic
  acid (VA) or syringic acid (SA).'
