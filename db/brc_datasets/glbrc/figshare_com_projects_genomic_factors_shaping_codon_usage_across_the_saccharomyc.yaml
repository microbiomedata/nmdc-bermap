description: 'We characterized codon usage across 1,154 strains from 1,051 species
  from the fungal subphylum Saccharomycotina to gain insight into the biases, molecular
  mechanisms, evolution, and genomic features contributing to codon usage patterns.
  We found a general preference for A/T-ending codons and correlations between codon
  usage bias, GC content, and tRNA-ome size. '
