description: To investigate the effects of stabilizing G-quadruplexes on Escherichia
  coli, cells were grown in the presence of the G-quadruplex stabilizing compound,
  NMM, and RNA-seq was performed. This was done for the control cell strain (MG1655
  dtolC) as well as a strain with a decrease in a translation elongation factor (MG1655
  dtolC tufA::kan). TPM values were used for differential gene expression analysis
  between each growth condition. All samples were grown and sequenced in triplicate.
