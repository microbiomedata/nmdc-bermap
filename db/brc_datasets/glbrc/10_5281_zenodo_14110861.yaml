description: 'This record contains a list of Snakemake rules (Snakefile) to process
  a raw *.fastq.gz (from GEO record: GSE281607) using Cutadapt, map a processed *.fastq
  file using Bowtie, convert mapped reads to *.bed files using Samtools and Bedtools,
  and count the occurance of each <i>Bacteriodes fragilis</i> str NCTC 9343 genome
  position anywhere in a mapped read and as the 3'' end of a mapped read using Bedtools.
  It further contains *ebwt files to assist with Bowtie mapping, *genome file to be
  used with Bedtools, a *.fasta file (useful to regenerate *ebwt files), and the completely
  processed *bed and *txt read files (generated by Snakemake and R) as references.
  In addition, a *.pdb file is included and represents the predicted interaction between
  UpeY and UpaZ.'
