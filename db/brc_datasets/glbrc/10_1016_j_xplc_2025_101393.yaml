description: Teucrium is well known for making clerodane-type diterpenoids that are
  produced from the backbone kolavanyl diphosphate. In order to begin to elucidate
  some of the complex biosynthetic pathways of these medicinal compounds, we identified
  and functionally characterized several kolavanyl diphosphate synthases from <i>T.
  chamaedrys</i>. Along the way, we discovered the genome of this species to be one
  of the largest genomes published from the Lamiaceae family, to which it belongs.
  This tetraploid, 3 Gbp genome is especially rich in diterpene synthase genes, with
  74 putative sequences identified.
