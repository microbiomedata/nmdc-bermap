description: Genomic DNA from each sample was prepared using the Wizard Genomic DNA
  Purification Kit (Promega) and after, DNA was quantified using the QuantiFluor ONE
  dsDNA System (Promega). Genomic DNA underwent shearing to ~200 bp fragments via
  sonication and the gDNA fragments were prepared for sequencing using the NEBNext
  Ultra II DNA Library Prep Kit for Illumina (NEB). Bead-based size selection was
  used to select ~200 bp fragments and the fragments then underwent a splinkerette
  PCR using a Tn5-enriching forward primer and custom reverse primers for multiplexing.
  A final bead-based size selection was used to select for the correct length DNA.
  DNA was sequenced at the University of Michigan Advanced Genomics Core using Illumina
  sequencing with a custom read primer reading the last 10 nt of the transposon. PhiX174
  DNA spike was added to the run to ensure sufficient sequence diversity on the flow
  cell. Then, a custom index read primer and standard Illumina primer were used to
  sequence the index reads and PhiX174, respectively.
