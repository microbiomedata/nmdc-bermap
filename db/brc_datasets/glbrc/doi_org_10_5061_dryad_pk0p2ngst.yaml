description: The net CO2 assimilation (A) response to intercellular CO2 concentration
  (Ci) is a fundamental measurement in photosynthesis and plant physiology research.
  The conventional A/Ci protocols rely on steady-state measurements and take 15-40
  minute per measurement, limiting data resolution or biological replication. Additionally,
  there are several CO2 protocols employed across the literature, without clear consensus
  as to the optimal protocol or systematic biases in their estimations. We compared
  the non-steady state Dynamic Assimilation Technique (DAT) protocol and the three
  most used CO2 protocols in steady-state measurements, and tested whether different
  CO2 protocols lead to systematic differences in estimations of the biochemical limitations
  to photosynthesis.
