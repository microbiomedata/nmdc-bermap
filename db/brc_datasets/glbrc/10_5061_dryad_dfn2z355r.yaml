description: 'We analyzed phosphorus (P) inputs (fertilization and atmospheric deposition)
  and outputs (harvest and leaching losses) over seven years in three representative
  biomass crops—switchgrass (<i>Panicum</i> <i>virga­tum</i> L.), miscanthus (<i>Miscanthus</i> X <i>giganteus</i>)
  and hybrid poplar trees (<i>Populus</i> <i>nigra</i> X <i>P</i>. <i>maximowiczii</i>)
  – as well as in no-till corn (maize; <i>Zea</i> <i>mays</i> L.) for comparison,
  all planted on former cropland in SW Michigan, USA. '
