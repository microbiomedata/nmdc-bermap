description: ' The microbiome associated with plant roots, the rhizobiome, can harbor
  beneficial microbes that alleviate stress, but the factors influencing their recruitment
  are unclear. We conducted a greenhouse experiment using field soil with a legacy
  of growing switchgrass and common bean to investigate the impact of short-term drought
  severity on the recruitment of active bacterial rhizobiome members. We applied 16S
  rRNA and 16S rRNA gene sequencing for both crops and metabolite profiling for switchgrass.
  We included planted and unplanted conditions to distinguish environment- versus
  plant-mediated rhizobiome drivers. '
