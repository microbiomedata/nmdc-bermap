description: Here we quantify the radiative forcing caused by the deforestation of
  an ecoregion of the U.S. Upper Midwest and the adoption of eight nature-based climate
  solutions. We combined forest inventory data with over three decades of remote sensing
  and in situ data from a replicated land use change experiment.
