description: Stems accumulate high levels of sucrose that could be used to synthesize
  bioethanol and useful biopolymers if information about stem cell-type gene expression
  and regulation was available to enable engineering. To obtain this information,
  Laser Capture Microdissection (LCM) was used to isolate and collect transcriptome
  profiles from five major cell types that are present in stems of the sweet sorghum
  Wray. Transcriptome analysis identified genes with cell-type specific and cell-preferred
  expression patterns that reflect the distinct metabolic, transport, and regulatory
  functions of each cell type.
