description: BECCS demands extensive land use change that may create positive or negative
  radiative forcing impacts upstream of the BECCS facility through changes to in situ
  greenhouse gas fluxes and land surface albedo. When quantifying these upstream climate
  impacts, even at a single site, different methods can give different estimates.
  Here we show how three common methods for estimating the net ecosystem carbon balance
  of bioenergy crops established on former grassland or former cropland can differ
  in their central estimates and uncertainty. 
