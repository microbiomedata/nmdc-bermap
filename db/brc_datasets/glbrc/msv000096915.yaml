description: Reactive oxygen species (ROS) are highly reactive molecules encountered
  by yeasts during routine metabolism and during interactions with other organisms,
  including host infection. Here, we characterized the variation in resistance to
  ROS across the ancient yeast subphylum Saccharomycotina and used machine learning
  (ML) to identify gene families whose sizes were predictive of ROS resistance.
