description: A high confidence barley reference transcript dataset consisting of 60,444
  genes with 177,240 transcripts has been generated. Compared to current barley transcripts,
  BaRTv1.0 transcripts are generally longer, have less fragmentation and improved
  gene models that are well supported by splice junction reads. Precise transcript
  quantification using BaRTv1.0 allows routine analysis of gene expression and AS.
