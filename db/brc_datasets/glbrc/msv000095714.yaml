description: Proteomic analysis reveals translation-related proteins are significantly
  altered in response to stabilized G4s. Identification of the importance of translation
  factors in overcoming G4s led to the question of how E. coli cells generally respond
  to chemicals that stabilize such structures. As a first step in addressing this
  question, a proteomic analysis was carried out to measure the quantitative effects
  of NMM on the levels of individual proteins in E. coli. Protein levels from early
  log-phase cultures of delta-tolC and delta-tolC tufA::kan strains grown in the presence
  or absence of NMM were measured to assess how reduced EF- Tu levels and NMM impacted
  expression.
