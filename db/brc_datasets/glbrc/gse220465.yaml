description: Past work from our lab, focused on engineering the budding yeast Saccharomyces
  cerevisiae for fermentation of the non-native pentose sugar xylose, discovered that
  hyperactivation of the RAS/Protein Kinase A (PKA) pathway was needed for rapid anaerobic
  xylose fermentation. Interestingly, the mechanism of PKA hyperactivation has a dramatic
  impact on growth and metabolism on xylose; deletion of the RAS inhibitor IRA2 permits
  rapid growth and fermentation, while deletion of the PKA regulatory subunit BCY1
  allows for fermentation without growth on xylose. To understand how a single deletion
  in the PKA pathway can decouple growth and metabolism, we performed transcriptomic
  analysis of these strains, predicting that altered PKA activity would impact global
  gene expression and identify pathways important for growth and metabolism coordination.
