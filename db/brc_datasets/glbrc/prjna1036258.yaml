description: Soil diazotrophs are ubiquitous bacteria and archaea responsible for
  converting atmospheric nitrogen into plant-available ammonium. This process, if
  properly harnessed, can ameliorate excessive fertilizer inputs in conventional agricultural
  systems. However, the effect of diazotroph biodiversity on free-living nitrogen
  fixation (FLNF) is poorly understood. Here, we characterized diazotroph biodiversity
  across a land-management intensity gradient, determining the interactive effects
  of land management and diazotroph biodiversity on their ecosystem functioning (FLNF).
  Subsequently, we evaluated the functional redundancy of diazotroph biodiversity
  on FLNF in-vitro by performing a biodiversity reduction assay with chloroform fumigation,
  incubating soils with chloroform for either 24 or 72 hours. We estimated diazotroph
  biodiversity for both in-situ and chloroform-fumigated samples by preparing and
  sequencing nifH gene libraries. The raw sequencing data of our nifH library is deposited
  here.
