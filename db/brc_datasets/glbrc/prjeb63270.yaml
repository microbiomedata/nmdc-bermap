description: In this yeast, the study of trait variation at the population level led
  to the detection of distinct sets of GAL structural genes. Besides the reference
  version, present in most strains, alternative highly divergent alleles supporting
  faster growth on galactose were recently uncovered in strains associated with dairy
  products and also in some wild strains.
