description: Sequencing reads archived here are part of a project studying natural
  variation in ER stress responses in Arabidopsis reported in Pastor-Cantizano et
  al. 2024. The project focused on contrasting alleles derived from Na-1 (tolerant)
  and Est-0 (susceptible) accessions when exposed to a ER stress inducer. These accession
  were crossed, F3 progeny were phenotyped, and the top and bottom 10% of relative
  performance under ER stress (42 individuals from each tail) were pooled and sequenced.
  Candidate genomic regions were identified by looking for allele frequency differences
  among the two pools in a standard QTL-seq approach
