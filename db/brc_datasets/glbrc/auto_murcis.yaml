description: Multiplex, randomized CRISPR interference sequencing (MuRCiS) allows
  for the simultaneous identification of multiple gene knockouts that together influence
  microbial processes. Here, we report on an updated analysis tool called Auto-MuRCiS
  that utilizes Docker to make the analysis of these data rapid and more user-friendly.
