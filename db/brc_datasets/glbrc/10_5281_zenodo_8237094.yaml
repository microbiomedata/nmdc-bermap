description: Here we aimed to engineer poplar with optimized pathways to produce squalene,
  a triterpene commonly used in cosmetic oils, a potential biofuel candidate, and
  the precursor to the further diversified classes of triterpenoids and sterols. The
  squalene production pathways were either re-targeted from the cytosol to plastids
  or co-produced with lipid droplets in the cytosol. Squalene and lipid droplet co-production
  appeared to be toxic, which we hypothesize to be due to disruption of adventitious
  root formation, suggesting a need for tissue specific production. Plastidial squalene
  production enabled up to 0.63 mg/g fresh weight in leaf tissue, which also resulted
  in reductions in isoprene emission and photosynthesis. These results were also studied
  through a technoeconomic analysis, providing further insight into developing poplar
  as a production host 
