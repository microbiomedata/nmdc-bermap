description: We compared the genomes of 12 plant-pathogenic Saccharomycotina strains
  to 360 plant-associated strains to identify features unique to the phytopathogens.
  Characterization of the oxylipin synthesis genes, a compound believed to be involved
  in <i>Eremothecium </i>pathogenicity, did not reveal any differences in gene presence
  within or between the plant-pathogenic and plant-associated strains. A reverse-ecological
  approach, however, revealed that plant pathogens lack several metabolic enzymes
  known to assist other phytopathogens in overcoming plant defenses. 
