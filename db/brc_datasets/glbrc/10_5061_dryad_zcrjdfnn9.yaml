description: The data included in this Dryad submission was collected in order to
  understand how the model organism* Escherichia coli* overcomes stabilized G-quadruplexes.
  This work involved a multi-omics approach to studying how the G-quadruplex stabilizers
  NMM and Braco-19 impact growth, gene importance, and mRNA/proteomic abundance in
  G-quadruplex stabilizing conditions. 
