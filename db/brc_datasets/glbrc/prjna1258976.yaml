description: Here, we show that SigAb is a metal stress-responsive ECF that appears
  unique to Acinetobacter species and distinct from RpoE. We combine promoter mutagenesis,
  motif scanning, and ChIP-seq to define the direct SigAb regulon, which consists
  of sigAb itself, the stringent response mediator, relA, and the uncharacterized
  small RNA, "sabS."
