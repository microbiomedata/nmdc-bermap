description: Although implicated as deleterious in many organisms, aneuploidy can
  underlie rapid phenotypic evolution. However, aneuploidy will be maintained only
  if the benefit outweighs the cost, which remains incompletely understood. To quantify
  this cost and the molecular determinants behind it, we generated a panel of chromosome
  duplications in Saccharomyces cerevisiae and applied comparative modeling and molecular
  validation to understand aneuploidy toxicity.
