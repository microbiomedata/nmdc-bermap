description: This study investigates uncertainties in greenhouse gas (GHG) emission
  factors related to switchgrass-based biofuel production in Michigan. Using three
  life cycle assessment (LCA) databases— US lifecycle inventory database (USLCI),
  GREET, and Ecoinvent—each with multiple versions, we recalculated the global warming
  intensity (GWI) and GHG mitigation potential in a static calculation. Employing
  Monte Carlo simulations along with local and global sensitivity analyses, we assess
  uncertainties and pinpoint key parameters influencing GWI.
