description: The large-scale production of cellulosic biofuels would involve spatially
  distributed systems including biomass fields, logistics networks and biorefineries.
  Better understanding of the interactions between landscape-related decisions and
  the design of biorefineries with carbon capture and storage (CCS) in a supply chain
  context is needed to enable efficient systems. Here we analyse the cost and greenhouse
  gas mitigation potential for cellulosic biofuel supply chains in the US Midwest
  using realistic spatially explicit land availability and crop productivity data
  and consider fuel conversion technologies with detailed CCS design for their associated
  CO2 streams.
