description: 'The formation of complex traits is the consequence of genotype and activities
  at multiple molecular levels. However, connecting genotypes and these activities
  to complex traits remains challenging. Here, we investigate whether integrating
  genomic, transcriptomic, and methylomic data can improve prediction for six Arabidopsis
  traits. We find that transcriptome- and methylome-based models have performances
  comparable to those of genome-based models. '
