description: This study investigates the catabolism of the b-5 linked aromatic dimer
  dehydrodiconiferyl alcohol (DC-A) by the bacterium Novosphingobium aromaticivorans.
  We used genome wide screens to identify candidate genes involved in DC-A catabolism.
  Subsequent in vivo and in vitro analyses of these candidates elucidated a catabolic
  pathway composed of four required gene products and several partially redundant
  dehydrogenases that convert DC-A to aromatic monomers that can be funneled into
  the central aromatic metabolic pathway of N. aromaticivorans.
