description: We conducted a barcode sequencing experiment examining 4 yeast strains
  expressing a high copy number plasmid library. For each strain, we took samples
  at generation 0 (start of experiment) and generation 10 to quantify how plasmid
  abundance changes over time when strains were grown under osmotic and ionic stress
  induced by 0.7M of sodium chloride (NaCl). Each strain was measured in biological
  triplicate for a total of 24 samples.
