description: Phyllosphere exudates create specialized microhabitats that shape microbial
  community diversity. We explored the microbiome associated with two sorghum phyllosphere
  exudates, the epicuticular wax and aerial root mucilage. We assessed the microbiome
  associated with the wax from sorghum plants over two growth stages, and the root
  mucilage additionally from nitrogen-fertilized and non-fertilized plants. In parallel,
  we isolated and characterized hundreds of bacteria from wax and mucilage, and integrated
  data from cultivation-independent and cultivation-dependent approaches to gain insights
  into exudate diversity and bacterial phenotypes. 
