description: Changes in soil organic carbon (SOC) and nitrogen (SON) are strongly
  affected by land management, but few long-term comparative studies have surveyed
  changes throughout the whole soil profile. We quantified 25-year SOC and SON changes
  to 1 m in 10 replicate ecosystems at an Upper Midwest, USA site. We compared four
  annual cropping systems in maize (<i>Zea mays</i>)-soybean (<i>Glycine</i> max)-winter
  wheat (<i>Triticum aestivum</i>) rotations, each managed differently (Conventional,
  No-till, Reduced input, and Biologically based); in three managed perennial systems
  (hybrid Poplar (<i>Populus</i> × <i>euramericana</i>), Alfalfa (<i>Medicago sativa</i>),
  and Conifer (<i>Pinus</i> spp.); and in three successional systems (Early, Mid-
  and Late succession undergoing a gradual change in species composition and structure
  over time). 
